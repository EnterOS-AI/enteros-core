services:
  # Digest-pinned 2026-07-17. All pins in this file are MULTI-ARCH manifest-list
  # digests (amd64 + arm64) — never platform-specific image digests, which break
  # Apple Silicon / arm64 hosts (redis-cli segfaults under qemu, ClickHouse
  # aborts). Refresh with: docker buildx imagetools inspect <name>:<tag>
  # and take the top-level "Digest:" (the index), keeping the :tag in the ref
  # as documentation — the digest is what Docker resolves.
  postgres:
    image: postgres:16.13@sha256:5d143123fdf80462d1778cd4f24b9f7ca13c87174bca19141fb194c5a1ebca59
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dev}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev}
      POSTGRES_DB: ${POSTGRES_DB:-molecule}
    command: ["postgres", "-c", "wal_level=logical"]
    ports:
      # Host port is dynamic (dev-start.sh picks a free one and injects the
      # matching DATABASE_URL) so a dev's own Postgres on 5432 is never
      # silently hijacked. Loopback-bound: local dev infra is not LAN-facing.
      # Falls back to 5432 when the var is unset.
      - "127.0.0.1:${MOLECULE_PG_HOST_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - molecule-core-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dev}"]
      interval: 2s
      timeout: 5s
      retries: 10

  langfuse-db-init:
    image: postgres:16.13@sha256:5d143123fdf80462d1778cd4f24b9f7ca13c87174bca19141fb194c5a1ebca59
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dev}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev}
    networks:
      - molecule-core-net
    command:
      - /bin/sh
      - -c
      - |
        export PGPASSWORD="$${POSTGRES_PASSWORD}"
        until pg_isready -h postgres -U "$${POSTGRES_USER}" -d postgres >/dev/null 2>&1; do
          sleep 1
        done
        if ! psql -h postgres -U "$${POSTGRES_USER}" -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname = 'langfuse'" | grep -q 1; then
          psql -h postgres -U "$${POSTGRES_USER}" -d postgres -c "CREATE DATABASE langfuse"
        fi

  redis:
    image: redis:7.4.9@sha256:a8f08480e1f88f2647fed492d1178c06abb0d0c1fbf02c682a61e2f483fb3954
    command: ["redis-server", "--notify-keyspace-events", "KEA"]
    ports:
      - "127.0.0.1:${MOLECULE_REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    networks:
      - molecule-core-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 10

  # Local object-store backend for the SDK object-store/workspace-data SSOT.
  # MinIO is S3-compatible, path-style, and stands in for the per-tenant
  # platform-proxy backend used by workspace snapshot/restore and migration
  # work. The workspace box never receives these credentials.
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-molecule-dev-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-molecule-dev-minio-password}
    ports:
      - "127.0.0.1:${MOLECULE_MINIO_HOST_PORT:-9000}:9000"
      - "127.0.0.1:${MOLECULE_MINIO_CONSOLE_HOST_PORT:-9001}:9001"
    volumes:
      - miniodata:/data
    networks:
      - molecule-core-net
    restart: unless-stopped

  # One-shot bucket bootstrap. Kept behind a profile so the normal compose `up`
  # does not leave an exited helper container; infra/scripts/setup.sh runs it
  # after MinIO is reachable.
  minio-init:
    profiles: ["tools"]
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z@sha256:a7fe349ef4bd8521fb8497f55c6042871b2ae640607cf99d9bede5e9bdf11727
    depends_on:
      - minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-molecule-dev-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-molecule-dev-minio-password}
      MOLECULE_WORKSPACE_DATA_BUCKET: ${MOLECULE_WORKSPACE_DATA_BUCKET:-molecule-workspace-data}
    networks:
      - molecule-core-net
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        until mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}" >/dev/null 2>&1; do
          sleep 1
        done
        mc mb --ignore-existing "local/$${MOLECULE_WORKSPACE_DATA_BUCKET}" >/dev/null

  langfuse-clickhouse:
    image: clickhouse/clickhouse-server:24.10.2.80@sha256:3381aed826313cb9395830b30a5dc487a5a62f7054f012a2130f55e68100d0ad
    environment:
      CLICKHOUSE_DB: langfuse
      CLICKHOUSE_USER: langfuse
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-langfuse-dev}
    volumes:
      - clickhousedata:/var/lib/clickhouse
    networks:
      - molecule-core-net
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:8123/ping || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

networks:
  molecule-core-net:
    name: molecule-core-net
    external: true

volumes:
  pgdata:
  redisdata:
  miniodata:
  clickhousedata:
