name: redeploy-tenants-on-main

# molecules-server rework (2026-07-03): re-enabled + un-EC2'd (production).
#
# History: this workflow rolled the production tenant fleet by calling the CP
# admin endpoint /cp/admin/tenants/redeploy-fleet, which fanned out over AWS
# SSM to one-tenant-per-EC2 boxes. It was DISABLED 2026-06-27 when the AWS
# account was closed. Molecules-Server / local Docker is now one supported
# production provider path (provider='local', the LocalDocker provisioner),
# alongside control-plane-managed providers; the EC2/SSM path is dead. This
# workflow sees only containers on its Docker host carrying the production
# label; it is not an inventory or rollout of the entire production tenant set.
#
# This workflow redeploys the local-docker PRODUCTION fleet by delegating to the
# ONE shared swap script, scripts/deploy/redeploy-staging-fleet.sh, with the
# production deltas passed as flags/env (label filter --cp-env production, the
# moving :latest tag, the shared prod canvas container). It differs from the
# staging path ONLY in those deltas and in the PROD_AUTO_DEPLOY_DISABLED kill
# switch (below).
#
# CANONICAL ALGORITHM = scripts/deploy/redeploy-staging-fleet.sh (SSOT). This
# used to inline a hand-copied duplicate of the canary-first / health-gated /
# self-rolling-back swap; that copy drifted from the staging one and — critically
# — carried the OLD host-loopback health gate (curl 127.0.0.1:<published-port>),
# which only works when the runner IS the tenant host. The shared script's gate
# probes /buildinfo DAEMON-SIDE (a curl sidecar in the tenant netns), so this
# same workflow works whether it runs on the prod box OR drives the prod daemon
# remotely over the mesh — the prerequisite for moving deploys off the prod box.
# Make algorithm changes in the script; this file only wires prod deltas.
#
# PROD SAFETY — the auto-trigger is re-enabled per the re-enable request, but a
# production roll is a side-effecting deploy, so it is HARD-GATED by
# PROD_AUTO_DEPLOY_DISABLED. While that kill switch is set (the current
# deploy-freeze posture) every run short-circuits with a notice and touches
# nothing — production stays frozen until an operator unsets it. This keeps the
# plumbing live without auto-rolling prod.
#
# This production redeploy is independent of the staging E2E workflows; those
# lanes provide separate evidence and are not an upstream dependency. This job's
# enforced controls are its kill switch plus the shared script's candidate-identity
# and daemon-side health gate.
#
# Rollback / pin: set the repo/org var PROD_MANUAL_REDEPLOY_TARGET_TAG to a
# known-good tag and run via workflow_dispatch; unset it afterward.

on:
  # RE-ENABLED 2026-07-03 (was: workflow_dispatch-only). Gated by
  # PROD_AUTO_DEPLOY_DISABLED — see the header + the kill-switch step.
  push:
    branches: [main]
    paths:
      - 'canvas/**'
      - 'workspace-server/**'
      - 'scripts/deploy/redeploy-staging-fleet.sh'
      - '.gitea/workflows/redeploy-tenants-on-main.yml'
  workflow_dispatch:

permissions:
  contents: read

# Serialize per-branch so two rapid main pushes' redeploys don't overlap and
# leave the fleet half-rolled. cancel-in-progress:false — aborting a partial
# PROD roll mid-fleet is worse than letting it finish (each swap is
# health-gated + self-rolls-back, so a completed predecessor is always in a
# good state). Explicit here to match redeploy-tenants-on-staging.yml rather
# than lean on the Gitea/Actions default.
concurrency:
  group: redeploy-tenants-on-main
  cancel-in-progress: false

env:
  GITHUB_SERVER_URL: https://git.moleculesai.app
  TENANT_IMAGE: ${{ vars.MOLECULE_TENANT_IMAGE || 'registry.moleculesai.app/molecule-ai/molecule-tenant' }}
  # Production shared canvas app container name (analogue of molecule-staging-app).
  # Empty by default → the shared-app roll is skipped unless an operator sets it.
  PROD_CANVAS_APP_CONTAINER: ${{ vars.PROD_CANVAS_APP_CONTAINER || '' }}
  CANVAS_APP_IMAGE: ${{ vars.MOLECULE_CANVAS_APP_IMAGE || 'registry.moleculesai.app/molecule-ai/canvas' }}
  DEFAULT_TENANT_TAG: latest

jobs:
  redeploy:
    # local-deploy: the robot-2 deploy runner whose DOCKER_HOST is the prod
    # daemon over the mesh (docker-socket-proxy). The swap runs OFF the prod box
    # yet acts on the prod tenant fleet; the shared script's health gate is
    # daemon-side, so it is host-agnostic. (Was docker-host — a runner ON the
    # prod box — during the drive-deploys-off-the-prod-box migration.)
    runs-on: local-deploy
    timeout-minutes: 30
    env:
      PROD_AUTO_DEPLOY_DISABLED: ${{ vars.PROD_AUTO_DEPLOY_DISABLED || secrets.PROD_AUTO_DEPLOY_DISABLED || '' }}
      TARGET_TAG_OVERRIDE: ${{ vars.PROD_MANUAL_REDEPLOY_TARGET_TAG || secrets.PROD_MANUAL_REDEPLOY_TARGET_TAG || '' }}
    steps:
      - name: Kill-switch guard (production freeze)
        id: guard
        run: |
          set -euo pipefail
          case "$(printf '%s' "${PROD_AUTO_DEPLOY_DISABLED:-}" | tr '[:upper:]' '[:lower:]')" in
            1|true|yes|on|disabled|disable)
              echo "::notice::PROD_AUTO_DEPLOY_DISABLED is set — production redeploy is frozen. Skipping."
              # Audit-trail marker so a future operator inspecting the run
              # summary can see WHY it short-circuited (not just an empty run).
              {
                echo "## Production fleet redeploy — SKIPPED (frozen)"
                echo ""
                echo "\`PROD_AUTO_DEPLOY_DISABLED\` is set — production auto-redeploy is frozen; no containers were touched. An operator must unset it to lift the freeze."
              } >> "$GITHUB_STEP_SUMMARY"
              echo "skip=1" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "skip=0" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Checkout (for the shared swap script)
        if: ${{ steps.guard.outputs.skip == '0' }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Redeploy local-docker production tenant fleet
        if: ${{ steps.guard.outputs.skip == '0' }}
        env:
          # Roll the shared PRODUCTION canvas app too, if an operator configured
          # one. The script's shared-canvas roll reads STAGING_CANVAS_APP_CONTAINER
          # (the generic "which shared-canvas container to roll" knob); pass the
          # prod container name through it. Empty => the roll is skipped.
          STAGING_CANVAS_APP_CONTAINER: ${{ env.PROD_CANVAS_APP_CONTAINER }}
          # Managed rollout flags SSOT (same repo var the staging rollers use). The
          # script strips every managed key from the inherited env and re-applies
          # ONLY what TENANT_FLAGS names, so this MUST be wired or a main-triggered
          # prod roll would silently turn an in-flight flag OFF fleet-wide.
          STAGING_TENANT_FLAGS: ${{ vars.STAGING_TENANT_FLAGS }}
        run: |
          set -euo pipefail
          TAG="${TARGET_TAG_OVERRIDE:-$DEFAULT_TENANT_TAG}"
          echo "::notice::Production tenant redeploy target tag = ${TAG}"
          # CANVAS_TAG follows the tenant tag so a pinned rollback rolls a matching
          # canvas; the shared script defaults it to the tenant tag anyway.
          # `${STAGING_TENANT_FLAGS-}` — the shell (not the templater) supplies the
          # default, so TENANT_FLAGS arrives SET-AND-EMPTY and the script's
          # fail-closed unset-check is satisfied while the flags stay dark.
          CANVAS_TAG="$TAG" \
          TENANT_FLAGS="${STAGING_TENANT_FLAGS-}" \
          bash scripts/deploy/redeploy-staging-fleet.sh --cp-env production --tag "$TAG"
          {
            echo "## Production fleet redeploy (molecules-server / local-docker)"
            echo ""
            echo "- Target tag: \`${TAG}\`"
            echo "- Rolled via the shared SSOT swap script (daemon-side health gate)."
          } >> "$GITHUB_STEP_SUMMARY"

      # ── Enter OS rebrand Phase 2 (internal#1089): ADVISORY dual-domain arm ──
      # The BLOCKING gate is unchanged and just ran above: the shared swap
      # script health-gates every rolled tenant's /buildinfo DAEMON-SIDE — the
      # service behind <slug>.moleculesai.app. This step ADDS a second,
      # NON-blocking probe of the SAME tenants through the NEW brand edge
      # (https://<slug>.enteros.ai/buildinfo, runner-side through DNS + CF +
      # tunnel ingress), measuring enteros.ai routing readiness that the
      # daemon-side gate cannot see. Until ops seeds the enteros.ai tenant
      # DNS/ingress this WARNS on every roll — that is the readiness signal,
      # not noise; the ::warning:: names exactly what to check.
      #
      # FLIP-TO-BLOCKING CONDITION: once ops seeds enteros.ai tenant routing
      # AND this step has soaked green across consecutive prod rolls, delete
      # the continue-on-error line below (and wire EXPECTED_BUILD_SHA from the
      # image's OCI revision label) so BOTH domains gate the deploy. The probe
      # script already fails closed, so the flip is only removing the mask.
      - name: Probe enteros.ai tenant buildinfo (advisory Phase-2 arm)
        if: ${{ steps.guard.outputs.skip == '0' }}
        # internal#1089 — Enter OS Phase 2: advisory until enteros.ai tenant
        # routing is ops-seeded + soak-green (flip condition in the comment above).
        continue-on-error: true
        env:
          ENTEROS_TENANT_DOMAIN: ${{ vars.ENTEROS_TENANT_DOMAIN || 'enteros.ai' }}
        run: |
          set -euo pipefail
          bash scripts/deploy/probe-enteros-buildinfo.sh \
            --cp-env production --domain "$ENTEROS_TENANT_DOMAIN"
