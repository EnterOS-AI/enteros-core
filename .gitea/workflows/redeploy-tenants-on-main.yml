name: redeploy-tenants-on-main

# molecules-server rework (2026-07-03): local-Docker production subset.
#
# History: this workflow rolled the production tenant fleet by calling the CP
# admin endpoint /cp/admin/tenants/redeploy-fleet, which fanned out over AWS
# SSM to one-tenant-per-EC2 boxes. It was DISABLED 2026-06-27 when the AWS
# account was closed. Molecules-Server/local Docker is now one supported
# production provider path, alongside control-plane-managed providers. This
# workflow sees only containers on its Docker host carrying the production
# label; it is not an inventory or rollout of the entire production tenant set.
#
# This rewrite redeploys that labeled local-Docker production subset directly
# over the host Docker socket — same shape as
# redeploy-tenants-on-staging.yml, differing only in: the production label
# filter (molecule.cp-env=production), the moving tag (:latest, not
# staging-latest), and the PROD_AUTO_DEPLOY_DISABLED kill switch (below).
#
# CANONICAL ALGORITHM REFERENCE: redeploy-tenants-on-staging.yml. The
# canary-first / health-gated / self-rolling-back swap logic is intentionally
# identical in both files — treat the STAGING workflow as the source of truth,
# make algorithm changes THERE FIRST, then port only the prod-only deltas
# (label filter / tag / kill switch) here so edits land in the right file.
#
# Dropped vs the EC2/SSM era: AWS creds / EC2 DescribeInstances / SSM
# RunShellCommand / the CP redeploy-fleet call / GHCR sleep / the Infisical
# CP-admin-token fetch. Added: the docker-host canary-first, health-gated,
# self-rolling-back tenant swap.
#
# PROD SAFETY — the auto-trigger is re-enabled per the re-enable request, but a
# production roll is a side-effecting deploy, so it is HARD-GATED by
# PROD_AUTO_DEPLOY_DISABLED. While that kill switch is set (the current
# deploy-freeze posture) every run short-circuits with a notice and touches
# nothing — production stays frozen until an operator unsets it. This keeps the
# plumbing live without auto-rolling prod.
#
# Rollback / pin: set the repo/org var PROD_MANUAL_REDEPLOY_TARGET_TAG to a
# known-good tag and run via workflow_dispatch; unset it afterward.

on:
  # RE-ENABLED 2026-07-03 (was: workflow_dispatch-only). Gated by
  # PROD_AUTO_DEPLOY_DISABLED — see the header + the kill-switch step.
  push:
    branches: [main]
    paths:
      - 'canvas/**'
      - 'workspace-server/**'
      - '.gitea/workflows/redeploy-tenants-on-main.yml'
  workflow_dispatch:

permissions:
  contents: read

# Serialize per-branch so two rapid main pushes' redeploys don't overlap and
# leave the local-Docker subset half-rolled. cancel-in-progress:false — aborting
# a partial production roll mid-subset is worse than letting it finish (each swap is
# health-gated + self-rolls-back, so a completed predecessor is always in a
# good state). Explicit here to match redeploy-tenants-on-staging.yml rather
# than lean on the Gitea/Actions default.
concurrency:
  group: redeploy-tenants-on-main
  cancel-in-progress: false

env:
  GITHUB_SERVER_URL: https://git.moleculesai.app
  TENANT_IMAGE: ${{ vars.MOLECULE_TENANT_IMAGE || 'registry.moleculesai.app/molecule-ai/molecule-tenant' }}
  # Production shared canvas app container name (analogue of molecule-staging-app).
  # Empty by default → the shared-app roll is skipped unless an operator sets it.
  PROD_CANVAS_APP_CONTAINER: ${{ vars.PROD_CANVAS_APP_CONTAINER || '' }}
  CANVAS_APP_IMAGE: ${{ vars.MOLECULE_CANVAS_APP_IMAGE || 'registry.moleculesai.app/molecule-ai/canvas' }}
  DEFAULT_TENANT_TAG: latest
  DEFAULT_CANVAS_TAG: latest

jobs:
  redeploy:
    runs-on: docker-host
    timeout-minutes: 30
    env:
      PROD_AUTO_DEPLOY_DISABLED: ${{ vars.PROD_AUTO_DEPLOY_DISABLED || secrets.PROD_AUTO_DEPLOY_DISABLED || '' }}
      TARGET_TAG_OVERRIDE: ${{ vars.PROD_MANUAL_REDEPLOY_TARGET_TAG || secrets.PROD_MANUAL_REDEPLOY_TARGET_TAG || '' }}
    steps:
      - name: Kill-switch guard (production freeze)
        id: guard
        run: |
          set -euo pipefail
          case "$(printf '%s' "${PROD_AUTO_DEPLOY_DISABLED:-}" | tr '[:upper:]' '[:lower:]')" in
            1|true|yes|on|disabled|disable)
              echo "::notice::PROD_AUTO_DEPLOY_DISABLED is set — production redeploy is frozen. Skipping."
              # Audit-trail marker so a future operator inspecting the run
              # summary can see WHY it short-circuited (not just an empty run).
              {
                echo "## Local-Docker production subset redeploy — SKIPPED (frozen)"
                echo ""
                echo "\`PROD_AUTO_DEPLOY_DISABLED\` is set — production auto-redeploy is frozen; no containers were touched. An operator must unset it to lift the freeze."
              } >> "$GITHUB_STEP_SUMMARY"
              echo "skip=1" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "skip=0" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Redeploy labeled local-Docker production tenant subset
        if: ${{ steps.guard.outputs.skip == '0' }}
        run: |
          set -euo pipefail

          TAG="${TARGET_TAG_OVERRIDE:-$DEFAULT_TENANT_TAG}"
          IMG="${TENANT_IMAGE}:${TAG}"
          echo "::notice::Production tenant redeploy target image = ${IMG}"

          docker pull "$IMG" || echo "::warning::docker pull $IMG failed; using locally-present image if any"
          if ! docker image inspect "$IMG" >/dev/null 2>&1; then
            echo "::error::tenant image $IMG not available locally or in registry"
            exit 1
          fi

          # Guard B (candidate-identity): resolve the candidate image's git
          # revision from its OCI label so the health gate below can assert the
          # ROLLED container is genuinely running THIS candidate — not a stale
          # image that a silently-failed swap left behind. Best-effort: an image
          # with no revision label falls back to liveness-only (logged).
          EXPECT_REV="$(docker image inspect "$IMG" \
            --format '{{ index .Config.Labels "org.opencontainers.image.revision" }}' 2>/dev/null || true)"
          EXPECT_REV="$(printf '%s' "$EXPECT_REV" | tr -d '[:space:]')"
          if [ -n "$EXPECT_REV" ]; then
            echo "::notice::candidate image revision = ${EXPECT_REV} — the health gate will assert each rolled canary/container reports it via /buildinfo"
          else
            echo "::warning::candidate image $IMG carries no org.opencontainers.image.revision label — health gate falls back to LIVENESS-ONLY (cannot verify candidate identity)"
          fi

          # Enumerate only the running, labeled production tenant containers on
          # this Docker host. This is not control-plane-wide inventory.
          mapfile -t TENANTS < <(docker ps \
            --filter 'label=molecule.local-tenant=1' \
            --filter 'label=molecule.cp-env=production' \
            --format '{{.Names}}' | sort)

          if [ ${#TENANTS[@]} -eq 0 ]; then
            echo "::warning::no running production tenant containers found — nothing to roll"
          else
            echo "Labeled local-Docker production tenants to roll (${#TENANTS[@]}): ${TENANTS[*]}"
          fi

          # readiness gate: was /buildinfo-LIVENESS-ONLY (a container answering 200
          # tells you nothing about WHICH image it runs). Guard B deepens it to a
          # CANDIDATE-IDENTITY gate: /buildinfo must not only answer, it must report
          # the candidate's git_sha (EXPECT_REV). This turns the canary swap into a
          # real "the candidate is actually running" gate BEFORE this subset fans out
          # — a swap that silently kept the stale image now REDs the roll instead of
          # passing a hollow liveness check. (The full A2A provision_workspace
          # CALLABLE assertion for the prod image is enforced upstream by the
          # staging gate TestPlatformAgentMgmtMCP_Staging with
          # E2E_ASSERT_MGMT_MCP_CALLABLE=1, which blocks the prod promote.)
          health_gate() {
            local name="$1" port body sha
            port="$(docker port "$name" 8080/tcp 2>/dev/null | head -1 | sed 's/.*://')"
            [ -n "$port" ] || return 1
            for _ in $(seq 1 20); do
              body="$(curl -fsS --max-time 5 "http://127.0.0.1:${port}/buildinfo" 2>/dev/null || true)"
              if [ -n "$body" ]; then
                if [ -z "$EXPECT_REV" ]; then
                  return 0  # liveness-only fallback (no candidate revision to check)
                fi
                sha="$(printf '%s' "$body" | python3 -c 'import sys,json; d=json.load(sys.stdin); sys.stdout.write(str(d.get("git_sha","")) if isinstance(d,dict) else "")' 2>/dev/null || true)"
                case "$EXPECT_REV" in
                  "$sha"*) return 0 ;;
                  *) case "$sha" in "$EXPECT_REV"*) return 0 ;; esac ;;
                esac
                # answered but wrong image — keep polling briefly (the recreate may
                # still be finishing), then fail identity below.
                echo "::warning::$name /buildinfo git_sha='${sha}' != candidate '${EXPECT_REV}' — awaiting candidate"
              fi
              sleep 3
            done
            return 1
          }

          swap_tenant() {
            local name="$1" image="$2"
            local bak="${name}-redeploy-bak"
            local net restart envfile
            net="$(docker inspect "$name" --format '{{range $k,$v := .NetworkSettings.Networks}}{{$k}}{{end}}')"
            restart="$(docker inspect "$name" --format '{{.HostConfig.RestartPolicy.Name}}')"
            envfile="$(mktemp)"
            docker inspect "$name" --format '{{range .Config.Env}}{{println .}}{{end}}' \
              | grep -vE '^(PATH|NODE_VERSION|YARN_VERSION)=' > "$envfile"
            local labelargs=() hostargs=()
            while IFS= read -r l; do [ -n "$l" ] && labelargs+=( --label "$l" ); done \
              < <(docker inspect "$name" --format '{{range $k,$v := .Config.Labels}}{{$k}}={{$v}}{{println}}{{end}}' \
                    | grep -vE '^(org.opencontainers|com.docker)')
            while IFS= read -r h; do [ -n "$h" ] && hostargs+=( --add-host "$h" ); done \
              < <(docker inspect "$name" --format '{{range .HostConfig.ExtraHosts}}{{println .}}{{end}}')

            docker rename "$name" "$bak"
            docker stop "$bak" >/dev/null

            if ! docker run -d \
                  --name "$name" \
                  --network "$net" \
                  --restart "${restart:-always}" \
                  --env-file "$envfile" \
                  "${labelargs[@]}" "${hostargs[@]}" \
                  -p 127.0.0.1::8080 \
                  "$image" >/dev/null 2>/tmp/run.err; then
              echo "::error::docker run failed for $name:"; cat /tmp/run.err
              rm -f "$envfile"
              docker rm -f "$name" 2>/dev/null || true
              docker rename "$bak" "$name"; docker start "$name" >/dev/null
              return 1
            fi
            rm -f "$envfile"

            if ! health_gate "$name"; then
              echo "::error::$name failed health gate on $image — rolling back"
              docker rm -f "$name" 2>/dev/null || true
              docker rename "$bak" "$name"; docker start "$name" >/dev/null
              return 1
            fi
            docker rm "$bak" >/dev/null 2>&1 || true
            echo "  ✓ $name rolled to $image"
            return 0
          }

          FAILED=0
          FIRST=1
          for t in "${TENANTS[@]}"; do
            if [ "$FIRST" = 1 ]; then
              echo "== canary: $t =="
              swap_tenant "$t" "$IMG" || { echo "::error::canary $t failed — aborting local-Docker subset roll"; FAILED=1; break; }
              FIRST=0
            else
              echo "== $t =="
              swap_tenant "$t" "$IMG" || { FAILED=1; break; }
            fi
          done

          # Optional production shared canvas app roll (only when configured).
          if [ -n "${PROD_CANVAS_APP_CONTAINER}" ] \
             && docker ps -a --format '{{.Names}}' | grep -qx "${PROD_CANVAS_APP_CONTAINER}"; then
            CANVAS_TAG="${TARGET_TAG_OVERRIDE:-$DEFAULT_CANVAS_TAG}"
            CIMG="${CANVAS_APP_IMAGE}:${CANVAS_TAG}"
            echo "== shared canvas app: ${PROD_CANVAS_APP_CONTAINER} -> ${CIMG} =="
            docker pull "$CIMG" || echo "::warning::pull $CIMG failed; using local image if present"
            if docker image inspect "$CIMG" >/dev/null 2>&1; then
              net="$(docker inspect "${PROD_CANVAS_APP_CONTAINER}" --format '{{range $k,$v := .NetworkSettings.Networks}}{{$k}}{{end}}')"
              pbind="$(docker inspect "${PROD_CANVAS_APP_CONTAINER}" --format '{{range $p,$b := .HostConfig.PortBindings}}{{range $b}}{{.HostPort}}{{end}}{{end}}')"
              cenv="$(mktemp)"
              docker inspect "${PROD_CANVAS_APP_CONTAINER}" --format '{{range .Config.Env}}{{println .}}{{end}}' \
                | grep -vE '^(PATH|NODE_VERSION|YARN_VERSION|NODE_ENV|HOSTNAME|PORT|NEXT_TELEMETRY_DISABLED)=' > "$cenv"
              docker rename "${PROD_CANVAS_APP_CONTAINER}" "${PROD_CANVAS_APP_CONTAINER}-redeploy-bak"
              docker stop "${PROD_CANVAS_APP_CONTAINER}-redeploy-bak" >/dev/null
              if docker run -d --name "${PROD_CANVAS_APP_CONTAINER}" --network "${net:-molecule-net}" \
                   --restart unless-stopped --env-file "$cenv" \
                   -p "${pbind:-3100}:3000" "$CIMG" >/dev/null 2>/tmp/cvrun.err; then
                sleep 5
                if curl -fsS --max-time 8 "http://127.0.0.1:${pbind:-3100}/" >/dev/null 2>&1; then
                  docker rm "${PROD_CANVAS_APP_CONTAINER}-redeploy-bak" >/dev/null 2>&1 || true
                  echo "  ✓ ${PROD_CANVAS_APP_CONTAINER} rolled to ${CIMG}"
                else
                  echo "::error::${PROD_CANVAS_APP_CONTAINER} unhealthy after roll — rolling back"
                  docker rm -f "${PROD_CANVAS_APP_CONTAINER}" 2>/dev/null || true
                  docker rename "${PROD_CANVAS_APP_CONTAINER}-redeploy-bak" "${PROD_CANVAS_APP_CONTAINER}"
                  docker start "${PROD_CANVAS_APP_CONTAINER}" >/dev/null
                  FAILED=1
                fi
              else
                echo "::error::docker run failed for ${PROD_CANVAS_APP_CONTAINER}:"; cat /tmp/cvrun.err
                docker rm -f "${PROD_CANVAS_APP_CONTAINER}" 2>/dev/null || true
                docker rename "${PROD_CANVAS_APP_CONTAINER}-redeploy-bak" "${PROD_CANVAS_APP_CONTAINER}"
                docker start "${PROD_CANVAS_APP_CONTAINER}" >/dev/null
                FAILED=1
              fi
              rm -f "$cenv"
            fi
          fi

          {
            echo "## Labeled production subset redeploy (molecules-server / local-Docker)"
            echo ""
            echo "- Tenant image: \`${IMG}\`"
            echo "- Tenants rolled: ${#TENANTS[@]}"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$FAILED" != 0 ]; then
            echo "::error::local-Docker production subset redeploy had at least one failure (see log/summary)"
            exit 1
          fi
          echo "::notice::local-Docker production subset redeploy complete"
