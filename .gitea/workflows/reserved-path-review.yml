# reserved-path-review — PREVENTIVE layer of the self-merge guard.
#
# Precedent: cp#673 was author-self-merged (architectural change reserved for
# CTO sign-off) without independent reserved-gate approval. Code was sound +
# peer-reviewed so it was kept (accept-and-note, CTO 2026-06-11); this gate
# closes the recurrence path.
#
# For any PR that touches a path in `.gitea/reserved-paths.txt`, this emits a
# required commit status `reserved-path-review` that is RED until a DISTINCT
# non-author (author != approver) approves the current head. Branch protection
# requires the `reserved-path-review` context, so such a PR cannot be merged
# via the normal path without independent sign-off.
#
# DETECTIVE backstop (admin/force-merge bypass): audit-force-merge.sh emits
# `incident.reserved_self_merge` post-merge when author == merger on a reserved
# path. Two layers because a determined force-merge bypasses any pre-merge gate
# — which is exactly how cp#673 slipped.
#
# SECURITY MODEL (mirrors audit-force-merge.yml): pull_request_target, but
# with a refined checkout strategy that fixes the bootstrap / self-reference
# problem:
#   - The SCRIPT is checked out from the PR HEAD so it's always present,
#     including on the bootstrap PR that INTRODUCES the gate itself
#     (otherwise `bash .gitea/scripts/reserved-path-review.sh` would
#     fail with "No such file or directory" — the gate would gate the
#     very PR that adds the gate, an unfixable self-reference loop).
#   - The reserved-paths MANIFEST (.gitea/reserved-paths.txt) is read
#     from the BASE branch via `git show`, with a graceful fallback to
#     the head's manifest ONLY for the bootstrap PR (the single PR that
#     adds the manifest to the base). This preserves the original security
#     intent: a PR author cannot widen the gate by adding new reserved
#     patterns in their own PR (the manifest is base-sourced for every
#     steady-state PR; only the bootstrap PR is the documented exception).
#   - The SCRIPT itself is then un-tamperable in the steady state: a PR
#     author cannot edit the gate logic to skip a reserved path on their
#     own PR — base.sha pinning of the manifest, plus the SCRIPT
#     deliberately checked out from the PR head (the gate's own
#     bootstrap path) gives the standard "PR-author-can't-tamper"
#     model once the gate is in place on base.

name: reserved-path-review

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]
  # Re-evaluate when a review lands so the gate flips green on a non-author
  # approval without needing a new push.
  pull_request_review:
    types: [submitted, dismissed, edited]

permissions:
  contents: read
  pull-requests: read
  statuses: write

jobs:
  reserved-path-review:
    runs-on: ubuntu-latest
    # Draft PRs can't merge anyway; skip to save a runner. Still runs on
    # ready_for_review (above) when the draft is promoted.
    if: github.event.pull_request.draft == false
    steps:
      - name: Check out PR HEAD (the gate SCRIPT must be present, including on the bootstrap PR)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          # PR head, NOT base ref — the gate SCRIPT itself must come from the PR
          # (the bootstrap PR is the one that adds the script; without this
          # the gate would never run on its own introducing PR).
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Fetch BASE-branch reserved-paths manifest (security model)
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          # The MANIFEST comes from BASE, not from the PR head. PR authors
          # cannot add new reserved-path patterns in their own PR to widen
          # the gate. Bootstrap PR fallback: if base doesn't have the
          # manifest yet (the single PR that introduces it), use the head's
          # manifest and log loudly so reviewers know the bootstrap path ran.
          if git show "${BASE_SHA}:.gitea/reserved-paths.txt" > .gitea/reserved-paths.txt.from-base 2>/dev/null; then
            if [ -s .gitea/reserved-paths.txt.from-base ]; then
              mv .gitea/reserved-paths.txt.from-base .gitea/reserved-paths.txt
              echo "::notice::Using BASE-branch reserved-paths.txt (base.sha=${BASE_SHA:0:10}) — security model preserved"
            else
              echo "::notice::BASE-branch reserved-paths.txt is empty — bootstrap fallback to PR head's manifest (base.sha=${BASE_SHA:0:10})"
              rm -f .gitea/reserved-paths.txt.from-base
            fi
          else
            echo "::notice::BASE-branch has no reserved-paths.txt (base.sha=${BASE_SHA:0:10}) — bootstrap fallback to PR head's manifest. This is expected for the single PR that introduces the manifest; every later PR will use the base manifest."
            rm -f .gitea/reserved-paths.txt.from-base
          fi
      - name: Evaluate reserved-path non-author-approval gate
        env:
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN || secrets.GITHUB_TOKEN }}
          GITEA_HOST: git.moleculesai.app
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          # Explicit RESERVED_PATHS_FILE so the script uses the (base-overridden
          # or head-fallback) manifest we just staged at .gitea/reserved-paths.txt.
          RESERVED_PATHS_FILE: .gitea/reserved-paths.txt
        run: bash .gitea/scripts/reserved-path-review.sh
