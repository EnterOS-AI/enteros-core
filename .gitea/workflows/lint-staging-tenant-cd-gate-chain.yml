name: lint-staging-tenant-cd-gate-chain

# Static gate-shape lint for the gated staging tenant CD pipeline. Reuses the
# same behavior-based (needs-graph) approach as the control-plane's
# lint_deploy_gate_chain.py, encoding the tenant CD contract:
#
#   - e2e-smoke      needs (transitively) await-image
#   - advance-pin    needs (transitively) e2e-smoke
#   - redeploy-fleet needs (transitively) advance-pin
#   - no continue-on-error on any gating job or step
#
# A future edit that drops the e2e-smoke -> redeploy-fleet path, or masks a gate
# failure with continue-on-error, FAILS this lint — so "the staging tenant fleet
# is never rolled on a red e2e gate" stays mechanical, not a convention.
#
# No paths: filter — a genuine gate, runs on every PR (merge-blocking via
# ci / all-required).

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main, staging]

permissions:
  contents: read

concurrency:
  group: lint-staging-tenant-cd-gate-chain-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint-staging-tenant-cd-gate-chain
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
      - name: Install PyYAML
        run: python -m pip install --quiet 'PyYAML==6.0.2'
      - name: Lint staging tenant CD gate chain
        run: python3 .gitea/scripts/lint_staging_tenant_cd_gate_chain.py
