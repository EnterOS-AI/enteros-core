name: lint-staging-tenant-cd-gate-chain

# Static gate-shape lint for the gated staging tenant CD pipeline. Reuses the
# same behavior-based (needs-graph) approach as the control-plane's
# lint_deploy_gate_chain.py, encoding the tenant CD contract:
#
#   - advance-pin    directly needs await-image
#   - redeploy-fleet directly needs advance-pin
#   - runtime-image-readiness needs advance-pin and runs the exact guarded
#     local-deploy consumer
#   - e2e-smoke      directly needs both redeploy-fleet and readiness
#   - no continue-on-error on any gating job or step
#   - no provider-specific CP deploy/reload adapter in tenant-image CI
#
# A future edit that drops either pre-E2E path, moves readiness off local-deploy,
# masks a gate failure with continue-on-error, or reintroduces Railway/other
# provider-specific CP deploy wiring into this tenant-image workflow FAILS this
# lint.
#
# No paths: filter — a genuine gate, runs on every PR (merge-blocking via
# ci / all-required).

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main, staging]

permissions:
  contents: read

concurrency:
  group: lint-staging-tenant-cd-gate-chain-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint-staging-tenant-cd-gate-chain
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
      - name: Install PyYAML
        run: python -m pip install --quiet 'PyYAML==6.0.2'
      - name: Lint staging tenant CD gate chain
        run: python3 .gitea/scripts/lint_staging_tenant_cd_gate_chain.py
