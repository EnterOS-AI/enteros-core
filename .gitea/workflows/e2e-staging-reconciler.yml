# ADAPTED 2026-07-03 (AWS account closed → local-docker rework): the kill
# primitive is now `docker rm -f <container>` on the MOLECULES-SERVER
# (local-docker) provider by default (E2E_PROVIDER=molecules-server); the legacy
# EC2 path is one env flip away (E2E_PROVIDER=aws). Auto-triggers RE-ENABLED — the
# original disable reason (AWS account closed) no longer applies now that the
# default kill is docker, and this job is advisory (continue-on-error: true) so a
# red run cannot block a merge while the core health/browser + a9f331fa gate fixes
# land.
name: E2E Staging Reconciler (heals killed workspace instance)

# Live staging proof for the core#2261 instance-state reconciler
# (workspace-server/internal/registry/cp_instance_reconciler.go). The
# real-infra complement to the deterministic unit tests: provisions a real
# staging workspace, KILLS its instance (docker rm -f the mol-ws container on
# molecules-server; aws ec2 terminate-instances on aws), and asserts the
# reconciler flips it off 'online' (PRIMARY gate) and auto-reprovisions on a new
# instance_id (SECONDARY, best-effort). See
# tests/e2e/test_reconciler_heals_terminated_instance.sh for the assertion
# contract + timeouts.
#
# Modeled on e2e-staging-saas.yml. Same secrets + same repository policy:
#   - Kept flat workflow_dispatch (no inputs); callers use env/vars.
#   - Omitted GitHub merge_group and environment coupling; this repository
#     uses its serialized Gitea queue and explicit approval/secret gates.
#   - Workflow-level env.GITHUB_SERVER_URL pinned per
#     feedback_act_runner_github_server_url.
#
# NOT a required check (yet). continue-on-error: true surfaces failures without
# blocking. PROMOTE to branch-required (flip continue-on-error → false AND
# add "E2E Staging Reconciler" to branch protection) once it has run green on
# main for several consecutive days on molecules-server — same de-flake
# discipline the platform-boot job in e2e-staging-saas.yml documents.

on:
  # RE-ENABLED (2026-07-03): the push-to-main auto-trigger runs the docker-kill
  # reconciler proof post-merge whenever the reconciler / script / libs change
  # (paths filter). Advisory (continue-on-error) so a needsCoreFix red on main is
  # informational, not blocking. The schedule/cron trigger stays DELETED
  # (no-nightly-e2e rule).
  push:
    branches: [main]
    paths:
      - 'workspace-server/internal/registry/cp_instance_reconciler.go'
      - 'tests/e2e/test_reconciler_heals_terminated_instance.sh'
      - 'tests/e2e/lib/collision-proof-slug.sh'
      - 'tests/e2e/lib/model_slug.sh'
      - 'tests/e2e/lib/reconciler_container.sh'
      - '.gitea/workflows/e2e-staging-reconciler.yml'
  # pull_request auto-trigger deliberately NOT re-armed yet: it would run a REAL
  # staging molecules-server provision + docker-kill on EVERY PR touching these
  # paths (box load), and this lane is still red pending the core health/browser +
  # a9f331fa gate fixes. RE-ARM once green + once the box can absorb per-PR live
  # runs (restore the same paths block as push above).
  # pull_request:
  #   branches: [main]
  #   paths: [ ...same as push... ]
  workflow_dispatch:

# Per-SHA grouping (mirrors e2e-api.yml). Each run provisions its OWN isolated
# tenant (`e2e-rec-<date>-<run_id>`), so overlapping runs never corrupt each
# other — the finite staging org-creation quota is a throttling cost only. A
# STATIC group would make a newer main push cancel the older commit's run. A
# legacy runner incident showed superseded same-group runs could be CANCELLED
# (not queued) even with cancel-in-progress:false, stamping a cancel-red
# that wedges the `[*]` queue. cancel-in-progress:false so a cancelled run never
# aborts a teardown mid-flight (EC2/container leak guard).
concurrency:
  group: e2e-staging-reconciler-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: false

env:
  GITHUB_SERVER_URL: https://git.moleculesai.app

jobs:
  # PR-validation path: always posts success so a workflow-only / script-only
  # PR has a status check (this workflow's real job only fires on the paths
  # filter). Mirrors the pr-validate job in e2e-staging-saas.yml.
  pr-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
        continue-on-error: true
      - name: YAML validation (best-effort)
        run: |
          echo "e2e-staging-reconciler.yml — PR validation: workflow YAML is valid."
          echo "Live E2E step runs only when the reconciler / script / libs change."
        continue-on-error: true

  e2e-staging-reconciler:
    name: E2E Staging Reconciler
    runs-on: ubuntu-latest
    # NOT required yet — surface failures without blocking merges. Flip to
    # false + add to branch protection once green on main for a de-flake
    # window (see the header note). mc#3436: do not renew this mask silently.
    continue-on-error: true
    timeout-minutes: 60
    permissions:
      contents: read

    env:
      MOLECULE_CP_URL: https://staging-api.moleculesai.app
      # Single admin-bearer secret drives provision + tenant-token retrieval +
      # teardown. The bearer is sourced from Infisical staging
      # /shared/controlplane-admin, matching the other live-staging workflows.
      # MOLECULE_ADMIN_TOKEN now arrives via $GITHUB_ENV from the "Fetch platform
      # model+runtime from KMS SSOT" step below (wave-B staging consumers
      # migration extends that same fetch). It is sourced from Infisical
      # CP_ADMIN_API_TOKEN at staging /shared/controlplane-admin. The old
      # CP_STAGING_ADMIN_API_TOKEN Gitea Actions secret is left in place until a
      # green run validates this path (validate-before-delete). The Verify-
      # required-secrets gate still validates MOLECULE_ADMIN_TOKEN is non-empty.
      # Provider knob: molecules-server (local-docker) is the DEFAULT — the kill
      # primitive is `docker rm -f <container>` and teardown's leak-check is a
      # `docker ps -a` sweep (no cloud IAM creds needed). Set E2E_PROVIDER=aws to
      # restore the legacy EC2 path (which then needs AWS_ACCESS_KEY_ID /
      # AWS_SECRET_ACCESS_KEY + E2E_AWS_LEAK_CHECK — wire them back here too).
      E2E_PROVIDER: molecules-server
      # Platform model + runtime are de-hardcoded to the KMS SSOT
      # (/shared/controlplane/llm @ environment=staging) by the
      # "Fetch platform model+runtime from KMS SSOT" step below, which exports
      # E2E_RUNTIME / E2E_MODEL / E2E_MODEL_SLUG via $GITHUB_ENV on TRUSTED refs
      # only (push/dispatch/schedule or a same-repo non-fork pull_request --
      # never an untrusted-fork pull_request, because molecule-core is a PUBLIC
      # repo). These literals are the
      # fail-safe default for the untrusted-fork / local path and are kept ==
      # the staging KMS values (runtime=claude-code, model=moonshot/kimi-k2.6),
      # so this is BEHAVIOR-NEUTRAL: trusted runs read the same values from KMS,
      # untrusted/local runs fall back to the same literals.
      E2E_RUNTIME: claude-code
      # Platform-managed create path (moonshot/kimi-k2.6, no tenant key) — the
      # combo proven to create cleanly; this test only needs the ws online.
      #
      # On the platform path the model is normally left implicit (the harness's
      # pick_model_slug returns the platform default). The KMS step below sets
      # E2E_MODEL_SLUG to the KMS-sourced model id on trusted refs; that id ==
      # the platform default literal (moonshot/kimi-k2.6), so the resolved slug
      # is unchanged. On untrusted-fork PRs / local the step is skipped and the
      # implicit default applies — same slug either way.
      #
      # DELIBERATELY no static E2E_MODEL_SLUG and no E2E_*_API_KEY here — mirror the
      # e2e-staging-platform-boot job in e2e-staging-saas.yml. On
      # E2E_LLM_PATH=platform the harness sends EMPTY secrets and lets
      # pick_model_slug return the platform default moonshot/kimi-k2.6 (a member
      # of the providers.yaml claude-code `platform` arm → provider=platform,
      # billed by the CP LLM proxy, NO tenant key required).
      #
      # The previous wiring set E2E_MODEL_SLUG: MiniMax-M2 (a BARE id in the
      # providers.yaml `minimax` BYOK arm → provider=minimax, requires
      # MINIMAX_API_KEY) while sending secrets={} on the platform path. Because
      # E2E_MODEL_SLUG wins over the E2E_LLM_PATH=platform branch in
      # pick_model_slug, the workspace got a keyless BYOK-minimax model, could
      # not resolve a serving path, and booted to status=failed — never online
      # (run 223233: "MODEL_SLUG=MiniMax-M2" then "→ failed", "never reached
      # status=online within 900s"). The BYOK key wiring was equally misleading:
      # the harness ignores E2E_*_API_KEY on E2E_LLM_PATH=platform, so the keys
      # only made the contradiction harder to spot. Platform-only is correct
      # here — this test exercises instance-state, never an LLM completion.
      E2E_LLM_PATH: platform
      E2E_RUN_ID: "${{ github.run_id }}-${{ github.run_attempt }}"
      E2E_KEEP_ORG: ${{ github.event.inputs.keep_org && '1' || '0' }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # De-hardcode the platform model + runtime to the Infisical/KMS SSOT
      # (/shared/controlplane/llm @ environment=staging), mirroring the CP
      # bench-provision-time.yml KMS-fetch recipe generalised to read BOTH
      # MOLECULE_LLM_DEFAULT_MODEL -> $E2E_MODEL and MOLECULE_DEFAULT_RUNTIME ->
      # $E2E_RUNTIME. Exported to $GITHUB_ENV so later steps read them as
      # ordinary masked env vars; E2E_MODEL_SLUG is also set to the model id so
      # the platform-path harness pins the SSOT model id explicitly.
      #
      # TRUSTED-REF GATE: molecule-core is a PUBLIC repo. This step authenticates
      # the CI machine identity and reads org secrets, so it MUST NOT run for an
      # untrusted-fork pull_request. It runs on protected-branch push / operator
      # workflow_dispatch / schedule, AND on a SAME-REPO (non-fork) pull_request
      # -- a trusted PR whose head lives in this repo -- so PR CI actually
      # exercises the staging KMS-default lane. Only untrusted-FORK PRs are
      # skipped. On the skipped (untrusted-fork / local) path the job falls back
      # to the env-block literals, which are kept == the staging KMS values -- so
      # the resolved model+runtime are identical either way (behavior-neutral).
      - name: Fetch platform model+runtime from KMS SSOT
        id: kms_llm
        # Run on trusted refs: protected-branch push / operator dispatch /
        # schedule, OR a SAME-REPO (non-fork) pull_request. A same-repo PR is
        # trusted (its head lives in this repo, gated by branch protection), so
        # it may read KMS -- this lets PR CI actually exercise the staging
        # KMS-default lane. Only UNTRUSTED forks are skipped (their head repo's
        # .fork == true), where the env-block literals are the fail-safe default.
        if: >-
          github.event_name == 'push' ||
          github.event_name == 'workflow_dispatch' ||
          github.event_name == 'schedule' ||
          (github.event_name == 'pull_request' &&
           github.event.pull_request.head.repo.fork == false)
        env:
          INFISICAL_CI_CLIENT_ID: ${{ secrets.INFISICAL_CI_CLIENT_ID }}
          INFISICAL_CI_CLIENT_SECRET: ${{ secrets.INFISICAL_CI_CLIENT_SECRET }}
          INFISICAL_PROJECT_ID: ${{ secrets.INFISICAL_CI_PROJECT_ID }}
        run: |
          set -uo pipefail
          BASE="https://key.moleculesai.app"
          TOK=$(curl -fsS -X POST "$BASE/api/v1/auth/universal-auth/login" \
            -H 'Content-Type: application/json' \
            -d "{\"clientId\":\"$INFISICAL_CI_CLIENT_ID\",\"clientSecret\":\"$INFISICAL_CI_CLIENT_SECRET\"}" \
            | python3 -c 'import sys,json; v=json.load(sys.stdin).get("accessToken"); sys.stdout.write(v if isinstance(v,str) else "")')
          if [ -z "$TOK" ]; then echo "::error::Infisical accessToken empty - failing closed"; exit 1; fi
          read_secret() {
            curl -fsS "$BASE/api/v3/secrets/raw/$1?workspaceId=$INFISICAL_PROJECT_ID&environment=staging&secretPath=$2" \
              -H "Authorization: Bearer $TOK" \
              | python3 -c 'import sys,json; v=json.load(sys.stdin).get("secret",{}).get("secretValue"); sys.stdout.write(v if isinstance(v,str) else "")'
          }
          E2E_MODEL=$(read_secret MOLECULE_LLM_DEFAULT_MODEL %2Fshared%2Fcontrolplane%2Fllm)
          E2E_RUNTIME=$(read_secret MOLECULE_DEFAULT_RUNTIME %2Fshared%2Fcontrolplane%2Fllm)
          echo "::add-mask::$E2E_MODEL"
          echo "::add-mask::$E2E_RUNTIME"
          # Fail closed: an empty SSOT value must abort, never silently fall
          # back to the literal and mask a KMS regression.
          if [ -z "$E2E_MODEL" ]; then
            echo "::error::MOLECULE_LLM_DEFAULT_MODEL is empty in KMS (/shared/controlplane/llm @ staging)"
            exit 1
          fi
          if [ -z "$E2E_RUNTIME" ]; then
            echo "::error::MOLECULE_DEFAULT_RUNTIME is empty in KMS (/shared/controlplane/llm @ staging)"
            exit 1
          fi
          # Wave-B: staging CP admin bearer (CP_ADMIN_API_TOKEN @ staging
          # /shared/controlplane-admin) -> MOLECULE_ADMIN_TOKEN, replacing the
          # duplicated CP_STAGING_ADMIN_API_TOKEN Gitea Actions secret.
          MOLECULE_ADMIN_TOKEN=$(read_secret CP_ADMIN_API_TOKEN %2Fshared%2Fcontrolplane-admin)
          echo "::add-mask::$MOLECULE_ADMIN_TOKEN"
          if [ -z "$MOLECULE_ADMIN_TOKEN" ]; then
            echo "::error::Infisical returned empty CP_ADMIN_API_TOKEN at staging /shared/controlplane-admin — failing closed."
            exit 1
          fi
          {
            echo "E2E_MODEL=$E2E_MODEL"
            echo "E2E_MODEL_SLUG=$E2E_MODEL"
            echo "E2E_RUNTIME=$E2E_RUNTIME"
            echo "MOLECULE_ADMIN_TOKEN=$MOLECULE_ADMIN_TOKEN"
          } >> "$GITHUB_ENV"
          echo "Platform model+runtime + admin token loaded from KMS SSOT (model len=${#E2E_MODEL}, runtime len=${#E2E_RUNTIME}, admin len=${#MOLECULE_ADMIN_TOKEN})"

      - name: Verify required secrets + kill capability present
        run: |
          if [ -z "$MOLECULE_ADMIN_TOKEN" ]; then
            echo "::error::MOLECULE_ADMIN_TOKEN not loaded from Infisical staging /shared/controlplane-admin"
            exit 2
          fi
          if [ "${E2E_PROVIDER:-molecules-server}" = "aws" ]; then
            # Legacy EC2 path: AWS creds are mandatory (terminate + leak-verify).
            for var in AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY; do
              if [ -z "${!var:-}" ]; then
                echo "::error::$var not set — E2E_PROVIDER=aws terminates an EC2 and verifies no leak; AWS creds are mandatory"
                exit 2
              fi
            done
          else
            # molecules-server: the reconciler test docker-kills the mol-ws
            # container, so the runner must reach the docker daemon CP's
            # local-docker backend used (DOCKER_HOST → the molecules-server host;
            # a co-located self-hosted runner shares it).
            if ! docker info >/dev/null 2>&1; then
              echo "::error::docker daemon unreachable — E2E_PROVIDER=molecules-server kills the workspace CONTAINER. Point DOCKER_HOST at the molecules-server host (needs the core health/browser + a9f331fa gate wiring)."
              exit 2
            fi
          fi
          echo "Required secrets + kill capability present ✓"

      - name: CP staging health preflight
        run: |
          code=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 10 "$MOLECULE_CP_URL/health")
          if [ "$code" != "200" ]; then
            echo "::error::Staging CP unhealthy (got HTTP $code). Skipping — not a reconciler bug."
            exit 1
          fi
          echo "Staging CP healthy ✓"

      - name: Run reconciler heal E2E
        id: e2e
        run: bash tests/e2e/test_reconciler_heals_terminated_instance.sh

      # Belt-and-braces teardown: the script installs its own EXIT trap, but if
      # the runner is cancelled the trap may not fire. This always() step
      # double-deletes any e2e-rec-* org from THIS run. The admin DELETE is
      # idempotent so double-invoking is safe.
      - name: Teardown safety net (runs on cancel/failure)
        if: always()
        env:
          # Sourced from Infisical (staging /shared/controlplane-admin) via the
          # "Fetch platform model+runtime from KMS SSOT" job step above.
          ADMIN_TOKEN: ${{ env.MOLECULE_ADMIN_TOKEN }}
        run: |
          set +e
          orgs=$(curl -sS "$MOLECULE_CP_URL/cp/admin/orgs" \
            -H "Authorization: Bearer $ADMIN_TOKEN" 2>/dev/null \
            | python3 -c "
          import json, sys, os, datetime
          run_id = os.environ.get('GITHUB_RUN_ID', '')
          d = json.load(sys.stdin)
          today = datetime.date.today()
          yesterday = today - datetime.timedelta(days=1)
          dates = (today.strftime('%Y%m%d'), yesterday.strftime('%Y%m%d'))
          # Slug shape: e2e-rec-YYYYMMDD-<run_id>-<attempt>-...
          if run_id:
              prefixes = tuple(f'e2e-rec-{d}-{run_id}-' for d in dates)
          else:
              prefixes = tuple(f'e2e-rec-{d}-' for d in dates)
          candidates = [o['slug'] for o in d.get('orgs', [])
                        if any(o.get('slug','').startswith(p) for p in prefixes)
                        and o.get('instance_status') not in ('purged',)]
          print('\n'.join(candidates))
          " 2>/dev/null)
          leaks=()
          for slug in $orgs; do
            echo "Safety-net teardown: $slug"
            set +e
            curl -sS -o /tmp/rec-cleanup.out -w "%{http_code}" \
              -X DELETE "$MOLECULE_CP_URL/cp/admin/tenants/$slug" \
              -H "Authorization: Bearer $ADMIN_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"confirm\":\"$slug\"}" >/tmp/rec-cleanup.code
            set -e
            code=$(cat /tmp/rec-cleanup.code 2>/dev/null || echo "000")
            if [ "$code" = "200" ] || [ "$code" = "204" ]; then
              echo "[teardown] deleted $slug (HTTP $code)"
            else
              echo "::warning::reconciler teardown for $slug returned HTTP $code — investigate now; sweep-stale-e2e-orgs retries on a later main push after its 90m age floor. Body: $(head -c 300 /tmp/rec-cleanup.out 2>/dev/null)"
              leaks+=("$slug")
            fi
          done
          if [ ${#leaks[@]} -gt 0 ]; then
            echo "::warning::reconciler teardown left ${#leaks[@]} leak(s): ${leaks[*]}"
          fi
          exit 0
