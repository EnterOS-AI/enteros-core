name: E2E External Connect-Snippet + Leak-Lint

# Per-PR CI-E2E lane for the "Connect your external agent" flow + the
# class-level internal-address leak-lint.
#
# WHY ITS OWN LANE
#   The fix (molecule-controlplane #1050) makes the CP inject the PUBLIC
#   tunnel URL (EXTERNAL_PLATFORM_URL / PLATFORM_URL) so the connect snippet
#   the workspace-server returns is the public https://<slug>.moleculesai.app,
#   never the in-box host.docker.internal published-port address. #1050 added
#   CP-side unit tests; this lane adds the CORE-side, end-to-end guard the
#   principal asked for:
#     • a hermetic E2E that drives the REAL connect-snippet endpoint
#       (GET /workspaces/:id/external/connection) with the EXACT env the CP
#       injects and asserts platform_url / registry_endpoint /
#       heartbeat_endpoint are public HTTPS with NO host.docker.internal /
#       127.0.0.1 / localhost / raw :<port>
#       (TestE2E_ExternalConnectSnippet_*); and
#     • a class-level leak-lint that reds CI even for a NEW external endpoint
#       added later — it enforces that every BuildExternalConnectionPayload
#       caller sources its base from the sanitized externalPlatformURL()
#       chokepoint, that no external_*.go builder hardcodes an internal
#       address, and that the chokepoint never leaks under the prod env
#       (TestLeakLint_*).
#
#   These tests ALSO run in the required `Platform (Go)` gate (go test ./...),
#   so a regression reds CI there too; this lane surfaces them as an explicit,
#   fast, named status context scoped to the handlers package.
#
# SCOPE NOTE
#   The guard is confined to molecule-core's EXTERNAL-facing handlers. The
#   legit in-box host.docker.internal lives in molecule-controlplane (the
#   local_docker provisioner / resolveTenantPlatformURL) — a different repo,
#   never touched here.
#
# Gitea port notes (per the .gitea/workflows house style):
#   - no merge_group (no Gitea merge queue), no workflow_dispatch.inputs,
#     no environment: blocks; GITHUB_SERVER_URL pinned at workflow level.

on:
  push:
    branches: [main, staging]
    paths:
      - 'workspace-server/internal/handlers/**'
      - 'canvas/src/components/__tests__/__fixtures__/**'
      - '.gitea/workflows/e2e-external-connect-snippet.yml'
  pull_request:
    branches: [main, staging]
    paths:
      - 'workspace-server/internal/handlers/**'
      - 'canvas/src/components/__tests__/__fixtures__/**'
      - '.gitea/workflows/e2e-external-connect-snippet.yml'

concurrency:
  group: e2e-connect-snippet-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  GITHUB_SERVER_URL: https://git.moleculesai.app

jobs:
  # Real merge-blocking connect-snippet leak gate. main's ["*"] all-green
  # wildcard already enforces this context; the literal BP enrollment (or
  # teaching lint_required_context_exists_in_bp.py the "*" wildcard) is #3469.
  # bp-required: pending #3469
  connect-snippet-e2e:
    name: E2E External Connect-Snippet + Leak-Lint
    runs-on: ubuntu-latest
    # Real gate — a connect-snippet regression (internal address leaking into
    # a customer-facing response) must fail this lane. No continue-on-error.
    continue-on-error: false
    timeout-minutes: 12
    defaults:
      run:
        working-directory: workspace-server
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: 'stable'
          # cache:false — the self-hosted runner bind-mounts a persistent
          # GOCACHE/GOMODCACHE; actions/cache corrupts it by untarring over the
          # bind mount. Same rationale as ci.yml's Platform (Go) job.
          cache: false

      - name: Resolve Go module deps
        run: go mod download

      - name: Run connect-snippet E2E + leak-lint
        # Hermetic: sqlmock + miniredis + gin httptest — no live infra, no
        # postgres/redis service. -run selects only this lane's tests; the rest
        # of the handlers suite is exercised by the required Platform (Go) gate.
        #
        # Two leak classes, same class-level shape (both read the fields off the
        # RESPONSE, so a snippet added later is gated automatically):
        #   • internal ADDRESS  — TestE2E_ExternalConnectSnippet_PublicHTTPSNoInternal
        #                         / _DefenseInDepthPlatformURL / TestLeakLint_*
        #   • CREDENTIAL (#79)  — TestE2E_ExternalConnectSnippet_CredentialStampedAtHTTPBoundary
        #                         (mint path: every snippet carries the minted token,
        #                          no "<paste …>", no "{{…}}")
        #                         / _ReshowStaysVisiblyIncomplete (re-show path keeps
        #                          <ROTATE_TO_REVEAL_TOKEN> at the credential site)
        run: |
          go test -count=1 -timeout 5m -v ./internal/handlers/ \
            -run '^TestE2E_ExternalConnectSnippet|^TestLeakLint_'

      - name: Canvas golden fixture is real server output (not a hand-copy)
        # The canvas modal's vitest suite asserts against
        # canvas/src/components/__tests__/__fixtures__/external-connection.golden.json.
        # That file MUST be live BuildExternalConnectionPayload output — a
        # hand-written fixture is derived from the code under test, so its fail
        # arm is unreachable by construction, which is precisely how #79 shipped
        # green. Regenerate + diff: a stale fixture (or an unregenerated template
        # edit) reds here.
        run: |
          MOLECULE_UPDATE_GOLDEN=1 go test -count=1 ./internal/handlers/ \
            -run '^TestWriteExternalConnectionGolden$'
          cd "${GITHUB_WORKSPACE}"
          git diff --exit-code -- canvas/src/components/__tests__/__fixtures__/external-connection.golden.json \
            || {
              echo "::error::canvas golden fixture is stale — run:"
              echo "  cd workspace-server && MOLECULE_UPDATE_GOLDEN=1 go test ./internal/handlers/ -run TestWriteExternalConnectionGolden"
              exit 1
            }

      - name: node must be present (the merge-script test EXECUTES the snippet)
        # TestChannelMergeScript_* runs the channel snippet's bun/node script for real
        # against a seeded .env — a substring assertion cannot tell a merge from a
        # clobber (see below). The Go test t.Skip()s when node is absent, which is right
        # for a laptop and WRONG here: a skipped credential-destruction test that reports
        # green is worse than no test. So fail the lane loudly instead of skipping quietly.
        run: |
          command -v node >/dev/null 2>&1 || {
            echo "::error::node is not on PATH. The channel merge-script test would t.Skip(),"
            echo "::error::silently dropping the only executed proof that a re-shown snippet"
            echo "::error::cannot destroy a live credential (core#4315). Install node on the runner."
            exit 1
          }
          node --version

      - name: Re-show refusal guards — a re-shown snippet must not destroy a live credential
        # core#4315. On the re-show path auth_token="" and every credential site carries
        # <ROTATE_TO_REVEAL_TOKEN>. The old gate asserted only that the marker was PRESENT
        # ("visibly non-runnable") — true for snippets that use the token inline (a bearer
        # 401s, nothing is lost), FALSE for the ones that PERSIST it: the channel .env
        # merge, `claude mcp add`, `openclaw mcp set`, the kimi env file,
        # `hermes gateway --replace`. To those the marker is just a string, so the script
        # runs and REPLACES the operator's working credential with a dead one. The token is
        # shown once ⇒ unrecoverable.
        #
        #   TestReshowSnippets_RefuseToRunWithoutAToken   every persisting snippet carries a guard
        #   TestChannelMergeScript_*                      EXECUTES the merge script under node:
        #                                                 the marker run must exit non-zero and
        #                                                 leave a seeded .env byte-identical; the
        #                                                 real-token run must be append-safe across
        #                                                 workspaces and idempotent across a rotate
        #   TestShellSnippets_ParseUnderBash              bash -n every shell snippet, both renders
        #                                                 (an unbalanced `fi` in a guard is invisible
        #                                                 to every other test in the package)
        #   TestTokenGuards_MatchTheMarkerActuallyStamped changing the marker without the guards
        #                                                 turns every guard into dead code that
        #                                                 still passes a presence check
        run: |
          go test -count=1 -timeout 5m -v ./internal/handlers/ \
            -run '^TestReshowSnippets_|^TestChannelMergeScript_|^TestShellSnippets_|^TestTokenGuards_'

      - name: Snippet credentials conform to the SDK credentials contract (SSOT)
        # The credential/privilege SSOT is molecule-ai-sdk contracts/credentials. Its own
        # schema has said since sdk#78 that "core/runtime/mcp-server vendor it and a drift
        # gate fails CI on a name mismatch" — in core, that gate never existed. So nothing
        # stopped a snippet from teaching an operator a credential env-key name the platform
        # does not read, which is the exact bug the contract exists to prevent (the concierge
        # AUTH_ERROR: three repos, three names for one credential, nothing forcing agreement).
        #
        # Runs against the VENDORED copy, so it is hermetic; the step below proves the
        # vendored copy still matches the SDK's main.
        run: |
          go test -count=1 -timeout 5m -v ./internal/handlers/ \
            -run '^TestSnippetGuards_PinnedToSDKCredentialsContract$|^TestSnippetCredentials_'

      - name: Vendored SDK credentials contract has not drifted from SDK main
        # The pin above is only as good as the copy it pins to. Re-fetch the SSOT and diff:
        # if the SDK moved (a new alias, a changed marker), this reds and the fix is a
        # re-vendor PR — the copy is never allowed to quietly rot into a fiction.
        #
        # Fetch-only, no credentials: the contract is a public raw file. UA curl/8.4.0 —
        # Cloudflare 403s the python UA.
        env:
          SDK_CREDENTIALS_CONTRACT_URL: https://git.moleculesai.app/molecule-ai/molecule-ai-sdk/raw/branch/main/contracts/credentials/credentials.contract.json
          VENDORED: internal/handlers/testdata/sdk-credentials.contract.json
        run: |
          set -euo pipefail
          curl -fsS -A curl/8.4.0 "$SDK_CREDENTIALS_CONTRACT_URL" -o /tmp/sdk-credentials.contract.json
          # Compare canonicalised JSON so formatting alone never reds the lane.
          canon() { python3 -c 'import json,sys; print(json.dumps(json.load(open(sys.argv[1])), sort_keys=True, indent=2))' "$1"; }
          canon /tmp/sdk-credentials.contract.json > /tmp/sdk.canon
          canon "$VENDORED"                        > /tmp/vendored.canon
          if ! diff -u /tmp/vendored.canon /tmp/sdk.canon; then
            echo "::error::${VENDORED} has drifted from molecule-ai-sdk main."
            echo "::error::Re-vendor it (and re-read the diff — a changed marker or a withdrawn"
            echo "::error::alias changes what the snippets are allowed to say):"
            echo "::error::  curl -fsS -A curl/8.4.0 ${SDK_CREDENTIALS_CONTRACT_URL} \\"
            echo "::error::    -o workspace-server/${VENDORED}"
            exit 1
          fi
          echo "vendored credentials contract matches SDK main"
