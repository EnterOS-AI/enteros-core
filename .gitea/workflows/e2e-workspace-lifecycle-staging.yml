name: E2E Workspace Lifecycle STAGING (dispatch)

# The REAL workspace-lifecycle staging gate (core#2332 P1.10), split out of
# e2e-workspace-lifecycle.yml (main-status coherence).
#
# WHY A SEPARATE, DISPATCH-ONLY WORKFLOW: this job used to live in
# e2e-workspace-lifecycle.yml behind
#   if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
# Gitea auto-publishes a commit status for EVERY job of a triggered workflow,
# including `if:`-false ones — so every push/PR run of that workflow posted a
# permanent `skipped` status
# (`E2E Workspace Lifecycle (staginge2e) / E2E Workspace Lifecycle (staging)`)
# onto the commit, i.e. skip-noise on every main HEAD forever. Moving the job
# into its own workflow whose ONLY trigger is workflow_dispatch means:
#   - push/PR runs post NOTHING for this job (the workflow never triggers);
#   - a real dispatch posts the REAL verdict (success/failure) — honest signal,
#     no fake-green, no per-push skip.
# The cheap per-PR coverage (compile + LOUD-skip contract) stays in
# e2e-workspace-lifecycle.yml unchanged.
#
# ADVISORY-BY-INFRA (unchanged contract): needs a live staging tenant (cold
# molecules-server / local-docker provision), so it is dispatch-only — NOT
# per-PR and NOT a required check. Zero-cron ratchet honored: no `schedule:`
# here; any recurring cadence belongs in operator-config's cron-bot dispatch
# (same pattern as status-reaper).
#
# TRUSTED-REF GATING: molecule-core is a PUBLIC repo; the steps below consume
# the INFISICAL_CI_* machine-identity secrets. workflow_dispatch is an
# operator-trusted event and runs the default-branch version of this file, so
# untrusted fork code can never run with these secrets.
#
# NOTE — Gitea default-branch status suffix: a dispatch run at the main HEAD
# publishes its contexts with the `(push)` suffix (the long-standing hardcoded
# suffix behavior documented in status-reaper.yml). A RED dispatch of this
# workflow therefore paints main HEAD red — that is a REAL defect signal for
# the lifecycle suite; status-reaper compensates only workflows with no push
# trigger, which this is, so an operational (infra-caused) failure is swept by
# the reaper per its existing policy.

on:
  # No workflow_dispatch.inputs under the repository's flat-dispatch policy.
  workflow_dispatch:

concurrency:
  # Per-SHA (feedback_concurrency_group_per_sha).
  group: e2e-workspace-lifecycle-staging-${{ github.sha }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  GITHUB_SERVER_URL: https://git.moleculesai.app

jobs:
  # Real STAGING gate: provisions a throwaway tenant, drives the lifecycle
  # endpoints, asserts observable transitions, scoped teardown.
  lifecycle-staging:
    name: E2E Workspace Lifecycle (staging)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      CP_BASE_URL: https://staging-api.moleculesai.app
      # Compute backend: molecules-server (local-docker). adminCreateOrg in the staginge2e
      # suite reads E2E_PROVIDER and pins it into the org-create body so the tenant does not
      # fall back to the CP DefaultProvider (the closed AWS EC2 path).
      E2E_PROVIDER: molecules-server
      # CP_ADMIN_API_TOKEN arrives via $GITHUB_ENV from the "Fetch staging CP
      # admin token from Infisical KMS" step below (wave-B staging consumers
      # migration). It is sourced from Infisical CP_ADMIN_API_TOKEN at
      # staging /shared/controlplane-admin. The old CP_STAGING_ADMIN_API_TOKEN
      # Gitea Actions secret is left in place until a green run validates this
      # path (validate-before-delete). The Verify-admin-token gate still
      # validates CP_ADMIN_API_TOKEN is non-empty.
      STAGING_E2E: '1'
      # Consumed only by the `if: always()` teardown safety net below (the purge
      # helper tests/e2e/lib/cp_purge_receipt.sh origin/backend guards). The Go
      # test itself reads E2E_PROVIDER, not this.
      E2E_INFRA_BACKEND: local-docker
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: 'stable'
          # cache:false — the self-hosted runner bind-mounts a persistent
          # GOCACHE/GOMODCACHE (/var/cache/ci-go-{build,mod}); actions/cache is
          # redundant and corrupts it by untarring over the bind mount ("File
          # exists" -> "Failed to restore" -> partial cache -> linker/typecheck
          # errors on heavy jobs, e.g. test -race link "too many errors" and
          # go-arch-lint "without types"). Fleet sweep after the cp ci.yml find.
          cache: false
          cache-dependency-path: workspace-server/go.sum
      # KMS wave-B (Gitea-Actions-secrets -> Infisical SSOT): source the staging
      # CP admin bearer (CP_ADMIN_API_TOKEN @ staging /shared/controlplane-admin)
      # from Infisical via the CI machine identity instead of the duplicated
      # CP_STAGING_ADMIN_API_TOKEN Gitea Actions secret. Exported to $GITHUB_ENV
      # under the same CP_ADMIN_API_TOKEN name the verify + test steps already read.
      #
      # TRUSTED-REF GATING: this workflow only runs on workflow_dispatch (see
      # header), so it can never run with an untrusted-fork PR's code in the tree.
      - name: Fetch staging CP admin token from Infisical KMS
        id: kms_admin
        env:
          INFISICAL_CI_CLIENT_ID: ${{ secrets.INFISICAL_CI_CLIENT_ID }}
          INFISICAL_CI_CLIENT_SECRET: ${{ secrets.INFISICAL_CI_CLIENT_SECRET }}
          INFISICAL_PROJECT_ID: ${{ secrets.INFISICAL_CI_PROJECT_ID }}
        run: |
          set -uo pipefail
          BASE="https://key.moleculesai.app"
          TOK=$(curl -fsS -X POST "$BASE/api/v1/auth/universal-auth/login" \
            -H 'Content-Type: application/json' \
            -d "{\"clientId\":\"$INFISICAL_CI_CLIENT_ID\",\"clientSecret\":\"$INFISICAL_CI_CLIENT_SECRET\"}" \
            | python3 -c 'import sys,json; d=json.load(sys.stdin); v=d.get("accessToken"); sys.stdout.write(v if isinstance(v,str) and v else "")')
          if [ -z "$TOK" ]; then echo "::error::Infisical accessToken empty - failing closed"; exit 1; fi
          read_secret() {
            curl -fsS "$BASE/api/v3/secrets/raw/$1?workspaceId=$INFISICAL_PROJECT_ID&environment=staging&secretPath=$2" \
              -H "Authorization: Bearer $TOK" \
              | python3 -c 'import sys,json; d=json.load(sys.stdin); v=(d.get("secret") or {}).get("secretValue"); sys.stdout.write(v if isinstance(v,str) and v else "")'
          }
          CP_ADMIN_API_TOKEN=$(read_secret CP_ADMIN_API_TOKEN %2Fshared%2Fcontrolplane-admin)
          echo "::add-mask::$CP_ADMIN_API_TOKEN"
          if [ -z "$CP_ADMIN_API_TOKEN" ]; then
            echo "::error::Infisical returned empty CP_ADMIN_API_TOKEN at staging /shared/controlplane-admin — failing closed."
            exit 1
          fi
          echo "CP_ADMIN_API_TOKEN=$CP_ADMIN_API_TOKEN" >> "$GITHUB_ENV"
          echo "CP_ADMIN_API_TOKEN loaded from Infisical staging SSOT (len=${#CP_ADMIN_API_TOKEN})"
      - name: Verify admin token present
        run: |
          if [ -z "$CP_ADMIN_API_TOKEN" ]; then
            echo "::error::MOLECULE_ADMIN_TOKEN not loaded from Infisical staging /shared/controlplane-admin"
            exit 2
          fi
          echo "Admin token present"
      - name: CP staging health preflight
        run: |
          code=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 10 "$CP_BASE_URL/health")
          if [ "$code" != "200" ]; then
            echo "::error::Staging CP unhealthy (HTTP $code) — infra, not a lifecycle bug. Failing loud per feedback_fix_root_not_symptom."
            exit 1
          fi
          echo "Staging CP healthy"
      - name: Run workspace-lifecycle staginge2e
        working-directory: workspace-server
        run: go test -tags staging_e2e ./internal/staginge2e/ -run TestWorkspaceLifecycle_Staging -count=1 -v -timeout 50m
      # Belt-and-braces teardown: the Go test installs a t.Cleanup admin-DELETE
      # of its own tenant, but Go SKIPS t.Cleanup when `go test -timeout` fires
      # or the runner is SIGKILLed — so a timed-out/cancelled Go test leaks its
      # org. This net purges any CP admin org whose slug carries THIS run's
      # GITHUB_RUN_ID for the exact tag(s) this job creates (e2eSlug formats
      # slugs as e2e-<tag>-<run_id>-<uniq>), via the SAME identity-bound purge
      # helper the shell jobs use (cp_purge_receipt.sh) — no new auth path.
      # Idempotent with t.Cleanup; a fast no-op on the happy path.
      - name: Teardown safety net (runs on timeout/cancel/failure)
        # push/dispatch-only workflow; the PR guard is a uniform no-op here.
        if: always() && github.event_name != 'pull_request'
        env:
          # Sourced from Infisical (staging /shared/controlplane-admin) via the
          # "Fetch staging CP admin token from Infisical KMS" step above.
          ADMIN_TOKEN: ${{ env.CP_ADMIN_API_TOKEN }}
          # Exact tag THIS job creates (TestWorkspaceLifecycle_Staging →
          # e2eSlug("life")). RETROFIT: this workflow previously declined a
          # sweep because the slug was not run-id scoped; e2eSlug now embeds the
          # run-id, so a run+tag-scoped sweep is safe against concurrent dispatches.
          TEARDOWN_TAGS: "life"
        run: |
          set +e
          source tests/e2e/lib/cp_purge_receipt.sh
          if ! e2e_cp_require_local_backend \
            || ! e2e_cp_require_staging_origin "$CP_BASE_URL"; then
            echo "::warning::go-e2e teardown safety net rejected its staging target/backend before bearer use"
            exit 0
          fi
          if [ -z "${GITHUB_RUN_ID:-}" ]; then
            echo "::warning::go-e2e teardown discovery inconclusive: GITHUB_RUN_ID is empty; no roster discovery or tenant DELETE was attempted"
            exit 0
          fi
          if [ -z "${ADMIN_TOKEN:-}" ]; then
            echo "::warning::go-e2e teardown discovery inconclusive: admin token unavailable (PR-mode/creds skip); no roster discovery or tenant DELETE was attempted"
            exit 0
          fi
          if [ -z "${TEARDOWN_TAGS:-}" ]; then
            echo "::warning::go-e2e teardown discovery inconclusive: TEARDOWN_TAGS unset; no roster discovery or tenant DELETE was attempted"
            exit 0
          fi
          roster_rc=0
          roster_json=$(e2e_cp_fetch_org_roster_json "$CP_BASE_URL" "$ADMIN_TOKEN") || roster_rc=$?
          if [ "$roster_rc" != "0" ]; then
            echo "::warning::go-e2e teardown discovery inconclusive (roster rc=$roster_rc); no tenant DELETE was attempted"
            exit 0
          fi
          # Run+tag-scoped discovery: e2eSlug formats slugs as
          # e2e-<tag>-<GITHUB_RUN_ID>-<uniq>, so match the DELIMITER-ANCHORED
          # marker "-<tag>-<run_id>-" for ONLY the tag(s) THIS job creates
          # (TEARDOWN_TAGS). Anchoring on both sides prevents (a) purging a
          # sibling job's in-flight org — GITHUB_RUN_ID is shared by every job in
          # the run and the Go jobs have no `needs:`, so they run in parallel —
          # and (b) a bare-substring run-id collision (5679 matching 2605679 on a
          # re-run). Emit slug<TAB>org_id so the purge helper receives the exact
          # creation-returned org id it requires before it will issue DELETE.
          filter_rc=0
          pairs=$(printf '%s' "$roster_json" | python3 -c "
          import json, sys, os
          run_id = os.environ['GITHUB_RUN_ID']
          tags = os.environ['TEARDOWN_TAGS'].split()
          if not run_id or not tags:
              raise SystemExit(0)
          markers = tuple('-%s-%s-' % (t, run_id) for t in tags)
          d = json.load(sys.stdin)
          for o in d.get('orgs', []):
              slug = o.get('slug', '')
              org_id = o.get('id', '')
              if any(m in slug for m in markers) and o.get('instance_status') not in ('purged',):
                  print(slug + '\t' + str(org_id))
          " 2>/dev/null) || filter_rc=$?
          if [ "$filter_rc" != "0" ]; then
            echo "::warning::go-e2e teardown discovery inconclusive (run-scope filter rc=$filter_rc); no tenant DELETE was attempted"
            exit 0
          fi
          # Per-slug DELETE proves the exact completed purge receipt/audit and
          # exact org absence via the shared helper. Advisory (never exit 1) so a
          # transient CP blip can't red a gate — but there is NO automatic retry
          # net behind it: the sweep-stale-e2e-orgs sweeper is workflow_dispatch-
          # only (not scheduled), so a residual leak needs manual cleanup.
          leaks=()
          while IFS=$'\t' read -r slug org_id; do
            [ -n "$slug" ] || continue
            echo "Safety-net teardown: $slug"
            purge_rc=0
            e2e_cp_delete_and_verify_purge \
              "$CP_BASE_URL" "$ADMIN_TOKEN" "$slug" "$org_id" || purge_rc=$?
            if [ "$purge_rc" = "0" ] && [ "$E2E_CP_PURGE_RESULT" = "purged" ]; then
              echo "[teardown] verified exact CP purge receipt/audit and exact-tenant HTTP 404 for $slug"
            elif [ "$purge_rc" = "0" ] && [ "$E2E_CP_PURGE_RESULT" = "already_absent" ]; then
              echo "[teardown] exact tenant already absent by HTTP 404 for $slug; no DELETE or purge audit was required"
            else
              echo "::warning::go-e2e teardown verification for $slug failed or was inconclusive (rc=$purge_rc result=${E2E_CP_PURGE_RESULT:-unset}) — MANUAL cleanup required: the sweep-stale-e2e-orgs sweeper is dispatch-only (not scheduled) and will NOT auto-retry"
              leaks+=("$slug")
            fi
          done <<< "$pairs"
          if [ ${#leaks[@]} -gt 0 ]; then
            echo "::warning::go-e2e teardown left ${#leaks[@]} leak(s) needing MANUAL cleanup (no scheduled sweeper): ${leaks[*]}"
          fi
          exit 0
