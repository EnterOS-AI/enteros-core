name: E2E Ephemeral CP Happy Path

# RFC "one pre-merge ephemeral gate" §04 — the one-scenario PROOF (GATING).
#
# Runs the CORE happy-path (test_staging_full_saas.sh) against a THROWAWAY CP it
# spins up itself, with THIS PR's tenant image substituted in and a PINNED
# controlplane commit as the baseline — NO shared staging, NO post-merge
# dependency. This validates the intended cross-boundary happy-path contract;
# moving that contract into the SDK so both repos consume one implementation is
# still tracked separately (task #74).
#
# GATING as of 2026-07-13: `continue-on-error` is gone — a red happy path BLOCKS
# (branch protection on main is status_check_contexts=['*'], so every POSTED
# context must be success). It also ALWAYS fires (no paths filter).
#
# PRESENCE-REQUIRED as of #4363/#4381 (2026-07-14). Two independent checks
# protect different failure modes:
#
#   BP ['*']            → a posted RED blocks.       Blind to a context that never posts.
#   required-contexts   → a MISSING context blocks.  Enforced by the merge queue.
#
# The queue now evaluates branch-protection globs with Gitea semantics and
# fails closed when a glob matches no posted contexts, so its subsequent
# `.gitea/required-contexts.txt` check is reachable. This context sits above the
# first `# pending-` marker there; narrowing `on:`, disabling/renaming the job,
# or otherwise failing to post the context therefore holds the merge.
#
# Presence enforcement does not make the scenario deterministic. Task #99
# tracks known flakiness (it has gone red on main since the flip, e.g.
# 5593d7a43). Enforcement is deliberate anyway: a flaky red already blocked via
# BP ['*'], so promotion adds no new exposure — it only closes the silent hole.
# Fix the flake in #99; do not park the context to hide it.
#
# What remains of the migration end-state: move the contract into the SDK
# (task #74), wire both repos, then demote the post-merge E2E Staging jobs
# (task #86). Task #92's busy force-hibernate proof is still open: step 10b
# currently proves force-hibernate only after the leaf is idle, so the demotion
# is therefore NOT done.
#
# Reuses the CP repo's ephemeral spin-up plumbing (scripts/deploy/pr-ephemeral-cp.sh),
# the shared harness the RFC generalizes.

# NO `paths:` FILTER — deliberately. Two reasons, both learned the hard way.
#
# 1. It was WRONG. The old filter listed workspace-server/, three e2e scripts and
#    tests/e2e/lib/ — but this workflow RUNS `bash tests/harness/dind.sh`, the
#    per-job isolation its correctness depends on, and tests/harness/** was NOT
#    in the list. A PR editing the gate's own harness did not run the gate. A
#    paths filter is a standing bet that we can enumerate everything able to
#    break provisioning; we lost that bet on the gate's own plumbing.
#
# 2. A path-filtered workflow can never be a REQUIRED context: it does not fire
#    on an unrelated diff, so the context reports `pending` forever and wedges
#    the PR (lint-required-no-paths.py / feedback_path_filtered_workflow_cant_be_
#    required). Always firing is the price of being a real gate.
#
# The scoping moves INSIDE, to the always-running job, as an INVERTED profile
# (detect-changes.py "e2e-ephemeral"): run unless the diff is provably inert
# (docs-only). Forget a path there and the gate runs when it needn't — six
# wasted minutes. Forget one in a paths filter and the gate silently does not
# run — a hole that ships bugs. Only one of those is allowed to be cheap.
"on":
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  # Keyed per-PR, like every sibling E2E lane. This was ONCE a global,
  # unkeyed group ("e2e-ephemeral-happy-path-runner") because the pre-dind
  # topology bound host resources and overlapping runs cross-wired. The dind
  # (#4116) removed that constraint: each run gets its own nested daemon, its
  # containers are namespaced by DIND_NS=<run_id>, and the dind's ports are
  # published on EPHEMERAL host ports (-p 127.0.0.1::8080). Concurrent runs
  # cannot collide, so the runner pool — not a workflow-level group — is the
  # right place to bound parallelism.
  #
  # The global group was actively harmful (#4122): it was the only unkeyed
  # group among the heavy E2E lanes, and its cross-PR queue is where the
  # phantom jobs came from — a queue entry that never gets a runner, posts
  # "Waiting to run" onto a context an EXECUTED job already resolved green,
  # and then reds it as "Has been cancelled". That made the mc#4081 soak
  # unconvergeable (a ghost can red a genuine pass) and, at volume, serialized
  # every open PR into a multi-hour backlog on one slot.
  #
  # cancel-in-progress is now safe (it was not before): a superseded run's
  # entire topology is one `docker rm -fv` of its dind, so a cancel cannot
  # leak a half-torn-down namespace. A new push supersedes its own older run
  # instead of queueing behind it (the RFC's finding-#2 shape).
  group: e2e-ephemeral-happy-path-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  GITHUB_SERVER_URL: https://git.moleculesai.app
  # The controlplane BASELINE in the image-substitution matrix — a core PR tests
  # its tenant against a stable CP. Built locally from the pinned CP checkout
  # below using Dockerfile.dockerprov: the local-docker provisioner shells out to the
  # `docker` CLI, which the distroless/static ROOT Dockerfile lacks. The exact
  # reviewed ref below is the baseline, and building is self-contained (no
  # dependency on a published tag — there is no controlplane:staging-latest).
  CP_BASELINE_IMAGE: controlplane:baseline-dockerprov

  # The controlplane tree the baseline image is built FROM, PINNED (task #116).
  #
  # This used to be a `git clone --depth 1` of the CP's moving `main`, which made
  # a FOREIGN repo's HEAD a gate on core: any CP commit could red this — now
  # ENFORCED — context on every open core PR at once, and no core author could see
  # the cause in their own diff or revert it. With the context merge-queue-required,
  # that is not a red, it is a FROZEN QUEUE.
  #
  # TO BUMP: `git ls-remote https://git.moleculesai.app/molecule-ai/molecule-controlplane.git refs/heads/main`
  # and paste the SHA here, in its own PR, so the CP change is reviewed as what it
  # is — a change to what gates core.
  CP_EPHEMERAL_REF: f6457ba5e2ef958b3815860fb728d14d488d77c8

jobs:
  # Emits no context listed in required-contexts.txt — but it DOES post
  # `E2E Ephemeral CP Happy Path / detect`, and under BP ['*'] every posted
  # context blocks on red. There is no advisory tier here (proven in task #113:
  # `continue-on-error` does not suppress the status). It only tells the
  # happy-path job whether the diff can possibly touch the happy path.
  detect:
    runs-on: docker-host
    continue-on-error: false
    outputs:
      happy: ${{ steps.decide.outputs.happy }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - id: decide
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          PUSH_BEFORE: ${{ github.event.before }}
        run: |
          # The "e2e-ephemeral" profile is INVERTED (see detect-changes.py):
          # `happy` is true unless EVERY changed path is provably inert
          # (docs/**, *.md). Default is RUN.
          python3 .gitea/scripts/detect-changes.py \
            --profile e2e-ephemeral \
            --event-name "${{ github.event_name }}" \
            --pr-base-sha "$PR_BASE_SHA" \
            --base-ref "$PR_BASE_REF" \
            --push-before "$PUSH_BEFORE" || {
            # Script crash: FAIL OPEN — run the gate rather than silently skip a
            # potentially-breaking PR. Same posture as e2e-api.yml.
            echo "happy=true" >> "$GITHUB_OUTPUT"
            exit 0
          }

  happy-path:
    needs: detect
    name: E2E Ephemeral CP Happy Path
    # docker-host: needs a real docker.sock + molecule-core-net to spin the CP,
    # its Postgres, and the provisioned tenant (same runner class as harness-replays).
    runs-on: docker-host
    #
    # ── GATING as of 2026-07-13 ────────────────────────────────────────────────
    # The continue-on-error mask is GONE. It used to mean a RED happy path still
    # posted SUCCESS — the gate could observe the bug class it was built for, but
    # never stop it. A guard that cannot fail is not a guard.
    #
    # The RFC §04 exit criterion was >=5 consecutive green dind runs, and the
    # pre-flip soak cleared it. Do NOT read that as "this lane is stable": POST-flip
    # it has gone red on main (5593d7a43, 2026-07-14), and task #99 tracks the
    # nondeterminism. The honest state is: real gate, known flaky, flake tracked and
    # being fixed at source — not masked, not parked.
    #
    # It ALWAYS FIRES. The `paths:` filter is gone (see the header): it was a bet
    # that we could enumerate everything able to break provisioning, and it was
    # already wrong — tests/harness/dind.sh, the isolation harness this very
    # workflow runs, was not in it. Scoping now lives in the INVERTED
    # detect-changes profile "e2e-ephemeral": run unless the diff is provably
    # inert (docs-only), which no-ops but STILL POSTS the context.
    #
    # Net: the gate runs on every PR that could conceivably affect the happy path,
    # and a red BLOCKS the merge.
    # 75, not 40: the gate now runs E2E_MODE=full (the memory sidecar is bundled
    # as of core#4166, which was the ONLY reason it was pinned to smoke). full
    # adds a child workspace, two more live LLM completions and two re-provisions.
    # 75 is what the staging BYOK lane it replaces already budgets. A too-tight
    # timeout would surface as a timeout, not as the honest failure underneath.
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Go toolchain for the ephemeral gate runner. This makes a go-staging-test
      # lane RUNNABLE here (the shared harness in workspace-server/internal/staginge2e
      # is now ephemeral-topology-aware via MOLECULE_TENANT_* + E2E_CP_ALLOW_EPHEMERAL_LOOPBACK).
      # It only installs the toolchain — the journeys are wired into the runner in a
      # downstream PR. Gated on the same happy/same-repo condition as the dind step so
      # fork PRs and docs-only no-op arms don't pay for it. 'stable' matches every
      # other Go lane in this repo (ci.yml, e2e-*.yml).
      - name: Set up Go
        if: (needs.detect.outputs.happy != 'false') && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false)
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: 'stable'

      # Per-job DISPOSABLE dind (tests/harness/dind.sh — the harness-replays
      # pattern, task#78): the WHOLE topology (PG, CP, tenants, workspaces,
      # image builds) lives inside a nested daemon and dies with one atomic
      # `docker rm -fv`, even on cancel. This is the structural fix for the
      # shared docker-host interference that killed the gate's first CI runs
      # (host-loopback docker-proxy dying mid-run with every container healthy;
      # mc#4081) AND for cross-run tenant leaks (an early `down` implementation
      # swept only the leg network, so per-org-net tenants leaked). dind.sh exports
      # DOCKER_HOST (all subsequent docker/build steps target the dind) and
      # BASE = the dind's pre-forwarded :8080, which becomes the caller-visible
      # CP URL (the runner passes it via CP_HOST_BASE_OVERRIDE, CP#1549).
      # Trade-off: no shared layer cache — each run rebuilds/pulls fresh into
      # the dind (hermetic > fast during the soak; a cache volume can come later).
      - name: Start disposable dind
        if: (needs.detect.outputs.happy != 'false') && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false)
        env:
          DIND_NS: ${{ github.run_id }}-ephemeral
        run: bash tests/harness/dind.sh up

      # e2e creds from the Infisical SSOT: the MiniMax LLM key (the SAME key the
      # post-merge gate uses; RFC finding D moves it to a low-value e2e path later)
      # and AUTO_SYNC_TOKEN (devops-engineer PAT) to clone the CP spin-up plumbing.
      # FORK SAFETY: same-repo PRs only — a fork must never harvest these.
      - name: Fetch e2e creds from Infisical SSOT
        id: creds
        if: (needs.detect.outputs.happy != 'false') && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false)
        env:
          INFISICAL_CI_CLIENT_ID: ${{ secrets.INFISICAL_CI_CLIENT_ID }}
          INFISICAL_CI_CLIENT_SECRET: ${{ secrets.INFISICAL_CI_CLIENT_SECRET }}
          INFISICAL_PROJECT_ID: ${{ secrets.INFISICAL_CI_PROJECT_ID }}
        run: |
          set -uo pipefail
          BASE="https://key.moleculesai.app"
          TOK=$(curl -fsS -X POST "$BASE/api/v1/auth/universal-auth/login" \
            -H 'Content-Type: application/json' \
            -d "{\"clientId\":\"$INFISICAL_CI_CLIENT_ID\",\"clientSecret\":\"$INFISICAL_CI_CLIENT_SECRET\"}" \
            | python3 -c 'import sys,json; d=json.load(sys.stdin); v=d.get("accessToken"); sys.stdout.write(v if isinstance(v,str) and v else "")')
          [ -n "$TOK" ] || { echo "::error::Infisical login returned empty accessToken"; exit 1; }
          read_secret() {
            curl -fsS "$BASE/api/v3/secrets/raw/$1?workspaceId=$INFISICAL_PROJECT_ID&environment=prod&secretPath=$2" \
              -H "Authorization: Bearer $TOK" \
              | python3 -c 'import sys,json; d=json.load(sys.stdin); v=(d.get("secret") or {}).get("secretValue"); sys.stdout.write(v if isinstance(v,str) and v else "")'
          }
          MINIMAX_API_KEY=$(read_secret MINIMAX_API_KEY %2Fshared%2Fcontrolplane)
          AUTO_SYNC_TOKEN=$(read_secret AUTO_SYNC_TOKEN %2Fshared%2Fdev-utils)

          # FAIL CLOSED on an empty secret VALUE, not just a failed login.
          #
          # `read_secret` prints "" when the key is absent, renamed, moved to another
          # secretPath, or readable-but-empty — and curl -f does not fire, so the step
          # used to SUCCEED with empty creds. Every step below was then gated on
          # `env.AUTO_SYNC_TOKEN != ''`, so all of them SKIPPED, and the job posted
          # SUCCESS having spun up nothing. A required context, green, zero coverage:
          # exactly the vacuity this gate exists to delete, inside the gate itself.
          # An Infisical rotation would have silently disarmed the whole lane.
          #
          # A gate that cannot observe its subject must not report success.
          missing=""
          [ -n "$MINIMAX_API_KEY" ]  || missing="$missing MINIMAX_API_KEY(/shared/controlplane)"
          [ -n "$AUTO_SYNC_TOKEN" ]  || missing="$missing AUTO_SYNC_TOKEN(/shared/dev-utils)"
          if [ -n "$missing" ]; then
            echo "::error::Infisical returned an EMPTY value for:$missing — refusing to report success on a gate that cannot run. Check the key name/secretPath in the Infisical SSOT; do NOT re-add a skip-guard."
            exit 1
          fi

          echo "::add-mask::$MINIMAX_API_KEY"
          echo "::add-mask::$AUTO_SYNC_TOKEN"
          echo "MINIMAX_API_KEY=$MINIMAX_API_KEY" >> "$GITHUB_ENV"
          echo "AUTO_SYNC_TOKEN=$AUTO_SYNC_TOKEN" >> "$GITHUB_ENV"
          echo "creds loaded (minimax len=${#MINIMAX_API_KEY}, sync len=${#AUTO_SYNC_TOKEN})"

      # The shared spin-up plumbing (RFC §04): pr-ephemeral-cp.sh lives in the CP
      # repo today; fetch it read-only AT THE PINNED SHA (see CP_EPHEMERAL_REF).
      # (When the harness is generalized this becomes a vendored/shared action.)
      #
      # `fetch <sha>` rather than `clone`, so the pin is what comes down the wire —
      # a shallow clone of `main` would drag main's tip across regardless of what we
      # check out afterwards.
      - name: Fetch controlplane at the PINNED ref (ephemeral spin-up plumbing)
        if: (needs.detect.outputs.happy != 'false') && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false)
        run: |
          set -euo pipefail
          rm -rf .cp-ephemeral
          mkdir -p .cp-ephemeral
          git -C .cp-ephemeral init -q
          git -C .cp-ephemeral remote add origin \
            "https://oauth2:${AUTO_SYNC_TOKEN}@git.moleculesai.app/molecule-ai/molecule-controlplane.git"
          git -C .cp-ephemeral fetch -q --depth 1 origin "${CP_EPHEMERAL_REF}"
          git -C .cp-ephemeral checkout -q FETCH_HEAD

          # The pin is only a pin if we assert we landed on it.
          GOT="$(git -C .cp-ephemeral rev-parse HEAD)"
          [ "$GOT" = "${CP_EPHEMERAL_REF}" ] || {
            echo "::error::controlplane checkout is ${GOT}, expected the pinned ${CP_EPHEMERAL_REF}. Refusing to build the CP baseline from an unpinned tree — that is how a foreign repo's HEAD silently becomes a gate on core."
            exit 1
          }

          chmod +x .cp-ephemeral/scripts/deploy/pr-ephemeral-cp.sh
          echo "fetched pr-ephemeral-cp.sh at pinned CP ${CP_EPHEMERAL_REF}"

      # Pre-clone manifest deps so Dockerfile.tenant's COPY of .tenant-bundle-deps
      # resolves (identical to harness-replays' pre-clone).
      - name: Pre-clone manifest deps
        if: (needs.detect.outputs.happy != 'false') && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false)
        env:
          MOLECULE_GITEA_TOKEN: ${{ env.AUTO_SYNC_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p .tenant-bundle-deps
          sed '/^[[:space:]]*\/\//d' manifest.json > .manifest-stripped.json
          bash scripts/clone-manifest.sh \
            .manifest-stripped.json \
            .tenant-bundle-deps/workspace-configs-templates \
            .tenant-bundle-deps/org-templates \
            .tenant-bundle-deps/plugins
          echo "manifest deps cloned"

      # Build THIS PR's tenant image (the UNDER-TEST side of the substitution).
      - name: Build PR tenant image
        if: (needs.detect.outputs.happy != 'false') && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false)
        env:
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail
          docker build \
            -f workspace-server/Dockerfile.tenant \
            --build-arg GIT_SHA="${HEAD_SHA}" \
            -t "molecule-tenant:pr-${HEAD_SHA:0:8}" \
            .
          echo "TENANT_IMAGE=molecule-tenant:pr-${HEAD_SHA:0:8}" >> "$GITHUB_ENV"

      # Build the CP baseline (the OTHER side of the substitution) from the pinned
      # CP checkout using Dockerfile.dockerprov — the multi-stage image that ships the
      # `docker` CLI the local-docker tenant provisioner shells out to. The root
      # Dockerfile is distroless/static with NO docker CLI, so a CP built from it
      # cannot provision tenants. The reviewed CP_EPHEMERAL_REF is the baseline;
      # this is self-contained (no published :staging-latest tag to depend on).
      - name: Build baseline controlplane image (Dockerfile.dockerprov)
        if: (needs.detect.outputs.happy != 'false') && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false)
        run: |
          set -euo pipefail
          docker build \
            -f .cp-ephemeral/Dockerfile.dockerprov \
            -t "${CP_BASELINE_IMAGE}" \
            .cp-ephemeral
          echo "built ${CP_BASELINE_IMAGE} from pinned CP ${CP_EPHEMERAL_REF} (Dockerfile.dockerprov)"

      # The proof: full-saas against the throwaway CP, zero staging creds.
      - name: Run core happy-path against an ephemeral CP
        if: (needs.detect.outputs.happy != 'false') && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false)
        env:
          CP_IMAGE: ${{ env.CP_BASELINE_IMAGE }}
          TENANT_IMAGE: ${{ env.TENANT_IMAGE }}
          CP_EPHEMERAL_SCRIPT: ${{ github.workspace }}/.cp-ephemeral/scripts/deploy/pr-ephemeral-cp.sh
          MINIMAX_API_KEY: ${{ env.MINIMAX_API_KEY }}
          PR_NUMBER: ${{ github.event.pull_request.number || 0 }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          E2E_RUNTIME: hermes
          # DIND mode — everything inside the disposable daemon; $BASE/$DOCKER_HOST
          # come from the "Start disposable dind" step via GITHUB_ENV.
          EPHEMERAL_DIND: "1"
          # RFC #86 — pull the post-push staging lanes LEFT onto this per-PR gate,
          # one at a time. `concierge_user_tasks` is first: it needs only the CP +
          # API (external workspaces, no LLM/image), so it is the cheapest lane to
          # move. ADVISORY=1 during the soak — it RUNS every PR (non-vacuous) but a
          # failure does not block merge yet. Flip ADVISORY to 0 (and retire the
          # matching post-push job in e2e-staging-saas.yml) once it has soaked
          # green across a run of PRs.
          E2E_EPHEMERAL_EXTRA_SCENARIOS: concierge_user_tasks
          E2E_EPHEMERAL_EXTRA_ADVISORY: "1"
        run: |
          bash tests/e2e/ephemeral_cp_happy_path.sh
          echo "GATE_ARM=proof" >> "$GITHUB_ENV"

      # Atomic teardown: one rm destroys the entire nested topology (CP, PG,
      # tenants, workspaces, volumes, networks, built images) — even after a
      # cancel that skipped every other cleanup. Leaks structurally impossible.
      - name: Teardown dind
        # always() so a cancelled/failed run still reaps its dind — but gated on
        # the same non-fork condition as the start step (an ungated always()
        # step on the fork no-op path was exactly the template-delivery chdir
        # failure, core#4057).
        if: always() && (needs.detect.outputs.happy != 'false') && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false)
        env:
          DIND_NS: ${{ github.run_id }}-ephemeral
        run: bash tests/harness/dind.sh down

      # Fork PR + code diff: FAIL. A fork gets no e2e creds by design, so the gate
      # cannot run — and a gate that cannot observe its subject must not report
      # success. This step used to `::notice::` and exit 0, i.e. post GREEN on an
      # ENFORCED context having proved nothing, with "the post-merge run covers it"
      # as the excuse. Post-merge is exactly what this gate exists to stop relying
      # on. Merging a fork PR now requires a maintainer to re-run it from a
      # same-repo branch, which is the honest cost of not handing creds to
      # PR-authored code.
      #
      # Gated on `happy != 'false'` so a DOCS-ONLY fork PR still takes the no-op
      # green arm below rather than being failed for a diff that cannot break
      # anything.
      - name: Fork PR — cannot run the gate, so it cannot pass
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == true && needs.detect.outputs.happy != 'false'
        run: |
          echo "::error::Fork PR — the ephemeral-CP happy path cannot run (a fork gets no e2e creds by design), so this REQUIRED context cannot honestly be green. Re-run this change from a same-repo branch to get coverage."
          exit 1

      # The context MUST still be posted when we skip, or a docs-only PR would
      # sit at `pending` forever the moment this joins required-contexts.txt.
      # This is the whole reason the scoping lives here and not in `on: paths:`.
      - name: No-op — diff is docs-only, the happy path cannot be affected
        if: needs.detect.outputs.happy == 'false'
        run: |
          echo "Every changed path is inert (docs/** or *.md)."
          echo "The ephemeral happy-path topology cannot be affected by this diff, so it was not spun up."
          echo "This context is GREEN so the required check is satisfied without burning ~6min + a live LLM call."
          echo "GATE_ARM=noop" >> "$GITHUB_ENV"
      # THE CATCH-ALL. A job whose every step SKIPS still SUCCEEDS — and this
      # context is a required one, so a green with no arm run is a silent hole.
      # That is not hypothetical: the guard suite for this very file passed
      # `5 OK` against a workflow whose proof step was `if: false`. Shape-matching
      # step conditions cannot catch that; a runtime sentinel can.
      #
      # Exactly one arm must have run: `proof` (the gate) or `noop` (docs-only).
      # The fork arm exits 1 and never reaches here.
      #
      # ORDERING IS LOAD-BEARING: this sentinel must be the LAST step — after
      # every arm that can stamp GATE_ARM. It originally sat above the no-op
      # arm, so every docs-only PR failed here before the arm could stamp
      # (first hit: PR #4413, 2026-07-17). The guard test pins this order.
      - name: Assert an arm actually ran (no silent green)
        if: always() && !cancelled()
        run: |
          set -euo pipefail
          ARM="${GATE_ARM:-}"
          if [ -z "$ARM" ]; then
            echo "::error::NO ARM RAN. Every step in this job skipped, so the job would have posted SUCCESS on a REQUIRED context having proved nothing. Some `if:` condition is wrong — the gate did not run, and it did not honestly no-op either."
            exit 1
          fi
          echo "arm=$ARM"
