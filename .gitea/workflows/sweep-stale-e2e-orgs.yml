name: Sweep stale e2e-* orgs (staging)

# Ported from .github/workflows/sweep-stale-e2e-orgs.yml on 2026-05-11 per RFC
# internal#219 §1 sweep. Differences from the GitHub version:
#   - Kept flat `workflow_dispatch` (no `inputs`) under repository policy;
#     dispatch callers pass parameters through the established env/var path.
#   - Omitted GitHub's `merge_group:` trigger; this repository uses its
#     serialized Gitea queue plus pull-request/push status gates.
#   - Omitted `environment:` blocks; this repository's approval and secret
#     gates do not depend on Actions environments.
#   - Workflow-level env.GITHUB_SERVER_URL pinned per
#     feedback_act_runner_github_server_url.
#   - `continue-on-error: true` on each job (RFC §1 contract).
#

# Manual janitor for staging tenants left behind when E2E cleanup did not run:
# CI cancellation, runner crash, provider error mid-cascade, or a missed bash
# trap. Without a catch-up delete, failed teardown can leak local/provider
# compute, tunnel/DNS state, and a DB row.
#
# Why not rely on per-test-run teardown:
#   - Per-run teardown is best-effort by definition. Any process death
#     after the test starts but before the trap fires leaves debris.
#   - GH Actions cancellation kills the runner without grace period.
#     The workflow's `if: always()` step usually catches this, but it
#     too can fail (CP transient 5xx, runner network issue at the
#     wrong moment).
#   - Even when teardown runs, the CP cascade is best-effort in places
#     (cascadeTerminateWorkspaces logs+continues; DNS deletion same).
#   - This sweep is the catch-all that converges staging back to clean
#     regardless of which specific path leaked.
#
# The owning E2E's authenticated teardown is the primary path. This manual
# workflow is an exact-prefix catch-up tool, not a scheduled production janitor.

on:
  # AUTOMATIC on every main merge (2026-07-18). The per-run E2E teardown trap
  # cannot survive Gitea's cancellation: a cancelled run's job container is
  # `docker kill`ed (SIGKILL), so the bash `trap teardown INT TERM` never fires
  # and the tenant leaks. A backstop MUST run automatically. GitHub ran this on
  # `schedule` (cron), but molecule-core's zero-cron ratchet
  # (lint_schedule_budget.py) forbids `schedule:` — so this janitor sat
  # workflow_dispatch-ONLY and never ran, and leaked e2e tenants accumulated for
  # DAYS until they exhausted the local-docker provider and staging provisioning
  # stalled (the 2026-07-18 outage: tenants never reached instance_status=running
  # within 1800s → the required E2E lanes red-walled the core merge queue).
  # `push:[main]` is the sanctioned per-merge cadence under the ratchet: core
  # merges frequently, so the backstop now fires often enough to keep pace with
  # the leak. MAX_AGE_MINUTES must stay ABOVE the longest legitimate E2E run so
  # the now-automatic sweep can never reap a tenant that an OVERLAPPING run (from
  # an earlier merge) is still using: the staging Go lanes run `go test
  # -timeout 55m`, and the bash lanes add provisioning + a 15m /health wait + the
  # readiness gate, so a live tenant can legitimately exist ~55m. 90m gives a
  # comfortable margin above that ceiling. (Only the SIGKILL-on-cancel leak — a
  # cancelled dind job whose teardown trap never fires, #117 — is what this
  # backstop is for; #117 is the real source fix.)
  push:
    branches: [main]
  workflow_dispatch:
# Don't let two sweeps fight. A push-triggered and a manual sweep could overlap;
# queue rather than parallel-delete.
concurrency:
  group: sweep-stale-e2e-orgs
  cancel-in-progress: false

permissions:
  contents: read

env:
  GITHUB_SERVER_URL: https://git.moleculesai.app

jobs:
  # bp-exempt: post-merge staging janitor, NOT a merge gate — its context must
  # not be a required check (a red sweep must not block PRs; it fails loud to ops
  # via the notify-failure step instead).
  sweep:
    name: Sweep e2e orgs
    runs-on: ubuntu-latest
    # NOTE: Phase 3 (RFC #219 §1) `continue-on-error: true` removed
    # 2026-05-11. The "surface broken workflows without blocking"
    # rationale was correctly applied to advisory/lint workflows but
    # wrong for this janitor — silent failure here masks real resource leaks.
    # Historical AWS incidents established the fail-loud requirement; the same
    # rule applies to the current provider backend.
    # See `feedback_strict_root_only_after_class_a` — critical janitors
    # must fail loud. A follow-up `notify-failure` step below also
    # surfaces breakage to ops even if branch-protection wiring is
    # adjusted to keep this off the required-checks list.
    timeout-minutes: 15
    env:
      MOLECULE_CP_URL: https://staging-api.moleculesai.app
      # ADMIN_TOKEN now arrives via $GITHUB_ENV from the "Fetch staging CP admin
      # token from Infisical KMS" step below (wave-B staging consumers
      # migration). It is sourced from Infisical CP_ADMIN_API_TOKEN at
      # staging /shared/controlplane-admin. The old CP_STAGING_ADMIN_API_TOKEN
      # Gitea Actions secret is left in place until a green run validates this
      # path (validate-before-delete). The Verify-admin-token gate still
      # validates ADMIN_TOKEN is non-empty.
      MAX_AGE_MINUTES: ${{ github.event.inputs.max_age_minutes || '90' }}
      DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
      # Refuse to delete more than this many orgs in one tick. If the
      # CP DB is briefly empty (or the admin endpoint goes weird and
      # returns no created_at), every e2e- org would look stale.
      # Bailing protects against runaway nukes.
      SAFETY_CAP: 50

    steps:
      # KMS wave-B (Gitea-Actions-secrets -> Infisical SSOT): source the staging
      # CP admin bearer (CP_ADMIN_API_TOKEN @ staging /shared/controlplane-admin)
      # from Infisical via the CI machine identity instead of the duplicated
      # CP_STAGING_ADMIN_API_TOKEN Gitea Actions secret. Exported to $GITHUB_ENV
      # under the same ADMIN_TOKEN name every step in this job already reads.
      #
      # TRUSTED-REF GATING: molecule-core is a PUBLIC repo; this step consumes
      # the INFISICAL_CI_* machine-identity secrets, so it must only run on a
      # TRUSTED event — a push to main (maintainer-only; a fork cannot push to
      # main, so no fork can harvest INFISICAL_CI_*), an operator
      # workflow_dispatch, or the (currently disallowed) schedule cron. It must
      # NEVER run on a pull_request, where a fork could exfiltrate the creds.
      - name: Fetch staging CP admin token from Infisical KMS
        id: kms_admin
        # A push arm MUST re-assert the ref is main. The main-only restriction
        # otherwise lives solely in on.push.branches:[main]; if a later edit ever
        # broadens that filter, this guard would silently fetch INFISICAL_CI_* on
        # the new refs. Keep the trusted-ref guarantee co-located with the fetch.
        if: >-
          github.event_name == 'schedule' ||
          github.event_name == 'workflow_dispatch' ||
          (github.event_name == 'push' && github.ref == 'refs/heads/main')
        env:
          INFISICAL_CI_CLIENT_ID: ${{ secrets.INFISICAL_CI_CLIENT_ID }}
          INFISICAL_CI_CLIENT_SECRET: ${{ secrets.INFISICAL_CI_CLIENT_SECRET }}
          INFISICAL_PROJECT_ID: ${{ secrets.INFISICAL_CI_PROJECT_ID }}
        run: |
          set -uo pipefail
          BASE="https://key.moleculesai.app"
          TOK=$(curl -fsS -X POST "$BASE/api/v1/auth/universal-auth/login" \
            -H 'Content-Type: application/json' \
            -d "{\"clientId\":\"$INFISICAL_CI_CLIENT_ID\",\"clientSecret\":\"$INFISICAL_CI_CLIENT_SECRET\"}" \
            | python3 -c 'import sys,json; d=json.load(sys.stdin); v=d.get("accessToken"); sys.stdout.write(v if isinstance(v,str) and v else "")')
          if [ -z "$TOK" ]; then echo "::error::Infisical accessToken empty - failing closed"; exit 1; fi
          read_secret() {
            curl -fsS "$BASE/api/v3/secrets/raw/$1?workspaceId=$INFISICAL_PROJECT_ID&environment=staging&secretPath=$2" \
              -H "Authorization: Bearer $TOK" \
              | python3 -c 'import sys,json; d=json.load(sys.stdin); v=(d.get("secret") or {}).get("secretValue"); sys.stdout.write(v if isinstance(v,str) and v else "")'
          }
          ADMIN_TOKEN=$(read_secret CP_ADMIN_API_TOKEN %2Fshared%2Fcontrolplane-admin)
          echo "::add-mask::$ADMIN_TOKEN"
          if [ -z "$ADMIN_TOKEN" ]; then
            echo "::error::Infisical returned empty CP_ADMIN_API_TOKEN at staging /shared/controlplane-admin — failing closed."
            exit 1
          fi
          echo "ADMIN_TOKEN=$ADMIN_TOKEN" >> "$GITHUB_ENV"
          echo "ADMIN_TOKEN loaded from Infisical staging SSOT (len=${#ADMIN_TOKEN})"

      - name: Verify admin token present
        run: |
          if [ -z "$ADMIN_TOKEN" ]; then
            echo "::error::CP_STAGING_ADMIN_API_TOKEN not set"
            exit 2
          fi
          echo "Admin token present ✓"

      - name: Identify stale e2e orgs
        id: identify
        run: |
          set -euo pipefail
          # Fetch into a file so the python step reads it via stdin —
          # cleaner than embedding $(curl ...) into a heredoc.
          curl -sS --fail-with-body --max-time 30 \
            "$MOLECULE_CP_URL/cp/admin/orgs?limit=500" \
            -H "Authorization: Bearer $ADMIN_TOKEN" \
            > orgs.json

          # Filter:
          #   1. slug starts with one of the ephemeral test prefixes:
          #        - 'e2e-'    — covers e2e-smoke- (formerly e2e-canary-),
          #                      e2e-canvas-*, etc.
          #        - 'rt-e2e-' — runtime-test harness fixtures (RFC #2251);
          #                      missing this prefix left two such tenants
          #                      orphaned 8h on staging (2026-05-03), then
          #                      hard-failed redeploy-tenants-on-staging
          #                      and broke the staging→main auto-promote
          #                      chain. Kept in sync with the EPHEMERAL_PREFIX_RE
          #                      regex in redeploy-tenants-on-staging.yml.
          #   2. created_at is older than MAX_AGE_MINUTES ago
          # Output one slug per line to a file the next step reads.
          python3 > stale_slugs.txt <<'PY'
          import json, os
          from datetime import datetime, timezone, timedelta
          # SSOT for this list lives in the controlplane Go code:
          # molecule-controlplane/internal/slugs/ephemeral.go
          # (var EphemeralPrefixes). The redeploy-fleet auto-rollout
          # also reads from there to SKIP these slugs — without that
          # filter, fleet redeploy SSM-failed in-flight E2E tenants
          # whose containers were still booting, breaking the test
          # that just spun them up (molecule-controlplane#493).
          # Update both files together.
          EPHEMERAL_PREFIXES = ("e2e-", "rt-e2e-")
          with open("orgs.json") as f:
              data = json.load(f)
          max_age = int(os.environ["MAX_AGE_MINUTES"])
          cutoff = datetime.now(timezone.utc) - timedelta(minutes=max_age)
          for o in data.get("orgs", []):
              slug = o.get("slug", "")
              if not slug.startswith(EPHEMERAL_PREFIXES):
                  continue
              created = o.get("created_at")
              if not created:
                  # Defensively skip rows without created_at — better
                  # to leave one orphan than nuke a brand-new row
                  # whose timestamp didn't render.
                  continue
              # Python 3.11+ handles RFC3339 with Z directly via
              # fromisoformat; older runners need the trailing Z swap.
              created_dt = datetime.fromisoformat(created.replace("Z", "+00:00"))
              if created_dt < cutoff:
                  print(slug)
          PY

          count=$(wc -l < stale_slugs.txt | tr -d ' ')
          echo "Found $count stale e2e org(s) older than ${MAX_AGE_MINUTES}m"
          if [ "$count" -gt 0 ]; then
            echo "First 20:"
            head -20 stale_slugs.txt | sed 's/^/  /'
          fi
          echo "count=$count" >> "$GITHUB_OUTPUT"

      - name: Safety gate
        if: steps.identify.outputs.count != '0'
        run: |
          count="${{ steps.identify.outputs.count }}"
          if [ "$count" -gt "$SAFETY_CAP" ]; then
            echo "::error::Refusing to delete $count orgs in one sweep (cap=$SAFETY_CAP). Investigate manually — this usually means the CP admin API returned no created_at or returned a degraded result. Re-run with workflow_dispatch + max_age_minutes if intentional."
            exit 1
          fi
          echo "Within safety cap ($count ≤ $SAFETY_CAP) ✓"

      - name: Delete stale orgs
        if: steps.identify.outputs.count != '0' && env.DRY_RUN != 'true'
        run: |
          set -uo pipefail
          deleted=0
          failed=0
          while IFS= read -r slug; do
            [ -z "$slug" ] && continue
            # The DELETE handler requires {"confirm": "<slug>"} matching
            # the URL slug — fat-finger guard. Idempotent: re-issuing
            # picks up via org_purges.last_step.
            # Tempfile-routed -w + set +e/-e prevents curl-exit-code
            # pollution of the captured status (lint-curl-status-capture.yml).
            set +e
            curl -sS -o /tmp/del_resp -w "%{http_code}" \
              --max-time 60 \
              -X DELETE "$MOLECULE_CP_URL/cp/admin/tenants/$slug" \
              -H "Authorization: Bearer $ADMIN_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"confirm\":\"$slug\"}" >/tmp/del_code
            set -e
            # Stderr from curl (-sS shows dial errors etc.) goes to runner log.
            http_code=$(cat /tmp/del_code 2>/dev/null || echo "000")
            if [ "$http_code" = "200" ] || [ "$http_code" = "204" ]; then
              deleted=$((deleted+1))
              echo "  deleted: $slug"
            else
              failed=$((failed+1))
              echo "  FAILED ($http_code): $slug — $(cat /tmp/del_resp 2>/dev/null | head -c 200)"
            fi
          done < stale_slugs.txt
          echo ""
          echo "Sweep summary: deleted=$deleted failed=$failed"
          # Don't fail the workflow on per-org delete errors — the
          # sweeper is best-effort. Next hourly tick re-attempts. We
          # only fail loud at the safety-cap gate above.

      - name: Sweep orphan tunnels
        # Stale-org cleanup deletes the org (which cascades to tunnel
        # delete inside the CP). But when that cascade fails partway —
        # CP transient 5xx after the org row is deleted but before the
        # CF tunnel delete completes — the tunnel persists with no
        # matching org row. The reconciler in internal/sweep flags this
        # as `cf_tunnel kind=orphan`, but nothing automatically reaps it.
        #
        # `/cp/admin/orphan-tunnels/cleanup` is the operator-triggered
        # reaper. Calling it here at the end of every sweep tick
        # converges the staging CF account to clean even when CP
        # cascades half-fail.
        #
        # PR #492 made the underlying DeleteTunnel actually check
        # status — pre-fix it silent-succeeded on CF code 1022
        # ("active connections"), so this step would have been a no-op
        # against stuck connectors. Post-fix the cleanup invokes
        # CleanupTunnelConnections + retry, which actually clears the
        # 1022 case. (#2987)
        #
        # Best-effort. Failure here doesn't fail the workflow — next
        # tick re-attempts. Errors flow to step output for ops review.
        if: env.DRY_RUN != 'true'
        run: |
          set +e
          curl -sS -o /tmp/cleanup_resp -w "%{http_code}" \
            --max-time 60 \
            -X POST "$MOLECULE_CP_URL/cp/admin/orphan-tunnels/cleanup" \
            -H "Authorization: Bearer $ADMIN_TOKEN" >/tmp/cleanup_code
          set -e
          http_code=$(cat /tmp/cleanup_code 2>/dev/null || echo "000")
          body=$(cat /tmp/cleanup_resp 2>/dev/null | head -c 500)
          if [ "$http_code" = "200" ]; then
            count=$(echo "$body" | python3 -c "import sys,json; d=json.loads(sys.stdin.read() or '{}'); print(d.get('deleted_count', 0))" 2>/dev/null || echo "0")
            failed_n=$(echo "$body" | python3 -c "import sys,json; d=json.loads(sys.stdin.read() or '{}'); print(len(d.get('failed') or {}))" 2>/dev/null || echo "0")
            echo "Orphan-tunnel sweep: deleted=$count failed=$failed_n"
          else
            echo "::warning::orphan-tunnels cleanup returned HTTP $http_code — body: $body"
          fi

      - name: Dry-run summary
        if: env.DRY_RUN == 'true'
        run: |
          echo "DRY RUN — would have deleted ${{ steps.identify.outputs.count }} org(s) AND triggered orphan-tunnels cleanup. Re-run with dry_run=false to actually delete."

      - name: Notify on sweep failure
        # Fail-loud companion to dropping `continue-on-error: true`.
        # If any prior step failed (missing token, CP 5xx, safety-cap
        # tripped, etc.) emit a clearly-tagged ::error:: line so the
        # Gitea runs UI + any log-tail consumer (Loki SOPRefireRule)
        # flags this. Without this step, an early `exit 2` shows as a
        # red run but the message can scroll past in busy log windows;
        # the explicit tag here is greppable from the orchestrator
        # triage loop.
        if: failure()
        run: |
          echo "::error::sweep-stale-e2e-orgs FAILED — staging tenants may be leaking. See prior step logs. Common causes: (a) staging admin token missing/rotated, (b) staging-api.moleculesai.app 5xx, (c) safety cap tripped. Use the CP's targeted tenant cleanup and verify provider/tunnel/DNS state; do not run a broad production cleanup."
          exit 1
