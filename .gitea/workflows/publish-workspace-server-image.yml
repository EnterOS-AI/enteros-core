name: publish-workspace-server-image

# The PUBLISH half of the current main-branch local-Docker tenant image path.
# `main` is the current deployment branch; no `staging` branch exists. The
# `staging-*` strings below are artifact-tag names retained for compatibility,
# not evidence of a staging Git branch.
#
# CURRENT ORDERING
# ----------------
#   publish-workspace-server-image   (THIS FILE)  — build the tenant image
#        push :staging-<sha> + :staging-latest
#        dispatch redeploy-tenants-on-main.yml (best effort)
#        wait for CI, then promote the candidate to :latest
#
# The redeploy workflow pulls molecule-tenant:latest. Because the best-effort
# dispatch and the sibling push-trigger can both run before promote-latest moves
# that tag, either run may pull the previous image. No post-promotion redeploy is
# guaranteed by this workflow. A green publish therefore proves the artifact;
# it does not by itself prove that any running tenant consumed that artifact.
#
# Before this file existed, the redeploy workflow triggered on
# `workspace-server/**` / `canvas/**` pushes but NOTHING rebuilt the tenant
# image, so a merged fix never produced a deployable artifact. This workflow
# closes the artifact gap; the ordering gap described above remains open.
#
# molecules-server (local-docker) era — NOT ECR
# ---------------------------------------------
# The AWS account was retired 2026-06-27; the dead ECR
# publish-workspace-server-image.yml was removed in #3391. This is its
# molecules-server successor.
#   - Builds on ROBOT-1 (`runs-on: [docker-host, robot-1]`, robot-1's 32c
#     dedicated build box) to keep the heavy Go-platform + canvas tenant image
#     build OFF the local molecules-server box. `--load`s the image into
#     robot-1's daemon under the SSOT-qualified name `${TENANT_IMAGE}:<tag>`.
#   - Publishes to registry.moleculesai.app via the PARALLEL CHUNKED PUSHER
#     (SSOT: molecule-ai/operator-config bin/registry-parallel-push.py), THROUGH
#     the Cloudflare tunnel. A plain `docker push` of the multi-GB layers 413s at
#     the CF Free ~100MB request-body cap; the pusher uploads each blob in
#     <=90MB sequential contiguous chunks (adaptive across-blob concurrency +
#     resume), so no PATCH ever exceeds the cap. Because the build now runs
#     off-host, this registry push is the SSOT the deploy pulls from — NOT a
#     same-daemon --load tag. The local-Docker main redeploy pulls the image
#     from `registry.moleculesai.app`, making that registry the artifact SSOT.
#   - DOCUMENTED FALLBACK (kept until the chunked path is prod-proven): repo var
#     PUBLISH_PUSH_MODE=localhost-bypass reverts to the pre-migration CF-BYPASS
#     (push straight to the host's local Gitea OCI endpoint localhost:3200,
#     skipping the CF edge). That path requires local-host placement, so using it
#     also means overriding runs-on to a local docker-host runner. Not deleted.
#
# Tag scheme (parallels publish-canvas-image.yml):
#   :staging-<sha>  — immutable per-commit candidate built from main.
#   :staging-latest — most recent BUILD from main (last-writer-wins, NOT gated).
#   :latest         — most recent CI-GREEN build. Only moved by promote-latest
#                     (main only, after green push CI, and only when the
#                     production freeze PROD_AUTO_DEPLOY_DISABLED is lifted).
#                     What the local-Docker main redeploy pulls.
#
# The tenant image bakes BOTH the Go platform (workspace-server) AND the canvas
# Next.js UI (workspace-server/Dockerfile.tenant, stage 2 at /canvas), which is
# why a `canvas/**` change must also rebuild it — mirrors the trigger set of the
# redeploy workflows exactly so publish + deploy key off the same pushes.

on:
  push:
    # `staging` is an inert compatibility entry while that branch is absent.
    # Removing it changes trigger behavior and belongs in a separate cleanup.
    branches: [main, staging]
    paths:
      - 'workspace-server/**'
      - 'canvas/**'
      - 'manifest.json'
      - '.gitea/workflows/publish-workspace-server-image.yml'
      - '.gitea/workflows/staging-tenant-cd.yml'
      - 'scripts/deploy/advance-staging-tenant-pin.sh'
      - 'scripts/deploy/redeploy-staging-fleet.sh'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

# Serialize per-branch so two rapid pushes don't race two builds onto the same
# moving :staging-latest / :latest tag. cancel-in-progress:false — never abort a
# publish mid-push (the per-commit :staging-<sha> tag is immutable, so a
# completed predecessor is always a good artifact). Mirrors the redeploy
# workflows' concurrency posture.
concurrency:
  group: publish-workspace-server-image-${{ github.ref }}
  cancel-in-progress: false

env:
  GITHUB_SERVER_URL: https://git.moleculesai.app
  # SSOT: the exact var + default the local-Docker redeploy workflow consumes,
  # so whatever they pull, this publishes (no-hardcoding principle). Overridable
  # org/repo-wide via the MOLECULE_TENANT_IMAGE var without touching any workflow.
  TENANT_IMAGE: ${{ vars.MOLECULE_TENANT_IMAGE || 'registry.moleculesai.app/molecule-ai/molecule-tenant' }}

jobs:
  # bp-exempt: post-merge tenant-image publication side effect; the source
  # changes that trigger it were already gated by CI / all-required on the PR.
  build-and-push:
    name: Build & push tenant image
    # robot-1's 32c dedicated build box (the `robot-1` label is exclusive to that
    # host's fleet runners). Offloads the heavy Go-platform + canvas tenant image
    # build off the local molecules-server box. `[docker-host, robot-1]` = AND
    # semantics, so it lands ONLY on robot-1 while still satisfying
    # lint-required-workflows-docker-host-pinned (docker-host is present). The
    # image is `--load`ed into robot-1's daemon and then pushed to the registry
    # via the parallel chunked pusher (below); the local-Docker redeploy pulls the
    # CI-green tag FROM registry.moleculesai.app. The reliable chunked push makes
    # the registry the SSOT, so the build and deploy need not share a daemon.
    runs-on: [docker-host, robot-1]
    timeout-minutes: 45
    outputs:
      staging_sha: ${{ steps.tags.outputs.staging_sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Fail loudly at step 1 if the runner's docker.sock is inaccessible,
      # instead of deep inside `docker build` with a cryptic error.
      - name: Verify Docker daemon access
        run: |
          set -euo pipefail
          echo "::group::Docker daemon health check"
          echo "Runner: ${HOSTNAME:-unknown}"
          docker_info="$(docker info 2>&1)" || {
            echo "::error::Docker daemon is not accessible at /var/run/docker.sock"
            printf '%s\n' "${docker_info}"
            echo "::error::Check: (1) daemon running, (2) runner user in docker group, (3) sock perms 660+"
            exit 1
          }
          printf '%s\n' "${docker_info}" | sed -n '1,5p'
          echo "Docker daemon OK"
          echo "::endgroup::"

      # The publish runner's default HOME can be host-owned + non-writable, so
      # docker credential saves fail. Point HOME + DOCKER_CONFIG at the writable
      # job temp dir (same fix as publish-canvas-image.yml #2193).
      - name: Prepare writable HOME + Docker config
        run: |
          set -euo pipefail
          H="$RUNNER_TEMP/wss-publish-home"
          mkdir -p "$H/.docker"
          echo "HOME=$H" >> "$GITHUB_ENV"
          echo "DOCKER_CONFIG=$H/.docker" >> "$GITHUB_ENV"

      # AUTO_SYNC_TOKEN is the scoped cross-repo clone
      # token for the private workspace-template-* / org-template-* / plugin
      # repos in manifest.json. Sourced from the Infisical SSOT
      # (/shared/dev-utils::AUTO_SYNC_TOKEN, environment=prod) via the CI machine
      # identity, keeping the credential in the current Infisical SSOT path.
      #
      # FORK SAFETY: this workflow fires only on configured push refs (the current
      # deployment branch is main) + workflow_dispatch, with no pull_request trigger, so
      # fetchable on an untrusted fork trigger; the conditional is
      # belt-and-suspenders. Gitea also withholds secrets from forks at the
      # runner level (defense in depth).
      - name: Fetch AUTO_SYNC_TOKEN from Infisical SSOT
        id: auto_sync_token
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
        env:
          INFISICAL_CI_CLIENT_ID: ${{ secrets.INFISICAL_CI_CLIENT_ID }}
          INFISICAL_CI_CLIENT_SECRET: ${{ secrets.INFISICAL_CI_CLIENT_SECRET }}
          INFISICAL_PROJECT_ID: ${{ secrets.INFISICAL_CI_PROJECT_ID }}
        run: |
          set -uo pipefail
          BASE="https://key.moleculesai.app"
          TOK=$(curl -fsS -X POST "$BASE/api/v1/auth/universal-auth/login" \
            -H 'Content-Type: application/json' \
            -d "{\"clientId\":\"$INFISICAL_CI_CLIENT_ID\",\"clientSecret\":\"$INFISICAL_CI_CLIENT_SECRET\"}" \
            | python3 -c 'import sys,json; d=json.load(sys.stdin); v=d.get("accessToken"); sys.stdout.write(v if isinstance(v,str) and v else "")')
          read_secret() {
            curl -fsS "$BASE/api/v3/secrets/raw/$1?workspaceId=$INFISICAL_PROJECT_ID&environment=prod&secretPath=$2" \
              -H "Authorization: Bearer $TOK" \
              | python3 -c 'import sys,json; d=json.load(sys.stdin); v=(d.get("secret") or {}).get("secretValue"); sys.stdout.write(v if isinstance(v,str) and v else "")'
          }
          AUTO_SYNC_TOKEN=$(read_secret AUTO_SYNC_TOKEN %2Fshared%2Fdev-utils)
          echo "::add-mask::$AUTO_SYNC_TOKEN"
          if [ -z "$AUTO_SYNC_TOKEN" ]; then
            echo "::error::Infisical returned empty for AUTO_SYNC_TOKEN at /shared/dev-utils"
            exit 1
          fi
          echo "AUTO_SYNC_TOKEN=$AUTO_SYNC_TOKEN" >> "$GITHUB_ENV"
          echo "AUTO_SYNC_TOKEN loaded from Infisical (len=${#AUTO_SYNC_TOKEN})"

      # Pre-flight: fail fast with a per-entry ::error:: if a manifest repo was
      # deleted without updating manifest.json (issue #2192), instead of a
      # generic git 404 deep in the clone step. Private repos → authenticated.
      - name: Validate manifest entries exist
        env:
          MOLECULE_GITEA_TOKEN: ${{ env.AUTO_SYNC_TOKEN }}
          GITEA_TOKEN: ${{ env.AUTO_SYNC_TOKEN }}
        run: |
          set -euo pipefail
          bash scripts/check-manifest-repos-exist.sh manifest.json

      # Pre-clone manifest deps before docker build. workspace-template-* /
      # org-template-* / plugin repos are PRIVATE; Dockerfile.tenant COPYs them
      # from .tenant-bundle-deps/ (it cannot `git clone` inside the build with
      # no auth path that wouldn't leak the token into a layer). clone-manifest.sh
      # embeds AUTO_SYNC_TOKEN as basic-auth, then strips .git — the token never
      # enters the image.
      - name: Pre-clone manifest deps
        env:
          MOLECULE_GITEA_TOKEN: ${{ env.AUTO_SYNC_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p .tenant-bundle-deps
          # Strip JSON5 `//` comments before jq parsing in clone-manifest.sh.
          sed '/^[[:space:]]*\/\//d' manifest.json > .manifest-stripped.json
          bash scripts/clone-manifest.sh \
            .manifest-stripped.json \
            .tenant-bundle-deps/workspace-configs-templates \
            .tenant-bundle-deps/org-templates \
            .tenant-bundle-deps/plugins
          ws_count=$(find .tenant-bundle-deps/workspace-configs-templates -mindepth 1 -maxdepth 1 -type d | wc -l)
          org_count=$(find .tenant-bundle-deps/org-templates -mindepth 1 -maxdepth 1 -type d | wc -l)
          plugins_count=$(find .tenant-bundle-deps/plugins -mindepth 1 -maxdepth 1 -type d | wc -l)
          echo "Cloned: ws=$ws_count org=$org_count plugins=$plugins_count"

      - name: Compute tags
        id: tags
        run: |
          set -euo pipefail
          echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "staging_sha=staging-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      # Build the combined platform+canvas tenant image and --load it into the
      # shared host daemon under the SSOT-qualified name. Retry loop: buildkit
      # EOF (internal#2468) is often transient under memory pressure on the
      # publish host. GIT_SHA is baked so /buildinfo reports the served SHA,
      # which the redeploy health gate verifies (Dockerfile.tenant #2395).
      - name: Build tenant image (--load, staging-<sha> + staging-latest)
        env:
          TENANT_IMAGE: ${{ env.TENANT_IMAGE }}
          TAG_SHA: staging-${{ steps.tags.outputs.sha }}
          TAG_LATEST: staging-latest
          GIT_SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
          # Exact generated-image R2 origin baked into the canvas CSP img-src at
          # BUILD time (NEXT_PUBLIC_* is inlined by Next.js, not read at runtime).
          # Config, not a secret — a public CSP directive value. prod + staging
          # share the R2 bucket + account, so one baked value is correct for both.
          IMAGE_GEN_R2_HOST: ${{ vars.IMAGE_GEN_R2_HOST || 'https://molecule-workspace-data.bfa4e604e168a938e565600b27e2828c.r2.cloudflarestorage.com' }}
        run: |
          set -euo pipefail
          export DOCKER_BUILDKIT=1
          built=0
          for attempt in 1 2 3; do
            echo "::notice::Tenant image build attempt ${attempt}/3 ..."
            if docker build \
                --file ./workspace-server/Dockerfile.tenant \
                --build-arg GIT_SHA="${GIT_SHA}" \
                --build-arg NEXT_PUBLIC_PLATFORM_URL= \
                --build-arg NEXT_PUBLIC_IMAGE_GEN_R2_HOST="${IMAGE_GEN_R2_HOST}" \
                --label "org.opencontainers.image.source=https://git.moleculesai.app/${REPO}" \
                --label "org.opencontainers.image.revision=${GIT_SHA}" \
                --label "org.opencontainers.image.created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
                --label "molecule.workflow.run_id=${GITHUB_RUN_ID}" \
                --tag "${TENANT_IMAGE}:${TAG_SHA}" \
                --tag "${TENANT_IMAGE}:${TAG_LATEST}" \
                . ; then
              built=1
              echo "::notice::Tenant image build succeeded on attempt ${attempt}"
              break
            fi
            echo "::warning::Tenant image build attempt ${attempt} failed — retrying"
            sleep 10
          done
          if [ "$built" -ne 1 ]; then
            echo "::error::Tenant image build failed after 3 attempts"
            exit 1
          fi
          # End-state verification (not exit-code trust): the tag must exist in the
          # build daemon before the registry upload step.
          docker image inspect "${TENANT_IMAGE}:${TAG_SHA}" --format 'built {{.Id}}' >/dev/null \
            || { echo "::error::image ${TENANT_IMAGE}:${TAG_SHA} missing after build"; exit 1; }
          echo "::notice::image present in host daemon: $(docker image inspect "${TENANT_IMAGE}:${TAG_SHA}" --format '{{.Id}}')"

      # Publish to registry.moleculesai.app via the PARALLEL CHUNKED PUSHER,
      # THROUGH the Cloudflare tunnel. A plain `docker push` of the multi-GB
      # tenant layers 413s at the CF Free ~100MB request-body cap; the pusher
      # (SSOT: molecule-ai/operator-config bin/registry-parallel-push.py) uploads
      # each blob in <=90MB sequential contiguous chunks with adaptive
      # across-blob concurrency + resume, so no PATCH ever exceeds the cap. Now
      # that this build runs on robot-1 (off the deploy host), the reliable
      # registry push is what the local-Docker redeploy and configured provisions use
      # (`docker pull` is uncapped through CF) — the registry is the SSOT, not a
      # same-host --load tag.
      #
      # DOCUMENTED FALLBACK (kept until the chunked path is prod-proven): set the
      # repo var PUBLISH_PUSH_MODE=localhost-bypass to use the pre-migration
      # CF-BYPASS that pushes straight to the host's local Gitea OCI endpoint
      # (localhost:3200), skipping the CF edge + its cap. That path ONLY works
      # when this job runs ON the local Gitea host, so switching to it also means
      # overriding runs-on to a local docker-host runner. The bypass code is
      # preserved here, not deleted.
      - name: Publish tenant image to registry (chunked pusher through CF tunnel)
        env:
          TENANT_IMAGE: ${{ env.TENANT_IMAGE }}
          TAG_SHA: staging-${{ steps.tags.outputs.sha }}
          TAG_LATEST: staging-latest
          IMAGE_REPO: molecule-ai/molecule-tenant
          REG_USER: ${{ vars.MOLECULE_REGISTRY_USER || 'hongming' }}
          REG_TOKEN: ${{ secrets.MOLECULE_REGISTRY_TOKEN }}
          # Token that can read the private operator-config repo to fetch the
          # pusher. Already resolved from the Infisical SSOT above.
          AUTO_SYNC_TOKEN: ${{ env.AUTO_SYNC_TOKEN }}
          PUSHER_REF: ${{ vars.OPERATOR_CONFIG_PUSHER_REF || 'main' }}
          GITHUB_SERVER_URL: ${{ env.GITHUB_SERVER_URL }}
          PUBLISH_PUSH_MODE: ${{ vars.PUBLISH_PUSH_MODE || 'chunked-tunnel' }}
          LOCALHOST_PUSH_HOST: ${{ vars.LOCALHOST_PUSH_HOST || 'localhost:3200' }}
        run: |
          set -uo pipefail
          REG_HOST="${TENANT_IMAGE%%/*}"
          LOCAL_IMAGE="${TENANT_IMAGE}:${TAG_SHA}"
          if [ -z "${REG_TOKEN:-}" ]; then
            echo "::notice::MOLECULE_REGISTRY_TOKEN not set — skipping registry push."
            echo "::notice::The image is present in the build daemon as ${LOCAL_IMAGE}; wire the org secret to publish."
            exit 0
          fi
          echo "::add-mask::$REG_TOKEN"

          # ---- DOCUMENTED CF-BYPASS FALLBACK (localhost:3200) ------------------
          if [ "${PUBLISH_PUSH_MODE}" = "localhost-bypass" ]; then
            echo "::notice::PUBLISH_PUSH_MODE=localhost-bypass — pushing via ${LOCALHOST_PUSH_HOST} (CF-bypass; requires local-host placement)."
            if ! printf '%s' "$REG_TOKEN" | docker login "$LOCALHOST_PUSH_HOST" --username "$REG_USER" --password-stdin >/dev/null 2>&1; then
              echo "::warning::docker login ${LOCALHOST_PUSH_HOST} failed — is this job on the local Gitea host? (non-fatal)"; exit 0
            fi
            for t in "$TAG_SHA" "$TAG_LATEST"; do
              docker tag "$LOCAL_IMAGE" "${LOCALHOST_PUSH_HOST}/${IMAGE_REPO}:${t}"
              docker push "${LOCALHOST_PUSH_HOST}/${IMAGE_REPO}:${t}" >/dev/null 2>&1 \
                && echo "::notice::bypass-pushed ${IMAGE_REPO}:${t}" \
                || echo "::warning::bypass push of ${t} failed (non-fatal)"
            done
            exit 0
          fi

          # ---- PRIMARY: parallel chunked pusher THROUGH the CF tunnel ----------
          PUSHER="$RUNNER_TEMP/registry-parallel-push.py"
          url="${GITHUB_SERVER_URL}/api/v1/repos/molecule-ai/operator-config/raw/bin/registry-parallel-push.py?ref=${PUSHER_REF}"
          if ! curl -fsSL -H "Authorization: token ${AUTO_SYNC_TOKEN}" "$url" -o "$PUSHER"; then
            echo "::warning::could not fetch the chunked pusher from operator-config@${PUSHER_REF} (needs operator-config PR #364 on that ref). Non-fatal; no registry push this run."
            exit 0
          fi
          rc=0
          for t in "$TAG_SHA" "$TAG_LATEST"; do
            echo "::group::chunked push ${REG_HOST}/${IMAGE_REPO}:${t}"
            if python3 "$PUSHER" --image "$LOCAL_IMAGE" --registry "$REG_HOST" \
                 --repo "$IMAGE_REPO" --tag "$t" --user "$REG_USER"; then
              echo "::notice::chunked-pushed ${REG_HOST}/${IMAGE_REPO}:${t}"
            else
              echo "::warning::chunked push of ${t} failed"; rc=1
            fi
            echo "::endgroup::"
          done
          if [ "$rc" != 0 ]; then
            echo "::warning::one or more chunked pushes failed — investigate before relying on the registry for off-host deploys."
          fi
          exit 0

      # Best-effort dispatch after the candidate tags exist. The redeploy pulls
      # :latest, which promote-latest moves only in the later job below, so this
      # dispatch can still pull the prior image. The sibling push-trigger has
      # the same race; neither path guarantees a post-promotion redeploy.
      - name: Trigger matching redeploy after candidate push (best-effort; ordering not guaranteed)
        if: github.event_name == 'push'
        env:
          DISPATCH_TOKEN: ${{ env.AUTO_SYNC_TOKEN }}
          REPO: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -uo pipefail
          case "$REF_NAME" in
            main)    wf="redeploy-tenants-on-main.yml" ;;
            staging) wf="redeploy-tenants-on-staging.yml" ;;
            *)       echo "::notice::no redeploy mapping for ref ${REF_NAME} — skipping"; exit 0 ;;
          esac
          if [ -z "${DISPATCH_TOKEN:-}" ]; then
            echo "::notice::no dispatch token — relying on the redeploy push-trigger"; exit 0
          fi
          code=$(curl -sS -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Authorization: token ${DISPATCH_TOKEN}" \
            -H "Content-Type: application/json" \
            "https://git.moleculesai.app/api/v1/repos/${REPO}/actions/workflows/${wf}/dispatches" \
            -d "{\"ref\":\"${REF_NAME}\"}") || code="000"
          if [ "$code" = "204" ] || [ "$code" = "201" ] || [ "$code" = "200" ]; then
            echo "::notice::dispatched ${wf} on ${REF_NAME} (HTTP ${code})"
          else
            echo "::warning::dispatch of ${wf} returned HTTP ${code} (non-fatal; the sibling push-trigger still makes a best-effort redeploy attempt, but neither path guarantees a post-promotion rollout)"
          fi

  # bp-exempt: post-merge prod :latest promote side effect; gated on green push
  # CI for this SHA AND the PROD_AUTO_DEPLOY_DISABLED production freeze.
  promote-latest:
    name: Promote tenant :latest to CI-green build
    needs: build-and-push
    # Main push only. build-and-push always advances the candidate
    # :staging-latest tag; workflow_dispatch / non-main never promote :latest.
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: docker-host
    timeout-minutes: 60
    env:
      GITEA_HOST: git.moleculesai.app
      CI_STATUS_TIMEOUT_SECONDS: "3600"
      # Reuses the production kill-switch: while local-Docker auto-redeploy is
      # frozen, the :latest promote pauses too. This keeps that moving tag and
      # the labeled local-Docker subset on their prior image until an operator
      # lifts the freeze; it makes no claim about other provider paths.
      PROD_AUTO_DEPLOY_DISABLED: ${{ vars.PROD_AUTO_DEPLOY_DISABLED || secrets.PROD_AUTO_DEPLOY_DISABLED || '' }}
    steps:
      - name: Prepare writable HOME + Docker config
        run: |
          set -euo pipefail
          H="$RUNNER_TEMP/wss-promote-home"
          mkdir -p "$H/.docker"
          echo "HOME=$H" >> "$GITHUB_ENV"
          echo "DOCKER_CONFIG=$H/.docker" >> "$GITHUB_ENV"

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Resolve promote gate (production freeze)
        id: gate
        env:
          PROD_AUTO_DEPLOY_DISABLED: ${{ env.PROD_AUTO_DEPLOY_DISABLED }}
        run: |
          set -euo pipefail
          if [ -n "${PROD_AUTO_DEPLOY_DISABLED:-}" ]; then
            case "$(printf '%s' "$PROD_AUTO_DEPLOY_DISABLED" | tr '[:upper:]' '[:lower:]')" in
              1|true|yes|on|disabled|disable)
                echo "enabled=false" >> "$GITHUB_OUTPUT"
                echo "::notice::tenant :latest promote skipped: PROD_AUTO_DEPLOY_DISABLED=$PROD_AUTO_DEPLOY_DISABLED"
                {
                  echo "## Tenant :latest promote skipped (production frozen)"
                  echo ""
                  echo "Reason: \`PROD_AUTO_DEPLOY_DISABLED=$PROD_AUTO_DEPLOY_DISABLED\`. The build is published as \`:staging-${GITHUB_SHA::7}\` + \`:staging-latest\`; \`:latest\` was left unchanged, so the labeled local-Docker subset stays on its prior image."
                } >> "$GITHUB_STEP_SUMMARY"
                exit 0 ;;
            esac
          fi
          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Wait for green push CI on this SHA
        if: ${{ steps.gate.outputs.enabled == 'true' }}
        env:
          GITEA_TOKEN: ${{ secrets.AUTO_SYNC_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${GITEA_TOKEN:-}" ]; then
            echo "::error::AUTO_SYNC_TOKEN required so the promote can wait for green CI on this SHA."
            exit 1
          fi
          # Shared wait-helper contract: block until the required push contexts
          # go green on THIS sha; fail closed if any terminally fail.
          python3 .gitea/scripts/prod-auto-deploy.py wait-ci

      - name: Promote :latest to the CI-green tenant image (registry manifest re-point)
        if: ${{ steps.gate.outputs.enabled == 'true' }}
        env:
          TENANT_IMAGE: ${{ env.TENANT_IMAGE }}
          STAGING_SHA_TAG: ${{ needs.build-and-push.outputs.staging_sha }}
          REG_TOKEN: ${{ secrets.MOLECULE_REGISTRY_TOKEN }}
          REG_USER: ${{ vars.MOLECULE_REGISTRY_USER || 'hongming' }}
        run: |
          set -euo pipefail
          # Fail-safe: recompute the immutable per-commit tag from the SHA if the
          # build job's output didn't propagate, so we never promote a guess.
          SHA_TAG="${STAGING_SHA_TAG:-staging-${GITHUB_SHA::7}}"
          REG_HOST="${TENANT_IMAGE%%/*}"
          SRC="${TENANT_IMAGE}:${SHA_TAG}"
          DST="${TENANT_IMAGE}:latest"
          if [ -z "${REG_TOKEN:-}" ]; then
            echo "::error::MOLECULE_REGISTRY_TOKEN required to re-point :latest in the registry."
            exit 1
          fi
          echo "::add-mask::$REG_TOKEN"
          printf '%s' "$REG_TOKEN" | docker login "$REG_HOST" --username "$REG_USER" --password-stdin >/dev/null

          # Registry-level, MANIFEST-ONLY re-point (no pull/rebuild, no blob
          # transfer — well under the CF 100MB request-body cap, so this is
          # tunnel-safe without the chunked pusher). :latest becomes
          # byte-identical to the CI-green :staging-<sha> that build-and-push
          # chunked-pushed to registry.moleculesai.app. Because the build now
          # runs off-host on robot-1, we re-point in the REGISTRY (the SSOT) —
          # NOT a same-daemon `docker tag`, which would not see the build's
          # --load tag. The local-Docker main redeploy pulls this from the registry
          # (`docker pull`, uncapped through CF).
          docker buildx imagetools create --tag "$DST" "$SRC"
          echo "::notice::re-pointed $DST -> $SRC (registry manifest)"

          {
            echo "## Tenant :latest promoted"
            echo ""
            echo "Re-pointed \`${TENANT_IMAGE}:latest\` -> \`${SHA_TAG}\` for commit \`${GITHUB_SHA::7}\` (registry manifest)."
            echo "No post-promotion tenant redeploy is guaranteed by this workflow; verify the served digest separately for every target provider."
          } >> "$GITHUB_STEP_SUMMARY"

      # ── Enter OS rebrand Phase 2 (internal#1089): ADVISORY dual-domain arm ──
      # This publish workflow has no per-tenant fqdn context (the blocking
      # <slug>.moleculesai.app-service /buildinfo identity gate runs daemon-side
      # in the redeploy workflows' shared swap script). The enteros.ai
      # equivalent HERE is an ops-seeded CANARY fqdn: after the :latest
      # promote, probe https://<canary>/buildinfo through the NEW brand edge
      # to measure enteros.ai routing readiness. DARK by default — until ops
      # seeds the ENTEROS_BUILDINFO_CANARY_FQDN repo var (e.g. a concierge
      # tenant's <slug>.enteros.ai) this step notices-and-exits 0, changing
      # nothing. Once seeded it WARNS loudly on failure; the ::warning:: names
      # exactly what to check.
      #
      # FLIP-TO-BLOCKING CONDITION: once ops seeds enteros.ai tenant routing +
      # the canary var AND this arm has soaked green across consecutive
      # promotes, delete the continue-on-error line below (and wire
      # EXPECTED_BUILD_SHA) so the enteros edge gates the promote too. The
      # probe script already fails closed; the flip is only removing the mask.
      - name: Probe enteros.ai canary buildinfo (advisory Phase-2 arm)
        if: ${{ steps.gate.outputs.enabled == 'true' }}
        # internal#1089 — Enter OS Phase 2: advisory until enteros.ai routing +
        # canary var are ops-seeded + soak-green (flip condition above).
        continue-on-error: true
        env:
          ENTEROS_BUILDINFO_CANARY_FQDN: ${{ vars.ENTEROS_BUILDINFO_CANARY_FQDN || '' }}
        run: |
          set -euo pipefail
          if [ -z "${ENTEROS_BUILDINFO_CANARY_FQDN}" ]; then
            echo "::notice::enteros.ai canary buildinfo probe is DARK — repo var ENTEROS_BUILDINFO_CANARY_FQDN is unset (internal#1089 Phase 2: ops seeds it with a tenant fqdn on enteros.ai to arm this advisory probe)."
            exit 0
          fi
          bash scripts/deploy/probe-enteros-buildinfo.sh \
            --fqdn "$ENTEROS_BUILDINFO_CANARY_FQDN"
