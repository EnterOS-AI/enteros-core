name: sdk-route-milestone-contract-drift

# SDK route + happy-path milestone derive-gates (RFC molecule-core#4428, Phase 3
# — PROMOTED to a hard, always-fire, merge-blocking gate). Closes #87 and #88.
#
# molecule-ai-sdk is the SSOT for the registry+A2A route lane
# (molcontracts.SDKRoutes) and the happy-path milestone set
# (molcontracts.HappyPathMilestones), both vendored into workspace-server via
# the gen/go binding. These two Go tests DERIVE the contract from the vendored
# SSOT and assert core still honours it:
#
#   * TestSDKRoutesContract (internal/router) — every SDKRoutes entry is
#     registered in router.go under the same method (#87).
#   * TestHappyPathMilestonesMatchRunner (internal/e2emilestones) — the
#     staging-full-saas runner's `required=` set equals the SSOT milestone
#     ids (#88), locking them together so Phase 2's extension can't drift.
#
# ── Phase 3: HARD GATE (always-fire on every PR; NO paths filter) ──
# core `main` runs branch-protection required_contexts=['*'], which counts EVERY
# posted commit status. The two derive tests are DETERMINISTIC and were verified
# green on main before this promotion, so — unlike an advisory gate — a
# pull_request trigger is exactly what we want: the status posts on every PR and
# ['*'] makes it merge-blocking. This context is also listed explicitly in
# .gitea/required-contexts.txt for the presence guarantee (it must post; it can
# never be silently absent).
#
# NO `paths:` filter — .gitea/scripts/lint-required-no-paths.py (ARM A) forbids a
# paths filter on any required context: a path-skipped required check would go
# absent on unrelated PRs and wedge the merge queue under ['*']. The gate is
# cheap (two ~0.3s Go tests) so it runs on every PR unconditionally.
#
# NO schedule/cron: molecule-core enforces a zero-cron ratchet
# (.gitea/scripts/lint_schedule_budget.py). push:main remains as the post-merge
# drift signal; workflow_dispatch allows on-demand runs.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sdk-route-milestone-contract-drift-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Phase 3 (RFC #4428 §7): required merge gate. Its context is
  # `sdk-route-milestone-contract-drift / SDK route + milestone derive-gates` and
  # is listed in .gitea/required-contexts.txt. Renaming this job changes the
  # context string — keep it in lockstep with that file.
  # bp-required: yes — merge-blocking under main's branch-protection
  # status_check_contexts=['*'] (every posted context is required, #4363).
  derive-gates:
    name: SDK route + milestone derive-gates
    runs-on: ubuntu-latest
    timeout-minutes: 8
    defaults:
      run:
        working-directory: workspace-server
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: stable
          # cache:false — self-hosted runners bind-mount a persistent
          # GOCACHE/GOMODCACHE; actions/cache corrupts it (see weekly-platform-go.yml).
          cache: false

      - name: Go mod download
        run: go mod download

      # MOLECULE_RUN_CONTRACT_DRIFT_GATES=1 un-skips the two gate tests, which
      # SKIP by default (so ci.yml's `go test ./...` on PRs stays non-blocking).
      # This workflow is the ONLY place they execute for real.
      - name: Route derive-gate (SDKRoutes vs router.go) — #87
        env:
          MOLECULE_RUN_CONTRACT_DRIFT_GATES: "1"
        run: go test ./internal/router/ -run 'SDKRoutes' -count=1 -v

      - name: Milestone derive-gate (HappyPathMilestones vs E2E runner) — #88
        env:
          MOLECULE_RUN_CONTRACT_DRIFT_GATES: "1"
        run: go test ./internal/e2emilestones/ -run 'HappyPathMilestones' -count=1 -v
