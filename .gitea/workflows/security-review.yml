# security-review — non-author APPROVE from the `security` Gitea team
# required to merge.
#
# RFC#324 Step 1 of 5 (workflow-add). Mirror of `qa-review.yml`; differs
# only in TEAM=security, TEAM_ID=21, and the slash-command name.
#
# See `qa-review.yml` header for the full A1-α / A1.1 / A4 / A5 design
# rationale; everything below is identical in shape.
#
# A1-α addendum (internal#760): `pull_request_review_approved` trigger
# added so the security gate flips immediately when a team member submits
# an APPROVE review. Gitea Actions uses the specific event name
# `pull_request_review_approved` (not the GitHub-style `pull_request_review`
# catch-all). Verified via Gitea source code audit (go-gitea/gitea main,
# modules/webhook/type.go + services/actions/notifier.go). The event
# payload carries `review.type="pull_request_review_approved"`; there is
# no `review.state` field. Branch-protection requires the
# `(pull_request_target)` context variant, so the
# pull_request_review_approved path EXPLICITLY POSTS the required context
# via the API. Trust boundary preserved (BASE ref, no PR-head).

name: security-review

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
  pull_request_review_approved:

permissions:
  contents: read
  pull-requests: read
  statuses: write

jobs:
  # bp-exempt: PR security review bot signal; required merge state is enforced by CI / all-required.
  approved:
    # Gate the job:
    #   - On pull_request_target events: always run.
    #   - On pull_request_review_approved events: run so the gate flips
    #     immediately when a team member submits an APPROVE review.
    # Comment-triggered refires live in sop-checklist.yml review-refire job.
    if: |
      github.event_name == 'pull_request_target' ||
      github.event_name == 'pull_request_review_approved'
    runs-on: ubuntu-latest
    steps:
      - name: Privilege check (A1.1 — INFORMATIONAL log only, NOT a gate)
        # RFC#324 v1.3 §A1.1: does NOT gate subsequent steps. See
        # qa-review.yml for full rationale. Eval is read-only/idempotent
        # so re-running on a non-collaborator comment is harmless.
        if: github.event_name == 'issue_comment'
        env:
          GITEA_TOKEN: ${{ secrets.SOP_TIER_CHECK_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          login="${{ github.event.comment.user.login }}"
          # Write token to a mode-600 file so it never appears in curl's argv.
          # (#541: -H "Authorization: token $TOKEN" puts the secret in /proc/<pid>/cmdline)
          authfile=$(mktemp)
          chmod 600 "$authfile"
          printf 'header = "Authorization: token %s"\n' "$GITEA_TOKEN" > "$authfile"
          code=$(curl -sS -o /dev/null -w '%{http_code}' -K "$authfile" \
            "${{ github.server_url }}/api/v1/repos/${{ github.repository }}/collaborators/${login}")
          rm -f "$authfile"
          if [ "$code" = "204" ]; then
            echo "::notice::Recheck from ${login} (collaborator=true)"
          else
            echo "::notice::Recheck from ${login} (collaborator=false, HTTP ${code}) — proceeding with read-only eval anyway"
          fi

      - name: Check out BASE ref (A4 — never PR-head)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Evaluate security-review
        id: eval
        env:
          GITEA_TOKEN: ${{ secrets.SOP_TIER_CHECK_TOKEN || secrets.GITHUB_TOKEN }}
          GITEA_HOST: git.moleculesai.app
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          TEAM: security
          TEAM_ID: '21'
          REVIEW_CHECK_DEBUG: '0'
          REVIEW_CHECK_STRICT: '0'
        run: bash .gitea/scripts/review-check.sh

      - name: Post required status context on pull_request_review_approved
        # Gitea Actions auto-publishes (pull_request_review_approved) context
        # for this event, but branch-protection requires (pull_request_target).
        # We explicitly POST the BP-required context so the gate flips.
        # Trust boundary: same BASE-ref script result, no PR-head code.
        #
        # TOKEN FIX (RC 8326): uses STATUS_POST_TOKEN (CTO-granted,
        # msg d52cc72a). Dedicated narrow-scoped write:repository token
        # for the explicit status POST. Evaluator step stays on
        # SOP_TIER_CHECK_TOKEN (read-only) per deliberate security
        # separation: eval computes, POST writes, never the same cred.
        if: github.event_name == 'pull_request_review_approved' && always()
        env:
          GITEA_TOKEN: ${{ secrets.STATUS_POST_TOKEN }}
          GITEA_HOST: git.moleculesai.app
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
          EVAL_OUTCOME: ${{ steps.eval.outcome }}
        run: |
          set -euo pipefail
          authfile=$(mktemp)
          chmod 600 "$authfile"
          printf 'header = "Authorization: token %s"\n' "$GITEA_TOKEN" > "$authfile"

          prfile=$(mktemp)
          code=$(curl -sS -o "$prfile" -w '%{http_code}' -K "$authfile" \
            "https://${GITEA_HOST}/api/v1/repos/${REPO}/pulls/${PR_NUMBER}")
          if [ "$code" != "200" ]; then
            echo "::error::GET /pulls/${PR_NUMBER} returned HTTP ${code}"
            rm -f "$prfile" "$authfile"
            exit 1
          fi
          head_sha=$(jq -r '.head.sha // ""' "$prfile")
          rm -f "$prfile"

          if [ "$EVAL_OUTCOME" = "success" ]; then
            status_state="success"
            description="Approved via pull_request_review_approved trigger"
          else
            status_state="failure"
            description="Review check failed via pull_request_review_approved trigger"
          fi

          body=$(jq -nc \
            --arg state "$status_state" \
            --arg context "security-review / approved (pull_request_target)" \
            --arg description "$description" \
            '{state:$state, context:$context, description:$description}')

          post_code=$(curl -sS -o /dev/null -w '%{http_code}' -X POST \
            -K "$authfile" -H "Content-Type: application/json" \
            -d "$body" \
            "https://${GITEA_HOST}/api/v1/repos/${REPO}/statuses/${head_sha}")

          rm -f "$authfile"

          if [ "$post_code" != "200" ] && [ "$post_code" != "201" ]; then
            echo "::error::POST /statuses/${head_sha} returned HTTP ${post_code}"
            exit 1
          fi

          echo "::notice::posted ${status_state} for context=\"security-review / approved (pull_request_target)\" on sha=${head_sha}"
