# security-review — non-author APPROVE from the `security` Gitea team
# required to merge.
#
# RFC#324 Step 1 of 5 (workflow-add). Mirror of `qa-review.yml`; differs
# only in TEAM=security, TEAM_ID=21, and the slash-command name.
#
# See `qa-review.yml` header for the full A1-α / A1.1 / A4 / A5 design
# rationale; everything below is identical in shape.
#
# A1-α addendum (internal#760): review-event trigger added so the security
# gate flips immediately when a team member submits an APPROVE review.
# Uses `pull_request_review` types: [submitted] — verified live via
# sop-checklist.yml which provably fires this event (produces
# `sop-checklist / all-items-acked (pull_request_review)` contexts).
# The job-level `if:` does NOT guard on review.state (issue #2159):
# Gitea 1.22.6's payload shape for this event does not reliably expose
# the state field that the GitHub-style guard expects.  The evaluator
# (review-check.sh) reads actual reviews from the API and checks for a
# real APPROVE, so running on COMMENT or REQUEST_CHANGES is harmless
# (read-only, idempotent).  Branch-protection requires the
# `(pull_request_target)` context variant, so the review-event path
# EXPLICITLY POSTS the required context via the API. Trust boundary
# preserved (BASE ref, no PR-head).
#
# ── AGENT-RESOLVABLE addendum (doc only — no logic change) ───────────────
# This gate is cleared by a distinct security-lens reviewer AGENT, not a
# human and not the same identity that clears qa-review. The gate is
# TEAM-KEYED (TEAM=security, TEAM_ID=21): review-check.sh passes iff there
# is a genuine, non-author, current-head APPROVED review (per the
# fail-closed SSOT predicate in .gitea/scripts/_approval_validator.py) by a
# member of Gitea team `security` (id 21). The authorized security-lens
# identity is `core-security` (id 68) — already a member of team 21 and
# NOT of team 20 (qa), so its APPROVE is a SECOND, orthogonal lens rather
# than a duplicate of the qa approval. (`molecule-code-reviewer`, id 109,
# is in BOTH teams today, so one APPROVE from it clears qa+security — the
# rubber-stamp this binding removes; see the org-Owner bootstrap below.)
#
# This is producer/consumer separation: THIS workflow is the read-only
# EVALUATOR (BASE ref, no PR-head code) that maps a genuine review to the
# BP status. The PRODUCER (the security-lens agent that runs the review and
# POSTs a real APPROVED/REQUEST_CHANGES review under `core-security`) is the
# operator reviewer harness security-lane, or the fallback producer
# workflow. Persona, rubric, invocation, mapping, and the one-time
# org-Owner bootstrap (remove molecule-code-reviewer from team 21 for
# enforced qa/security diversity; point the harness at core-security) are
# the SSOT in `.gitea/security-reviewer.md`. No workflow / branch-protection
# / script edit is required for eligibility — proven end-to-end on PR #3369.

name: security-review

concurrency:
  # Auto-cancel a superseded run: a newer commit/event supersedes the old
  # one instead of leaving it queued forever (root fix for waiting-run pileup).
  # PR events group by PR number; push events group by ref.
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
on:
  # TURNED OFF (CTO directive, 2026-07-11/12): the qa/security "approved" gates
  # are meaningless ceremony (bot self-approval; branch protection already has
  # required_approvals=0). They were `disabled_manually` via the Actions API,
  # but Gitea STILL fires `pull_request_target` workflows in that state, so every
  # PR re-posted a failing `security-review / approved` status and wedged merge
  # under BP ['*'] — forcing a controlled relax on each PR. Dropping the PR
  # triggers (dispatch-only) is the durable off-switch: no context is posted,
  # nothing to wedge. Re-enable by restoring the two triggers below.
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  statuses: write

jobs:
  # bp-required: pending #3141 — CTO-authorized: this gate is becoming TRULY
  # merge-blocking. NB: `CI / all-required` does NOT enforce this context — it is
  # a plain `needs:` aggregator over CI's OWN jobs (ci.yml) and Gitea has no
  # cross-workflow `needs:`; the prior poll-the-status-API design was removed
  # (runner-squat RCA 2026-06-01). Enforcement requires the BP context
  # `security-review / approved (pull_request_target)` to be in
  # branch_protections/main.status_check_contexts (owner action, tracked in
  # #3141; allowlist landed in .gitea/required-contexts.txt this PR, BP flip
  # follows merge). `pending #NNN` per lint_required_context_exists_in_bp grammar.
  approved:
    # Gate the job:
    #   - On pull_request_target events: always run.
    #   - On pull_request_review events: always run.  We do NOT guard on
    #     review.state here because Gitea 1.22.6's payload shape for this
    #     event does not reliably expose the state field (issue #2159).
    #     The evaluator (review-check.sh) reads actual reviews from the
    #     API and checks for a real APPROVE, so running on COMMENT or
    #     REQUEST_CHANGES is harmless (read-only, idempotent).
    #   - On labeled/unlabeled events: re-evaluate when labels change.
    #     This ensures security-review flips when risk-indicator labels
    #     are added or removed.
    # Comment-triggered refires live in sop-checklist.yml review-refire job.
    if: |
      github.event_name == 'pull_request_target' ||
      github.event_name == 'pull_request_review'
    runs-on: ubuntu-latest
    steps:
      - name: Privilege check (A1.1 — INFORMATIONAL log only, NOT a gate)
        # RFC#324 v1.3 §A1.1: does NOT gate subsequent steps. See
        # qa-review.yml for full rationale. Eval is read-only/idempotent
        # so re-running on a non-collaborator comment is harmless.
        if: github.event_name == 'issue_comment'
        env:
          GITEA_TOKEN: ${{ secrets.SOP_CHECKLIST_GATE_TOKEN }}
        run: |
          set -euo pipefail
          login="${{ github.event.comment.user.login }}"
          # Write token to a mode-600 file so it never appears in curl's argv.
          # (#541: -H "Authorization: token $TOKEN" puts the secret in /proc/<pid>/cmdline)
          authfile=$(mktemp)
          chmod 600 "$authfile"
          printf 'header = "Authorization: token %s"\n' "$GITEA_TOKEN" > "$authfile"
          code=$(curl -sS -o /dev/null -w '%{http_code}' -K "$authfile" \
            "${{ github.server_url }}/api/v1/repos/${{ github.repository }}/collaborators/${login}")
          rm -f "$authfile"
          if [ "$code" = "204" ]; then
            echo "::notice::Recheck from ${login} (collaborator=true)"
          else
            echo "::notice::Recheck from ${login} (collaborator=false, HTTP ${code}) — proceeding with read-only eval anyway"
          fi

      - name: Check out BASE ref (A4 — never PR-head)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Evaluate security-review
        id: eval
        env:
          GITEA_TOKEN: ${{ secrets.SOP_CHECKLIST_GATE_TOKEN }}
          GITEA_HOST: git.moleculesai.app
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          TEAM: security
          TEAM_ID: '21'
          REVIEW_CHECK_DEBUG: '0'
          REVIEW_CHECK_STRICT: '0'
        run: bash .gitea/scripts/review-check.sh

      # Resolve the write-scoped CI_STATUS_TOKEN used by the explicit status
      # POST below. PRIMARY source is the direct `CI_STATUS_TOKEN` Gitea org
      # Actions secret (present on the local setup) — no external round-trip,
      # so the emission does NOT fail closed when the Infisical control-plane
      # is unreachable from the runner. FALLBACK is the Infisical SSOT (prod
      # /shared/ci-status) over its public Cloudflare hostname, fetched WITH a
      # CF-accepted User-Agent so CF-1010 cannot edge-ban the request. This
      # removes the hard dependency on key.moleculesai.app that previously
      # forced the compensating agent-mirror.
      #
      # Trust boundary: runs on pull_request_target / pull_request_review with a
      # BASE-ref checkout (trusted base context); the CI_STATUS_TOKEN /
      # INFISICAL_CI_* secrets are withheld from fork PRs at the runner level.
      - name: Resolve CI_STATUS_TOKEN (direct Gitea org secret, Infisical fallback)
        if: github.event_name == 'pull_request_review' && always()
        env:
          CI_STATUS_TOKEN_DIRECT: ${{ secrets.CI_STATUS_TOKEN }}
          INFISICAL_CI_CLIENT_ID: ${{ secrets.INFISICAL_CI_CLIENT_ID }}
          INFISICAL_CI_CLIENT_SECRET: ${{ secrets.INFISICAL_CI_CLIENT_SECRET }}
          INFISICAL_PROJECT_ID: ${{ secrets.INFISICAL_CI_PROJECT_ID }}
        run: |
          set -uo pipefail
          # SSOT resolution (unit-tested: .gitea/scripts/tests/test_ci_status.sh).
          # Direct Gitea org secret first (no external round-trip → does not fail
          # closed when Infisical is unreachable from the runner); Infisical prod
          # /shared/ci-status fallback over the public CF edge with a CF-accepted
          # UA. Masks + writes the token to $GITHUB_ENV for the emit step below.
          # REQUIRE=1 (default) fails this step closed if neither source resolves.
          . .gitea/scripts/lib/ci-status.sh
          resolve_ci_status_token

      - name: Post required status context on pull_request_review
        # Gitea Actions auto-publishes (pull_request_review) context
        # for this event, but branch-protection requires (pull_request_target).
        # We explicitly POST the BP-required context so the gate flips.
        # Trust boundary: same BASE-ref script result, no PR-head code.
        #
        # TOKEN FIX (RC 8326): the explicit status POST uses a dedicated
        # narrow-scoped write:repository token. It now arrives via $GITHUB_ENV
        # as CI_STATUS_TOKEN from the "Fetch CI_STATUS_TOKEN from Infisical SSOT"
        # step above (KMS consolidation of the old STATUS_POST_TOKEN secret).
        # Evaluator step stays on SOP_CHECKLIST_GATE_TOKEN (read-only) per
        # deliberate security separation: eval computes, POST writes, never
        # the same cred.
        if: github.event_name == 'pull_request_review' && always()
        env:
          CI_STATUS_TOKEN: ${{ env.CI_STATUS_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
          EVAL_OUTCOME: ${{ steps.eval.outcome }}
          STATUS_CONTEXT: "security-review / approved (pull_request_target)"
        run: |
          set -euo pipefail
          # SSOT emission (unit-tested: .gitea/scripts/tests/test_ci_status.sh):
          # internal-host-preferred base (CF-UA-guarded), GET PR head sha, map the
          # eval outcome → posted state, POST the BP-required STATUS_CONTEXT. Token
          # arrives via $GITHUB_ENV as the write-scoped CI_STATUS_TOKEN resolved
          # above; the eval step stays on the read-only SOP_CHECKLIST_GATE_TOKEN
          # (eval computes, POST writes — never the same cred).
          . .gitea/scripts/lib/ci-status.sh
          emit_review_status
