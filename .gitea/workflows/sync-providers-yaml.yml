name: sync-providers-yaml

# Historical workflow name retained for continuity. Molecule-core no longer
# carries a synced providers.yaml copy: the provider/model/runtime registry SSOT
# is now the SDK module (`go.moleculesai.app/sdk/gen/go/llmregistry`), and core
# derives its embedded registry from that package.
#
# This standalone gate verifies the SDK-registry adoption surface:
#   * no local workspace-server/internal/providers/providers.yaml has reappeared,
#   * the hermetic SDK registry sha pin still matches the module in go.mod, and
#   * the checked-in provider projection is regenerated from the SDK-backed
#     loader.

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'workspace-server/go.mod'
      - 'workspace-server/go.sum'
      - 'workspace-server/internal/providers/**'
      - 'workspace-server/cmd/gen-providers/**'
      - '.gitea/workflows/sync-providers-yaml.yml'
  push:
    branches: [main, staging]
    paths:
      - 'workspace-server/go.mod'
      - 'workspace-server/go.sum'
      - 'workspace-server/internal/providers/**'
      - 'workspace-server/cmd/gen-providers/**'
      - '.gitea/workflows/sync-providers-yaml.yml'
  workflow_dispatch:

env:
  GITHUB_SERVER_URL: https://git.moleculesai.app

permissions:
  contents: read

concurrency:
  group: sync-providers-yaml-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # bp-required: pending #718 - soak-then-promote, not in BP yet.
  compare:
    name: Verify SDK registry dependency
    runs-on: ubuntu-latest
    timeout-minutes: 6
    defaults:
      run:
        working-directory: workspace-server
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: 'stable'
          cache: false

      - name: Verify SDK registry adoption
        run: |
          set -euo pipefail
          if [ -e internal/providers/providers.yaml ]; then
            echo "::error::internal/providers/providers.yaml must not exist. Core derives the registry from go.moleculesai.app/sdk/gen/go/llmregistry."
            exit 1
          fi
          go test -count=1 ./internal/providers -run '^TestSyncedYAMLMatchesCanonicalSHA$'
          go run ./cmd/gen-providers -check
          echo "OK - core is using the SDK registry module and the projection is in sync."
