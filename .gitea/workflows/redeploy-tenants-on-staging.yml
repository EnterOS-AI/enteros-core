name: redeploy-tenants-on-staging

# MANUAL rollback / pin path for the local-docker STAGING tenant fleet.
#
# SUPERSEDED FOR THE AUTO PATH by staging-tenant-cd.yml (2026-07-04): the gated
# CD pipeline (await-image -> e2e-smoke HARD GATE -> advance-pin ->
# redeploy-fleet) now owns the automatic staging fleet roll on a staging push.
# Leaving this workflow ALSO auto-triggering on staging push would roll the fleet
# a SECOND time, UNGATED, racing the gated pipeline — so the `push:` trigger was
# removed. This file is retained as the operator's hand-run rollback / pin path
# (workflow_dispatch), e.g. to roll back to a known-good staging-<sha> after a
# bad auto-deploy, without waiting on the full gate.
#
# BOTH paths now call the SAME committed swap logic
# (scripts/deploy/redeploy-staging-fleet.sh) so the canary-first / health-gated /
# self-rolling-back / SESSION-PRESERVING algorithm lives in exactly one place.
# Session safety: the script rolls ONLY the STATELESS mol-tenant-* platform
# containers (cp-env=staging); the session-bearing mol-ws-* agent container + its
# mol-ws-rtstate-* volume are never touched (and the script asserts every rtstate
# volume is intact after the roll).
#
# Rollback / pin: set the repo/org var STAGING_REDEPLOY_TARGET_TAG to a
# known-good tag (e.g. staging-<sha>) and run via workflow_dispatch, OR pass the
# `image_tag` dispatch input; unset the var afterward.

on:
  # workflow_dispatch ONLY — the auto path moved to staging-tenant-cd.yml.
  # No inputs map under the repository's flat-dispatch policy. The roll target
  # is read from the repo/org var
  # STAGING_REDEPLOY_TARGET_TAG (else defaults to staging-latest).
  workflow_dispatch: {}

permissions:
  contents: read

# Serialize with the gated CD pipeline's fleet roll: share ITS concurrency group
# so a manual rollback and an auto CD roll never overlap on the same fleet.
concurrency:
  group: staging-tenant-cd
  cancel-in-progress: false

env:
  TENANT_IMAGE: ${{ vars.MOLECULE_TENANT_IMAGE || 'registry.moleculesai.app/molecule-ai/molecule-tenant' }}
  CANVAS_APP_IMAGE: ${{ vars.MOLECULE_CANVAS_APP_IMAGE || 'registry.moleculesai.app/molecule-ai/canvas' }}

jobs:
  redeploy:
    # docker-host: a self-hosted molecules-server runner whose
    # /var/run/docker.sock is the HOST daemon (so `docker ps` sees the
    # mol-tenant-* tenant containers + molecule-staging-app).
    runs-on: docker-host
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Redeploy local-docker staging tenant fleet + shared canvas app
        env:
          TENANT_IMAGE: ${{ env.TENANT_IMAGE }}
          CANVAS_APP_IMAGE: ${{ env.CANVAS_APP_IMAGE }}
          # Same SSOT as staging-tenant-cd.yml. A manual redeploy that omitted this
          # would strip the managed flags off the fleet — turning an in-flight
          # burn-in off, silently, from a button that says "redeploy".
          STAGING_TENANT_FLAGS: ${{ vars.STAGING_TENANT_FLAGS }}
          # Pre-existing injection sink, fixed here because it is the same shape as
          # the one review caught above and sits three lines away: a ${{ }} expansion
          # inside a run: body is spliced in as SHELL CODE, on a privileged
          # docker-host runner. Passed as an env VALUE instead.
          STAGING_REDEPLOY_TARGET_TAG: ${{ vars.STAGING_REDEPLOY_TARGET_TAG }}
        run: |
          set -euo pipefail
          # Precedence: operator pin var > moving staging-latest.
          TAG="${STAGING_REDEPLOY_TARGET_TAG-}"
          [ -n "$TAG" ] || TAG="staging-latest"
          echo "::notice::manual staging fleet redeploy target tag = ${TAG}"
          TENANT_FLAGS="${STAGING_TENANT_FLAGS-}" \
            bash scripts/deploy/redeploy-staging-fleet.sh --tag "$TAG"
