name: contract-ssot-sync

# Retired compatibility workflow.
#
# Core no longer vendors the plugin-manifest schema mirror. The install-time
# manifest validator consumes the generated SDK asset from
# go.moleculesai.app/sdk/gen/go/molcontracts. Keep this workflow path and context
# present during the cleanup so protected-path deletion guards see an explicit
# retirement instead of a silent CI surface removal.

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'workspace-server/internal/plugins/manifest_ssot.go'
      - '.gitea/scripts/check-plugin-manifest-ssot-sync.sh'
      - '.gitea/workflows/contract-ssot-sync.yml'
  push:
    branches: [main]
    paths:
      - 'workspace-server/internal/plugins/manifest_ssot.go'
      - '.gitea/scripts/check-plugin-manifest-ssot-sync.sh'
      - '.gitea/workflows/contract-ssot-sync.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: contract-ssot-sync-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # bp-exempt: retired compatibility context; plugin-manifest mirror moved to SDK generated assets.
  ssot-sync:
    name: Verify vendored plugin-manifest schema matches the molecule-ai-sdk SSOT
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Retired
        run: echo "plugin-manifest mirror sync is retired; core consumes SDK molcontracts assets."
