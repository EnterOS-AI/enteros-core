name: contract-ssot-sync

# SSOT sync gate for the vendored plugin-manifest contract.
#
# PLUGIN-MANIFEST (core#3383): this workflow runs
# check-plugin-manifest-ssot-sync.sh, which keeps the VENDORED plugin-manifest
# schema (workspace-server/internal/plugins/contracts/plugin-manifest.schema.json,
# go:embed'ed by internal/plugins/manifest_ssot.go for advisory install-time
# manifest validation) honest against its LIVE SSOT in molecule-ai-sdk
# (contracts/plugin-manifest/ -- molecule-contracts is archived; the sdk repo
# is where this contract lives). Same trust model (public, unauthenticated,
# fail-closed on fetch error / drift), byte-identical invariant.
#
# MCP-PLUGIN DELIVERY: core no longer vendors the old root-level JSON mirror.
# Runtime code imports the generated go.moleculesai.app/sdk/gen/go/molcontracts
# binding, and cross-repo drift checks compare template/runtime participants
# directly against the SDK SSOT.
#
# WORKSPACE-COMMS: core no longer vendors the old workspace-comms schema mirror.
# workspace_comms_ssot_test.go compares workspace.go's wire structs directly
# against generated SDK bindings in go.moleculesai.app/sdk/gen/go/molcontracts.

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'workspace-server/internal/plugins/contracts/plugin-manifest.schema.json'
      - 'workspace-server/internal/plugins/manifest_ssot.go'
      - '.gitea/scripts/check-plugin-manifest-ssot-sync.sh'
      - '.gitea/workflows/contract-ssot-sync.yml'
  push:
    branches: [main]
    paths:
      - 'workspace-server/internal/plugins/contracts/plugin-manifest.schema.json'
      - 'workspace-server/internal/plugins/manifest_ssot.go'
      - '.gitea/scripts/check-plugin-manifest-ssot-sync.sh'
      - '.gitea/workflows/contract-ssot-sync.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: contract-ssot-sync-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ssot-sync:
    name: Verify vendored plugin-manifest schema matches the molecule-ai-sdk SSOT
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # plugin-manifest (core#3383): keep the VENDORED schema that
      # manifest_ssot.go go:embed's (advisory install-time manifest validation)
      # in lockstep with the LIVE molecule-ai-sdk SSOT. Same trust model
      # (public, unauthenticated, fail-closed on fetch error / drift).
      - name: Verify vendored plugin-manifest schema == molecule-ai-sdk SSOT
        run: bash .gitea/scripts/check-plugin-manifest-ssot-sync.sh
