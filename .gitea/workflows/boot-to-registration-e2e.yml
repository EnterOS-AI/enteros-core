# RE-ENABLED (group A — molecules-server cutover): the AWS account is closed, so this
# minimal cell now provisions on the molecules-server (local-docker) compute backend via
# E2E_PROVIDER=molecules-server (canonical wire id; CP persists it as organizations.provider
# 'local'). push/pull_request on main+staging are restored so it GATES again. Advisory-RED is
# expected until the local-docker gate + CP health + browser-registration fixes land — then
# promote its context into .gitea/required-contexts.txt.
name: boot-to-registration-e2e

# cp#455 — Minimal-cell boot-to-registration e2e.
# CTO directive 14eb4f07: "build the minimal claude-code+kimi cell,
# it should now go GREEN since the fix is live."
#
# Minimal molecules-server cell reduced to the boot-to-registration surface:
#
#   1. Provision request accepted; workspace transitions to booting/running
#   2. Controlplane receives /registry/register for that workspace_id
#   3. JSON-RPC/completion route returns successful minimal response
#   4. Teardown terminates workspace even on failure (trap)
#
# Advisory (non-blocking) per Researcher Stage 2 design — RED on
# current main is expected pre-cp#469-cluster. After cp#477 deploy
# (888efceb) + PR #2167 merge, cell should turn GREEN. THAT green
# is the cluster-proof signal.
#
# Isolation controls:
#   - A run-scoped local-docker org/workspace identity
#   - Bounded teardown even on assertion failure
#   - Structured per-cell results JSON (runtime/provider/model/
#     billing_mode/workspace_id/register_status/completion_status/
#     teardown_status/elapsed_seconds)
#
# Inputs:
#   runtime        : default claude-code
#   billing_mode   : default platform_managed (the cp#469-cluster path)
#   provider       : molecules-server (local-docker compute backend; was 'platform')
#   model          : default moonshot/kimi-k2.6 (CTO-specified)
#
# PR target: molecule-core (this file). Companion harness extension
# (test_minimal_boot_cell.sh) lives in tests/e2e/ alongside
# test_staging_full_saas.sh — same repo, same branch.
#
# Note: cp#455 was originally spec'd to live in molecule-controlplane
# (`.gitea/workflows/` path), but molecule-core's CI is the home for
# tenant-boot e2e tests in this stage. Stage 2 may move the path.

on:
  # RE-ENABLED (group A): molecules-server (local-docker) replaces the closed AWS EC2 path,
  # so the minimal cell provisions at ~zero cloud spend and can gate again. Path-scoped to the
  # harness + this workflow so unrelated PRs don't spin a real tenant (mirrors the sibling e2e
  # lanes). schedule/workflow_run stay OFF (no-nightly-e2e rule).
  push:
    branches: [main, staging]
    paths:
      - 'tests/e2e/test_minimal_boot_cell.sh'
      - 'tests/e2e/lib/collision-proof-slug.sh'
      - '.gitea/workflows/boot-to-registration-e2e.yml'
  pull_request:
    branches: [main, staging]
    paths:
      - 'tests/e2e/test_minimal_boot_cell.sh'
      - 'tests/e2e/lib/collision-proof-slug.sh'
      - '.gitea/workflows/boot-to-registration-e2e.yml'
  workflow_dispatch:
  # Repository policy keeps dispatch flat. Defaults are hardcoded in the job
  # env below; parameterization needs a deliberate caller/fixture migration.

# No cron schedule. Runs on push/pull_request (main+staging) + manual dispatch.
# Branch protection doesn't require this yet (not in .gitea/required-contexts.txt) —
# advisory-RED is expected until the molecules-server local-docker path is green; GREEN
# then signals the local-docker minimal cell boots + registers.
permissions:
  contents: read
  # No issue-write; failures surface as red runs in workflow history.

# Per-SHA grouping (mirrors e2e-api.yml). Each run provisions its OWN isolated
# cell (slug `cp455-<run_id>`), so two commits' runs never corrupt each other.
# A STATIC group would make a newer main push cancel the older commit's run. A
# legacy runner incident showed a superseded same-group run could be CANCELLED
# (not queued) even with cancel-in-progress:false, stamping a cancel-red
# that wedges the `[*]` queue. cancel-in-progress:false so a teardown is never
# aborted mid-flight.
concurrency:
  group: boot-to-registration-e2e-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: false

jobs:
  # bp-exempt: runs on push/PR (main+staging) so it GATES, but is NOT yet in
  # .gitea/required-contexts.txt — advisory-red until the molecules-server local-docker
  # path + CP health + browser-registration fixes land, then promote it into the required
  # SSOT (cp#455 Stage 1).
  minimal-cell:
    name: Minimal cell (claude-code + molecules-server + SSOT default model)
    runs-on: ubuntu-latest
    # Bounded at 12 min for local-docker provision, registration, completion,
    # teardown, and runner headroom.
    timeout-minutes: 12
    env:
      # Hardcoded defaults under the repository's flat-dispatch policy.
      #
      # E2E_RUNTIME / E2E_MODEL: these literals are now only the FALLBACK. On a
      # trusted event the "Fetch platform defaults from KMS SSOT" step below
      # overrides them with the authoritative Infisical values
      # (MOLECULE_DEFAULT_RUNTIME / MOLECULE_LLM_DEFAULT_MODEL). The fallback model
      # is the CURRENT SSOT value (minimax/MiniMax-M2.7), NOT a moonshot vendor
      # const — so an untrusted-ref/local run still tracks the SSOT default.
      E2E_RUNTIME: claude-code
      E2E_BILLING_MODE: platform_managed
      # Compute backend: molecules-server (local-docker). This is the canonical cloudprovider
      # SSOT wire id the CP org-create validates via IsValidRequest and persists as the DB-legal
      # organizations.provider 'local' (PersistKey). Was 'platform' (never a valid compute
      # provider — the closed AWS DefaultProvider path). Orthogonal to E2E_BILLING_MODE, which
      # stays platform_managed (the LLM proxy/metering arm).
      E2E_PROVIDER: molecules-server
      E2E_MODEL: minimax/MiniMax-M2.7
      E2E_RUN_ID: cp455-${{ github.run_id }}
      E2E_PROVISION_TIMEOUT_SECS: '300' # 5 min — fast teardown budget
      MOLECULE_CP_URL: ${{ vars.STAGING_CP_URL || 'https://staging-api.moleculesai.app' }}
      # MOLECULE_ADMIN_TOKEN now arrives via $GITHUB_ENV from the "Fetch platform
      # defaults (model+runtime) from KMS SSOT" step below (wave-B staging
      # consumers migration extends that same fetch). It is sourced from Infisical
      # CP_ADMIN_API_TOKEN at staging /shared/controlplane-admin. The old
      # CP_STAGING_ADMIN_API_TOKEN Gitea Actions secret is left in place until a
      # green run validates this path (validate-before-delete). The Verify-
      # required-secrets gate still validates MOLECULE_ADMIN_TOKEN is non-empty.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # KMS SSOT for the platform default model+runtime (de-hardcode) AND the
      # staging CP admin bearer (wave-B staging consumers migration): the env
      # block above embeds "moonshot/kimi-k2.6" / "claude-code" as fallback
      # literals. Read the authoritative values from Infisical (staging
      # /shared/controlplane/llm: MOLECULE_LLM_DEFAULT_MODEL /
      # MOLECULE_DEFAULT_RUNTIME) and export them as E2E_MODEL / E2E_RUNTIME so
      # this gate tracks the platform default. This same step also sources
      # MOLECULE_ADMIN_TOKEN from CP_ADMIN_API_TOKEN @ staging
      # /shared/controlplane-admin, replacing the duplicated
      # CP_STAGING_ADMIN_API_TOKEN Gitea Actions secret. BEHAVIOR-NEUTRAL today
      # (the staging KMS values equal the old literals); a later staging-model
      # flip is a separate, deliberate KMS edit. FAIL CLOSED on empty.
      #
      # TRUSTED-REF GATING: molecule-core is a PUBLIC repo. This step consumes
      # the CI machine-identity secrets, so it must only run on a TRUSTED event —
      # operator workflow_dispatch, a push to a protected branch (main/staging), or a
      # SAME-REPO (non-fork) pull_request. It MUST NOT run on an untrusted-fork PR
      # (which could exfiltrate the KMS token) — a fork PR skips this step, leaving
      # MOLECULE_ADMIN_TOKEN empty so the "Verify required secrets present" gate below
      # fails closed (the real provision e2e cannot run from a fork).
      - name: Fetch platform defaults (model+runtime) from KMS SSOT
        id: defaults
        if: >-
          github.event_name == 'workflow_dispatch' ||
          (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging')) ||
          (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false)
        env:
          INFISICAL_CI_CLIENT_ID: ${{ secrets.INFISICAL_CI_CLIENT_ID }}
          INFISICAL_CI_CLIENT_SECRET: ${{ secrets.INFISICAL_CI_CLIENT_SECRET }}
          INFISICAL_PROJECT_ID: ${{ secrets.INFISICAL_CI_PROJECT_ID }}
        run: |
          set -uo pipefail
          BASE="https://key.moleculesai.app"
          TOK=$(curl -fsS -X POST "$BASE/api/v1/auth/universal-auth/login" \
            -H 'Content-Type: application/json' \
            -d "{\"clientId\":\"$INFISICAL_CI_CLIENT_ID\",\"clientSecret\":\"$INFISICAL_CI_CLIENT_SECRET\"}" \
            | python3 -c 'import sys,json; v=json.load(sys.stdin).get("accessToken"); sys.stdout.write(v if isinstance(v,str) else "")')
          if [ -z "$TOK" ]; then echo "::error::Infisical accessToken empty - failing closed"; exit 1; fi
          read_secret() {
            curl -fsS "$BASE/api/v3/secrets/raw/$1?workspaceId=$INFISICAL_PROJECT_ID&environment=staging&secretPath=$2" \
              -H "Authorization: Bearer $TOK" \
              | python3 -c 'import sys,json; v=json.load(sys.stdin).get("secret",{}).get("secretValue"); sys.stdout.write(v if isinstance(v,str) else "")'
          }
          E2E_MODEL=$(read_secret MOLECULE_LLM_DEFAULT_MODEL %2Fshared%2Fcontrolplane%2Fllm)
          E2E_RUNTIME=$(read_secret MOLECULE_DEFAULT_RUNTIME %2Fshared%2Fcontrolplane%2Fllm)
          if [ -z "$E2E_MODEL" ]; then
            echo "::error::Infisical returned empty for MOLECULE_LLM_DEFAULT_MODEL at staging /shared/controlplane/llm - a required boot gate must not run with an empty platform default model."
            exit 1
          fi
          if [ -z "$E2E_RUNTIME" ]; then
            echo "::error::Infisical returned empty for MOLECULE_DEFAULT_RUNTIME at staging /shared/controlplane/llm - a required boot gate must not run with an empty platform default runtime."
            exit 1
          fi
          # Wave-B: staging CP admin bearer (CP_ADMIN_API_TOKEN @ staging
          # /shared/controlplane-admin) -> MOLECULE_ADMIN_TOKEN, replacing the
          # duplicated CP_STAGING_ADMIN_API_TOKEN Gitea Actions secret.
          MOLECULE_ADMIN_TOKEN=$(read_secret CP_ADMIN_API_TOKEN %2Fshared%2Fcontrolplane-admin)
          echo "::add-mask::$MOLECULE_ADMIN_TOKEN"
          if [ -z "$MOLECULE_ADMIN_TOKEN" ]; then
            echo "::error::Infisical returned empty CP_ADMIN_API_TOKEN at staging /shared/controlplane-admin — failing closed."
            exit 1
          fi
          # model + runtime ids are not secrets, but mask defensively before export.
          echo "::add-mask::$E2E_MODEL"
          echo "::add-mask::$E2E_RUNTIME"
          {
            echo "E2E_MODEL=$E2E_MODEL"
            echo "E2E_RUNTIME=$E2E_RUNTIME"
            echo "MOLECULE_ADMIN_TOKEN=$MOLECULE_ADMIN_TOKEN"
          } >> "$GITHUB_ENV"
          echo "platform defaults + admin token loaded from Infisical (model len=${#E2E_MODEL}, runtime len=${#E2E_RUNTIME}, admin len=${#MOLECULE_ADMIN_TOKEN})"

      - name: Verify required secrets present
        run: |
          if [ -z "${MOLECULE_ADMIN_TOKEN:-}" ]; then
            echo "::error::CP_STAGING_ADMIN_API_TOKEN secret missing — minimal-cell e2e cannot run"
            echo "::error::Provision CP_ADMIN_API_TOKEN from Infisical staging /shared/controlplane-admin through the CI identity."
            exit 1
          fi

      - name: Install required tools
        run: |
          for cmd in jq curl python3; do
            command -v "$cmd" >/dev/null 2>&1 || {
              echo "::error::required tool '$cmd' not on PATH — runner image regression?"
              exit 1
            }
          done

      - name: Run minimal-cell boot-to-registration harness
        # The harness script handles its own teardown via EXIT trap;
        # even on assertion failure (provision timeout, register
        # timeout, completion failure), the workspace is deprovisioned
        # and a leak is reported. Exit code propagates from the script.
        # Structured per-cell results are emitted to ${GITHUB_STEP_SUMMARY}
        # so operators see pass/fail per assertion without scrolling.
        run: |
          bash tests/e2e/test_minimal_boot_cell.sh

      - name: Emit structured per-cell results
        if: always()
        # Always run (even on failure) so the structured results are
        # visible in the workflow summary. The script writes a JSON
        # file at /tmp/cell-result.json; this step renders it as a
        # job summary.
        run: |
          if [ -f /tmp/cell-result.json ]; then
            echo "## Minimal-cell results" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```json' >> "$GITHUB_STEP_SUMMARY"
            cat /tmp/cell-result.json >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## Minimal-cell results: NO_RESULT_FILE" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Harness did not produce /tmp/cell-result.json — likely crashed before trap fired." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Failure summary
        if: failure()
        run: |
          {
            echo "## cp#455 minimal-cell FAILED"
            echo ""
            echo "**Run ID:** ${{ github.run_id }}"
            echo "**Runtime:** ${E2E_RUNTIME}"
            echo "**Billing mode:** ${E2E_BILLING_MODE}"
            echo "**Provider:** ${E2E_PROVIDER}"
            echo "**Model:** ${E2E_MODEL}"
            echo "**Slug:** ${E2E_RUN_ID}"
            echo ""
            echo "### What this means"
            echo ""
            echo "The minimal claude-code+kimi cell did not pass all 4 assertions:"
            echo "1. Provision request accepted; workspace transitions to booting/running"
            echo "2. Controlplane receives /registry/register for that workspace_id"
            echo "3. JSON-RPC/completion route returns successful minimal response"
            echo "4. Teardown terminates workspace even on failure (trap)"
            echo ""
            echo "RED is expected pre-cp#469-cluster. After cp#477 deploy (888efceb) + PR #2167 merge,"
            echo "this should turn GREEN. Persistent RED after both merge = cluster bug, not e2e bug."
            echo ""
            echo "### Next steps"
            echo ""
            echo "1. Check the harness output above for the assertion that failed"
            echo "2. If assertion 1 fails: provision path broken — check CP admin API + molecules-server capacity"
            echo "3. If assertion 2 fails: /registry/register path broken — check workspace-server boot"
            echo "4. If assertion 3 fails: LLM proxy / completion path broken — check cp#469 cluster"
            echo "5. If assertion 4 fails: teardown trap broken — leak risk, fix immediately"
          } >> "$GITHUB_STEP_SUMMARY"
