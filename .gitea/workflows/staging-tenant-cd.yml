name: staging-tenant-cd

# Gated CONTINUOUS DEPLOY of the local-docker STAGING tenant fleet.
#
# The deploy half of the tenant auto-update loop, mirroring the control-plane's
# own gated pipeline (molecule-controlplane/.gitea/workflows/
# local-cp-deploy-pipeline.yml), which likewise triggers on push to `main`. The
# operator model is TRUNK-BASED: every `main` merge is the staging candidate, so
# a push to `main` that changes the tenant image sources flows through a
# STRUCTURALLY-GATED, explicit local-Docker provider-boundary job chain:
#
#   await-image -> advance-pin -> redeploy-fleet -------------> e2e-smoke
#                              \-> runtime-image-readiness ----/     ^
#                                      ^                            HARD GATE (real staging A2A-serve e2e)
#                                      exact promoted runtime digests ready on provisioner daemon
#
# THE LOOP (build half + deploy half)
#   publish-workspace-server-image.yml  (BUILD)  — already triggers on push:[main]
#     (and legacy [staging]); on the same `main` push it builds the tenant image
#     and pushes :staging-<sha> + :staging-latest to registry.moleculesai.app via
#     the chunked pusher (:staging-<sha> is computed from the head SHA regardless
#     of branch, so THIS workflow — firing on the same `main` SHA — awaits the
#     exact per-commit artifact the build produced).
#   staging-tenant-cd.yml               (THIS)    — awaits that :staging-<sha>
#     artifact, advances the staging tenant-image DB pin through the control
#     plane, rolls the running staging tenant fleet onto it (session-preserving,
#     canary-first, /buildinfo health-gated), and gates the deployed staging
#     surface with a real staging e2e.
# The two coordinate through the immutable per-commit :staging-<sha> tag, so the
# deploy never rolls onto a half-built image and never races the build.
#
# WHY STRUCTURALLY GATED (un-bypassable)
#   e2e-smoke `needs:` BOTH redeploy-fleet and runtime-image-readiness; each
#   needs advance-pin, which needs await-image. The readiness sibling targets
#   exactly the `local-deploy` daemon selected by runner configuration and only
#   prepares its image cache from CP-owned read projections. It does NOT
#   deploy/reload the control-plane host; that provider-specific infrastructure
#   work remains outside tenant-image CI. If anything after advance-pin fails or
#   is skipped, rollback-pin restores the old pin and rerolls the staging tenant
#   fleet back to that old image. There is no continue-on-error on any gating job.
#
# SESSION PRESERVATION
#   redeploy-fleet delegates to scripts/deploy/redeploy-staging-fleet.sh, which
#   rolls ONLY the STATELESS mol-tenant-* platform containers (cp-env=staging);
#   the session-bearing mol-ws-* agent container + its mol-ws-rtstate-* volume
#   are never touched, so the concierge session survives BY CONSTRUCTION (the
#   script also asserts every rtstate volume is intact after the roll). The
#   CP-driven restart path is separately session-safe via controlplane #1118.
#
# STAGING ONLY. Production is untouched: redeploy-tenants-on-main.yml (:latest,
# PROD_AUTO_DEPLOY_DISABLED-gated) owns the prod fleet, and this pipeline never
# writes the prod pin nor the :latest tag.
#
# The image/pin/tenant-roll jobs use docker-host. Runtime readiness uses the
# dedicated local-deploy runner because that runner's mTLS Docker endpoint is
# the daemon the local-Docker workspace provisioner mutates; the script consumes
# only deployed CP HTTPS projections, never CP source. e2e-smoke runs on a Go
# runner and hits staging over HTTPS exactly like the existing
# e2e-workspace-lifecycle.yml staging job it reuses.

on:
  # TRUNK-BASED: fire on push to `main` (NOT the abandoned `staging` branch,
  # which is ~2809 commits behind main, diverged 2026-05-18, and does not even
  # contain this workflow — so a `push:[staging]` trigger could never fire). This
  # matches the control-plane deploy (local-cp-deploy-pipeline.yml, push:[main])
  # and the build half (publish-workspace-server-image.yml, push:[main,staging]),
  # so every main merge that touches the tenant runs the full staging CD.
  push:
    branches: [main]
    paths:
      - 'workspace-server/**'
      - 'canvas/**'
      - 'manifest.json'
      - '.gitea/workflows/staging-tenant-cd.yml'
      - 'scripts/deploy/redeploy-staging-fleet.sh'
      - 'scripts/deploy/advance-staging-tenant-pin.sh'
      - 'scripts/deploy/prepare-staging-runtime-images.sh'
      - 'scripts/deploy/require-local-deploy-daemon.sh'
  # Repository policy keeps dispatch flat (enforced by lint-workflow-yaml).
  # Operator overrides are read from repo/org
  # VARS instead: STAGING_TENANT_CD_IMAGE_TAG (roll to a specific tag) and
  # STAGING_TENANT_CD_FORCE_GATE_FAIL=1 (force the e2e gate RED to prove the roll
  # is blocked). Set the var, dispatch, then unset it.
  workflow_dispatch: {}

# Serialize the WHOLE pipeline GLOBALLY (one static group, NOT keyed on ref) so a
# workflow_dispatch and a main push never overlap two fleet rolls / two pin
# writes. cancel-in-progress:false — never abort an in-flight roll (each swap is
# health-gated + self-rolls-back, so a completed predecessor is always good).
concurrency:
  group: staging-tenant-cd
  cancel-in-progress: false

permissions:
  contents: read

env:
  TENANT_IMAGE: ${{ vars.MOLECULE_TENANT_IMAGE || 'registry.moleculesai.app/molecule-ai/molecule-tenant' }}

jobs:
  await-image:
    name: await-image (staging-<sha> published)
    runs-on: docker-host
    timeout-minutes: 45
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      image: ${{ steps.resolve.outputs.image }}
    steps:
      - name: Resolve target tag
        id: resolve
        env:
          # Pre-existing shell-injection sink, fixed while hardening this file. A
          # ${{ }} expansion inside a run: body is spliced in as SHELL CODE, and these
          # jobs run on `docker-host` — privileged, with the docker socket. Passed as
          # an env VALUE and read as a shell variable instead. Pinned by
          # test_the_repo_var_is_never_interpolated_into_shell_code.
          STAGING_TENANT_CD_IMAGE_TAG: ${{ vars.STAGING_TENANT_CD_IMAGE_TAG }}
        run: |
          set -euo pipefail
          if [ -n "${STAGING_TENANT_CD_IMAGE_TAG-}" ]; then
            TAG="${STAGING_TENANT_CD_IMAGE_TAG}"
          else
            TAG="staging-${GITHUB_SHA::7}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "image=${TENANT_IMAGE}:${TAG}" >> "$GITHUB_OUTPUT"
          echo "::notice::tenant CD target = ${TENANT_IMAGE}:${TAG}"
      - name: Wait for the published tenant image to be pullable
        env:
          IMAGE: ${{ steps.resolve.outputs.image }}
        run: |
          set -euo pipefail
          # publish-workspace-server-image.yml is building + pushing this exact
          # :staging-<sha> on the same push; poll the registry until the immutable
          # artifact the fleet will pull is present (uncapped pull through CF).
          # Dynamic wait on the real signal (the image), not a fixed sleep.
          deadline=$(( $(date +%s) + 40*60 ))
          until docker pull "$IMAGE" >/dev/null 2>&1; do
            if [ "$(date +%s)" -ge "$deadline" ]; then
              echo "::error::tenant image $IMAGE never became pullable within 40m (publish build failed or slow?)"
              exit 1
            fi
            echo "  $IMAGE not yet in registry — publish still building; re-poll in 20s"
            sleep 20
          done
          docker image inspect "$IMAGE" --format 'present {{.Id}}' >/dev/null
          echo "::notice::tenant image present + pullable: $IMAGE"

  # bp-exempt: post-merge staging CD job; gated by this workflow's needs/rollback chain, not PR branch protection.
  advance-pin:
    name: advance-pin (staging tenant image DB pin)
    needs: [await-image]
    runs-on: docker-host
    timeout-minutes: 10
    outputs:
      old_image: ${{ steps.advance.outputs.old_image }}
      old_git_sha: ${{ steps.advance.outputs.old_git_sha }}
      new_image: ${{ steps.advance.outputs.new_image }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Promote the staging tenant-image pin in controlplane
        id: advance
        env:
          INFISICAL_CLIENT_ID: ${{ secrets.INFISICAL_CI_CLIENT_ID }}
          INFISICAL_CLIENT_SECRET: ${{ secrets.INFISICAL_CI_CLIENT_SECRET }}
          INFISICAL_PROJECT_ID: ${{ secrets.INFISICAL_CI_PROJECT_ID }}
          TENANT_IMAGE_NAME: ${{ env.TENANT_IMAGE }}
        run: bash scripts/deploy/advance-staging-tenant-pin.sh --tag "${{ needs.await-image.outputs.tag }}"

  redeploy-fleet:
    name: redeploy-fleet (roll staging tenants, session-preserving)
    needs: [advance-pin, await-image]
    runs-on: docker-host
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Roll the staging tenant fleet onto the gate-proven image
        env:
          TENANT_IMAGE: ${{ env.TENANT_IMAGE }}
          # STAGING_TENANT_FLAGS is the SSOT for the managed rollout flags (see
          # MANAGED_FLAG_KEYS in redeploy-staging-fleet.sh). The script strips every
          # managed key from the inherited tenant env and re-applies only what
          # TENANT_FLAGS names, so a call site that omits it silently turns those
          # flags OFF across the fleet. Empty is the correct default (flags dark);
          # an operator turns a flag on by setting this repo var, NOT by hand-setting
          # env on a container — that would be sticky forever, which is the drift
          # this whole mechanism replaces.
          #
          # Interpolated into `env:` (a VALUE), never into the `run:` body: a
          # ${{ }} expansion inside run: is spliced in as SHELL CODE, so a var value
          # of `x"; touch /tmp/PWNED; echo "` would execute on this runner — and this
          # job is `runs-on: docker-host`, i.e. privileged with the docker socket.
          STAGING_TENANT_FLAGS: ${{ vars.STAGING_TENANT_FLAGS }}
        # `${STAGING_TENANT_FLAGS-}` — the shell, not the templater, supplies the
        # default. An undefined repo var may arrive as an OMITTED env entry rather
        # than an empty one, and the script now FAILS CLOSED on an unset
        # TENANT_FLAGS; without this `-` default, a repo that has never created the
        # var would have every staging CD roll hard-abort. The call site declares
        # its flag state explicitly, which is exactly what the fail-closed check asks
        # for.
        run: |
          TENANT_FLAGS="${STAGING_TENANT_FLAGS-}" \
            bash scripts/deploy/redeploy-staging-fleet.sh --tag "${{ needs.await-image.outputs.tag }}"

  # bp-exempt: post-merge staging CD hard gate; enforced by e2e needs + rollback, not PR branch protection.
  runtime-image-readiness:
    name: runtime-image-readiness (exact promoted digests on provisioner daemon)
    needs: [advance-pin]
    # This is the runner whose operator-configured mTLS endpoint reaches the
    # daemon used by the staging local-Docker provisioner. The checked-in guard
    # proves endpoint equality + mTLS + the staging CP's molecule-net
    # attachment before any pull.
    runs-on: local-deploy
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Verify the exact local-deploy Docker daemon
        run: bash scripts/deploy/require-local-deploy-daemon.sh
      - name: Pre-pull and RepoDigest-verify every promoted pinnable runtime
        env:
          CP_BASE_URL: https://staging-api.moleculesai.app
          INFISICAL_CLIENT_ID: ${{ secrets.INFISICAL_CI_CLIENT_ID }}
          INFISICAL_CLIENT_SECRET: ${{ secrets.INFISICAL_CI_CLIENT_SECRET }}
          INFISICAL_PROJECT_ID: ${{ secrets.INFISICAL_CI_PROJECT_ID }}
        run: bash scripts/deploy/prepare-staging-runtime-images.sh

  e2e-smoke:
    name: e2e-smoke (staging real provision + A2A HARD GATE)
    needs: [redeploy-fleet, runtime-image-readiness]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      CP_BASE_URL: https://staging-api.moleculesai.app
      E2E_PROVIDER: molecules-server
      STAGING_E2E: '1'
      # Consumed only by the `if: always()` teardown safety net below (the purge
      # helper tests/e2e/lib/cp_purge_receipt.sh origin/backend guards). The Go
      # test itself reads E2E_PROVIDER, not this.
      E2E_INFRA_BACKEND: local-docker
      GATE_FORCE_FAIL: ${{ vars.STAGING_TENANT_CD_FORCE_GATE_FAIL }}
      # E2E_DEFAULT_RUNTIME is exported by the Infisical step below from the same
      # optional /shared/controlplane selector the deployed CP consumes. When the
      # selector is absent, both CP and this gate use the Hermes product fallback.
      # Require the REAL A2A tool-use turn (drive the concierge to actually RUN
      # provision_workspace and assert the created workspace appears) — not
      # presence-only. This is the deep "callable" proof that catches a
      # present-but-not-runnable verb (the flaw that let regressions reach prod).
      E2E_ASSERT_MGMT_MCP_CALLABLE: '1'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Force-fail hook (prove a red gate rolls back the fleet)
        run: |
          set -euo pipefail
          if [ "${GATE_FORCE_FAIL:-0}" = "1" ]; then
            echo "::error::GATE_FORCE_FAIL=1 — gate forced RED; this MUST roll back the staging pin and tenant fleet."
            exit 1
          fi
          echo "gate not forced — running the real e2e"
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: 'stable'
          cache: false
          cache-dependency-path: workspace-server/go.sum
      # Reuse the SSOT staging e2e (workspace-server/internal/staginge2e): it
      # provisions a REAL throwaway molecules-server tenant, creates a workspace,
      # and asserts it SERVES A2A across restart/pause/hibernate — i.e. the tenant
      # runtime works on staging. Same recipe as e2e-workspace-lifecycle.yml's
      # staging job; no CP source dependency (HTTPS client of the deployed CP).
      - name: Fetch staging CP admin token from Infisical KMS
        env:
          INFISICAL_CI_CLIENT_ID: ${{ secrets.INFISICAL_CI_CLIENT_ID }}
          INFISICAL_CI_CLIENT_SECRET: ${{ secrets.INFISICAL_CI_CLIENT_SECRET }}
          INFISICAL_PROJECT_ID: ${{ secrets.INFISICAL_CI_PROJECT_ID }}
        run: |
          set -uo pipefail
          BASE="https://key.moleculesai.app"
          # Cloudflare rejects some default client signatures; use the platform's
          # canonical accepted User-Agent on every Infisical request.
          TOK=$(curl -fsS -A curl/8.4.0 -X POST "$BASE/api/v1/auth/universal-auth/login" \
            -H 'Content-Type: application/json' \
            -d "{\"clientId\":\"$INFISICAL_CI_CLIENT_ID\",\"clientSecret\":\"$INFISICAL_CI_CLIENT_SECRET\"}" \
            | python3 -c 'import sys,json; d=json.load(sys.stdin); v=d.get("accessToken"); sys.stdout.write(v if isinstance(v,str) and v else "")')
          if [ -z "$TOK" ]; then echo "::error::Infisical accessToken empty - failing closed"; exit 1; fi
          echo "::add-mask::$TOK"
          CP_ADMIN_API_TOKEN=$(curl -fsS -A curl/8.4.0 "$BASE/api/v3/secrets/raw/CP_ADMIN_API_TOKEN?workspaceId=$INFISICAL_PROJECT_ID&environment=staging&secretPath=%2Fshared%2Fcontrolplane-admin" \
            -H "Authorization: Bearer $TOK" \
            | python3 -c 'import sys,json; d=json.load(sys.stdin); v=(d.get("secret") or {}).get("secretValue"); sys.stdout.write(v if isinstance(v,str) and v else "")')
          echo "::add-mask::$CP_ADMIN_API_TOKEN"
          if [ -z "$CP_ADMIN_API_TOKEN" ]; then
            echo "::error::Infisical returned empty CP_ADMIN_API_TOKEN at staging /shared/controlplane-admin — failing closed."
            exit 1
          fi

          # Resolve the expected concierge runtime from the same optional KMS
          # selector the control plane consumes. A missing secret means the
          # compiled Hermes product fallback; transport/auth/server failures are
          # not equivalent to "unset" and fail the deploy gate closed.
          runtime_body=$(mktemp)
          trap 'rm -f "$runtime_body"' EXIT
          runtime_status=$(curl -sS -A curl/8.4.0 -o "$runtime_body" -w "%{http_code}" \
            "$BASE/api/v3/secrets/raw/MOLECULE_DEFAULT_RUNTIME?workspaceId=$INFISICAL_PROJECT_ID&environment=staging&secretPath=%2Fshared%2Fcontrolplane" \
            -H "Authorization: Bearer $TOK")
          case "$runtime_status" in
            200)
              MOLECULE_DEFAULT_RUNTIME=$(python3 -c 'import sys,json; d=json.load(sys.stdin); v=(d.get("secret") or {}).get("secretValue"); sys.stdout.write(v.strip() if isinstance(v,str) else "")' < "$runtime_body")
              if [ -z "$MOLECULE_DEFAULT_RUNTIME" ]; then
                echo "::error::Infisical returned an empty MOLECULE_DEFAULT_RUNTIME value at staging /shared/controlplane — failing closed."
                exit 1
              fi
              ;;
            404)
              MOLECULE_DEFAULT_RUNTIME=""
              ;;
            *)
              echo "::error::Infisical MOLECULE_DEFAULT_RUNTIME lookup returned HTTP $runtime_status — failing closed."
              exit 1
              ;;
          esac

          E2E_DEFAULT_RUNTIME="${MOLECULE_DEFAULT_RUNTIME:-hermes}"
          echo "CP_ADMIN_API_TOKEN=$CP_ADMIN_API_TOKEN" >> "$GITHUB_ENV"
          echo "E2E_DEFAULT_RUNTIME=$E2E_DEFAULT_RUNTIME" >> "$GITHUB_ENV"
          echo "CP_ADMIN_API_TOKEN loaded from Infisical staging SSOT (len=${#CP_ADMIN_API_TOKEN})"
          echo "Expected concierge runtime resolved from Infisical staging SSOT: $E2E_DEFAULT_RUNTIME"
          rm -f "$runtime_body"
          trap - EXIT
      - name: CP staging health preflight
        run: |
          code=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 10 "$CP_BASE_URL/health")
          if [ "$code" != "200" ]; then
            echo "::error::Staging CP unhealthy (HTTP $code) — infra, not a lifecycle bug. Failing loud."
            exit 1
          fi
          echo "Staging CP healthy"
      - name: Bind candidate build SHA for tenant /buildinfo guard
        env:
          # See "Resolve target tag" above — env: value, not run:-body interpolation.
          STAGING_TENANT_CD_IMAGE_TAG: ${{ vars.STAGING_TENANT_CD_IMAGE_TAG }}
        run: |
          set -euo pipefail
          if [ -n "${STAGING_TENANT_CD_IMAGE_TAG-}" ]; then
            echo "::notice::STAGING_TENANT_CD_IMAGE_TAG override set; skipping strict candidate SHA bind because the override may not be this workflow SHA."
            exit 0
          fi
          echo "E2E_EXPECT_TENANT_BUILD_SHA=$GITHUB_SHA" >> "$GITHUB_ENV"
          echo "::notice::candidate-build guard expects tenant /buildinfo git_sha=$GITHUB_SHA"
      - name: Run workspace-lifecycle + fresh-org platform-agent mgmt-MCP staginge2e (HARD GATE)
        working-directory: workspace-server
        # TestWorkspaceLifecycle_Staging: a workspace serves A2A across restart/pause/hibernate.
        # TestPlatformAgentMgmtMCP_Staging (Guard B): a FRESH org's platform agent reaches online on
        #   the EXPECTED default runtime (E2E_DEFAULT_RUNTIME) WITH its management MCP
        #   present AND — because E2E_ASSERT_MGMT_MCP_CALLABLE=1 — a REAL A2A tool-use turn drives it
        #   to actually RUN provision_workspace and a genuine kind='workspace' row appears (genuinely
        #   CALLABLE, not presence-only). The lifecycle test only exercises a PLAIN workspace (no
        #   declared plugins), so it cannot see a fresh Hermes concierge whose mgmt-MCP plugin never
        #   installed — the operator "test14" failure (a presign:// declared source the deployed
        #   runtime could not resolve). This makes the deploy gate go RED on that failure. BOTH must
        #   pass after the fleet roll (needs-gated, un-bypassable).
        run: go test -tags staging_e2e ./internal/staginge2e/ -run 'TestWorkspaceLifecycle_Staging|TestPlatformAgentMgmtMCP_Staging' -count=1 -v -timeout 50m
      # Belt-and-braces teardown: the Go test installs a t.Cleanup admin-DELETE
      # of its own tenant, but Go SKIPS t.Cleanup when `go test -timeout` fires
      # or the runner is SIGKILLed — so a timed-out/cancelled Go test leaks its
      # org. This net purges any CP admin org whose slug carries THIS run's
      # GITHUB_RUN_ID for the exact tag(s) this job creates (e2eSlug formats
      # slugs as e2e-<tag>-<run_id>-<uniq>), via the SAME identity-bound purge
      # helper the shell jobs use (cp_purge_receipt.sh) — no new auth path.
      # Idempotent with t.Cleanup; a fast no-op on the happy path.
      - name: Teardown safety net (runs on timeout/cancel/failure)
        # push/dispatch-only workflow; the PR guard is a uniform no-op here.
        if: always() && github.event_name != 'pull_request'
        env:
          # Sourced from Infisical (staging /shared/controlplane-admin) via the
          # "Fetch staging CP admin token from Infisical KMS" step above.
          ADMIN_TOKEN: ${{ env.CP_ADMIN_API_TOKEN }}
          # BOTH tags THIS job's -run creates: TestWorkspaceLifecycle_Staging →
          # e2eSlug("life") AND TestPlatformAgentMgmtMCP_Staging → e2eSlug("mcp").
          # Scopes the run-id sweep to only this job's orgs so a parallel sibling
          # job's in-flight org is never purged.
          TEARDOWN_TAGS: "life mcp"
        run: bash tests/e2e/lib/go_e2e_run_teardown.sh
  rollback-pin:
    name: rollback-pin (revert pin if the fleet roll failed)
    needs: [advance-pin, redeploy-fleet, runtime-image-readiness, e2e-smoke]
    # ALWAYS-RUN + explicit in-job branch (main-status coherence). Because this
    # workflow advances the pin before the fleet roll, any failure/skipped path
    # after advance-pin must restore the old pin and reroll staging tenants back
    # onto it. Green fleet roll + e2e is the only no-op path.
    if: always()
    runs-on: docker-host
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Revert the staging pin and fleet on failed candidate path
        env:
          ADVANCE_RESULT: ${{ needs.advance-pin.result }}
          REDEPLOY_RESULT: ${{ needs.redeploy-fleet.result }}
          READINESS_RESULT: ${{ needs.runtime-image-readiness.result }}
          E2E_RESULT: ${{ needs.e2e-smoke.result }}
          OLD_IMAGE: ${{ needs.advance-pin.outputs.old_image }}
          OLD_GIT_SHA: ${{ needs.advance-pin.outputs.old_git_sha }}
          INFISICAL_CLIENT_ID: ${{ secrets.INFISICAL_CI_CLIENT_ID }}
          INFISICAL_CLIENT_SECRET: ${{ secrets.INFISICAL_CI_CLIENT_SECRET }}
          INFISICAL_PROJECT_ID: ${{ secrets.INFISICAL_CI_PROJECT_ID }}
          TENANT_IMAGE: ${{ env.TENANT_IMAGE }}
          TENANT_IMAGE_NAME: ${{ env.TENANT_IMAGE }}
          # Roll BACK with the same declared flag state we roll FORWARD with, or a
          # failed candidate would ALSO (invisibly) end an in-flight burn-in.
          # In `env:`, not `export ... ${{ }}` in the body — see the roll step above.
          STAGING_TENANT_FLAGS: ${{ vars.STAGING_TENANT_FLAGS }}
        run: |
          set -euo pipefail
          # Defined for BOTH redeploy invocations below. The shell supplies the
          # default so an undefined repo var can never hard-abort the rollback —
          # the one path you least want to fail is the one that undoes a bad deploy.
          TENANT_FLAGS="${STAGING_TENANT_FLAGS-}"
          export TENANT_FLAGS
          if [ "$ADVANCE_RESULT" != "success" ]; then
            echo "::notice::pin never advanced (advance-pin=$ADVANCE_RESULT) — nothing to revert."
            exit 0
          fi
          if [ "$REDEPLOY_RESULT" = "success" ] && [ "$READINESS_RESULT" = "success" ] && [ "$E2E_RESULT" = "success" ]; then
            echo "::notice::candidate fleet roll + runtime readiness + e2e green — no rollback needed."
            exit 0
          fi
          if [ -z "$OLD_IMAGE" ]; then
            echo "::warning::advance-pin succeeded but exposed no old_image — cannot auto-revert; operator attention needed."
            exit 0
          fi
          echo "::warning::candidate path failed after pin advance (redeploy=$REDEPLOY_RESULT readiness=$READINESS_RESULT e2e=$E2E_RESULT) — reverting staging pin and fleet to $OLD_IMAGE"
          if [ -n "$OLD_GIT_SHA" ]; then
            bash scripts/deploy/advance-staging-tenant-pin.sh --image "$OLD_IMAGE" --git-sha "$OLD_GIT_SHA"
            EXPECTED_BUILD_SHA="$OLD_GIT_SHA" bash scripts/deploy/redeploy-staging-fleet.sh --image "$OLD_IMAGE"
          else
            bash scripts/deploy/advance-staging-tenant-pin.sh --image "$OLD_IMAGE"
            bash scripts/deploy/redeploy-staging-fleet.sh --image "$OLD_IMAGE"
          fi
