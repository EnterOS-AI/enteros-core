name: publish-canvas-image

# Ported from .github/workflows/publish-canvas-image.yml on 2026-05-11 per RFC
# internal#219 §1 sweep. Differences from the GitHub version:
#   - Kept flat `workflow_dispatch` (no `inputs`) under repository policy;
#     dispatch callers pass parameters through the established env/var path.
#   - Omitted GitHub's `merge_group:` trigger; this repository uses its
#     serialized Gitea queue plus pull-request/push status gates.
#   - Omitted `environment:` blocks; this repository's approval and secret
#     gates do not depend on Actions environments.
#   - Workflow-level env.GITHUB_SERVER_URL pinned per
#     feedback_act_runner_github_server_url.
#   - `continue-on-error: true` on each job (RFC §1 contract).
#   - Image push targeted registry.moleculesai.app (our self-hosted OCI
#     registry). GHCR was retired in the 2026-05-06 Gitea migration; ECR was
#     retired with the AWS account (2026-06-27, no-AWS directive). The build now
#     runs on ROBOT-1 and publishes via the parallel CHUNKED PUSHER through the
#     Cloudflare tunnel (a monolithic docker push 413s at the CF ~100MB cap).
#

# Builds on robot-1, publishes (via chunked pusher, through the CF tunnel), and
# (ordered) re-points :latest for the standalone canvas Docker image on
# registry.moleculesai.app whenever a commit lands on main that touches canvas.
#
# Ordered deploy (core#2226) — mirrors publish-workspace-server-image.yml so the
# standalone `molecule-ai/canvas` image is deterministic + verifiable, not a
# side effect of the platform fleet pulling a mutable `:latest`:
#
#   build-and-push:  build → push :staging-<sha> + :staging-latest + :sha-<sha>
#                    (does NOT move :latest — an unpromoted build must never
#                    become the prod-blessed tag).
#   promote-canvas:  waits for green main CI on this SHA, then re-points
#                    :latest to the verified :staging-<sha> by digest
#                    (imagetools create — no rebuild). So `:latest` == the
#                    current prod-blessed canvas, byte-identical to staging-<sha>.
#
# Tag scheme produced (parallels platform-tenant):
#   :staging-<sha> — per-commit immutable digest, what docker-compose pins to.
#   :staging-latest — most recent BUILD on main (last-writer-wins, NOT gated).
#   :sha-<sha>     — kept for back-compat with any consumer pinning the old tag.
#   :latest        — most recent CI-GREEN build. Only moved by promote-canvas.
#
# WHY this is the canvas analogue of the platform's deploy-production, not a
# literal copy: the standalone canvas co-deploys with the platform on the same
# host via the root docker-compose.yml (`docker compose pull && up -d`). Gating
# the canvas `:latest` promotion on the SAME green-main-CI signal the platform
# deploy waits on makes platform + canvas roll together by the same SHA. The
# canvas has no per-tenant fleet of its own and no /buildinfo endpoint, so there
# is no fleet-rollout / per-tenant verify step to mirror here — CI-green +
# digest-pin + immutable :staging-<sha> is the determinism contract. (A future
# canvas /buildinfo would let this assert the served SHA like the platform does;
# tracked in core#2226.)
#
# Mirror of publish-platform-image.yml, adapted for the Next.js canvas layer.
# See that workflow for inline notes on macOS Keychain isolation and QEMU.

concurrency:
  # Auto-cancel a superseded run: a newer commit/event supersedes the old
  # one instead of leaving it queued forever (root fix for waiting-run pileup).
  # PR events group by PR number; push events group by ref.
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
on:
  push:
    branches: [main]
    paths:
      # Only rebuild when canvas source changes — saves GHA minutes on
      # platform-only / docs-only / MCP-only merges.
      - 'canvas/**'
      - '.gitea/workflows/publish-canvas-image.yml'
  workflow_dispatch:
  # Manual rebuilds use this explicit reviewed dispatch or a normal source
  # change; there is no host-side push-button build path.

permissions:
  contents: read
  packages: write

env:
  # CANONICAL content-addressed registry (Cloudflare-fronted, self-hosted Gitea
  # OCI). ECR was retired with the AWS account (2026-06-27, no-AWS directive);
  # canvas now publishes to registry.moleculesai.app via the chunked pusher.
  # Overridable org/repo-wide via MOLECULE_CANVAS_IMAGE without touching this file.
  IMAGE_NAME: ${{ vars.MOLECULE_CANVAS_IMAGE || 'registry.moleculesai.app/molecule-ai/canvas' }}
  GITHUB_SERVER_URL: https://git.moleculesai.app

jobs:
  # bp-exempt: post-merge image publication side effect; CI / all-required gates source changes.
  build-and-push:
    name: Build & push canvas image
    # robot-1's 32c dedicated build box (the `robot-1` label is exclusive to that
    # host's fleet runners) — offloads the heavy Next.js canvas image build off
    # the local box. `[docker-host, robot-1]` = AND semantics, so it lands ONLY on
    # robot-1 while satisfying lint-required-workflows-docker-host-pinned
    # (docker-host is present). The image is `--load`ed into robot-1's daemon and
    # published to registry.moleculesai.app via the parallel chunked pusher (the
    # co-deployed root docker-compose then `docker compose pull`s it).
    runs-on: [docker-host, robot-1]
    timeout-minutes: 45
    # Phase 3 (RFC #219 §1): surface broken workflows without blocking.
    # mc#3436: pre-existing continue-on-error mask; root-fix and remove, do not renew silently.
    continue-on-error: true
    outputs:
      # Exposed so promote-canvas re-points :latest to the EXACT per-commit tag
      # this build produced (digest-level), never a re-resolved mutable tag.
      staging_sha: ${{ steps.tags.outputs.staging_sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Keep Docker auth/buildx state inside the job temp dir. Publish
      # runners can inherit a HOME/DOCKER_CONFIG path that is host-owned
      # and not writable from the job container; docker login otherwise
      # fails before the image build starts.
      - name: Prepare writable Docker config
        run: |
          set -euo pipefail
          export DOCKER_CONFIG="$RUNNER_TEMP/docker-config"
          mkdir -p "$DOCKER_CONFIG/buildx/certs"
          echo "DOCKER_CONFIG=$DOCKER_CONFIG" >> "$GITHUB_ENV"

      # Token that can read the private operator-config repo to fetch the chunked
      # pusher (below). Sourced from the Infisical SSOT via the CI machine
      # identity — matches publish-workspace-server-image.yml. FORK SAFETY: this
      # workflow fires only on push:main + workflow_dispatch (no pull_request), so
      # the token is never fetchable on an untrusted fork trigger; the conditional
      # is belt-and-suspenders (Gitea also withholds secrets from forks).
      - name: Fetch AUTO_SYNC_TOKEN from Infisical SSOT
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
        env:
          INFISICAL_CI_CLIENT_ID: ${{ secrets.INFISICAL_CI_CLIENT_ID }}
          INFISICAL_CI_CLIENT_SECRET: ${{ secrets.INFISICAL_CI_CLIENT_SECRET }}
          INFISICAL_PROJECT_ID: ${{ secrets.INFISICAL_CI_PROJECT_ID }}
        run: |
          set -uo pipefail
          BASE="https://key.moleculesai.app"
          TOK=$(curl -fsS -X POST "$BASE/api/v1/auth/universal-auth/login" \
            -H 'Content-Type: application/json' \
            -d "{\"clientId\":\"$INFISICAL_CI_CLIENT_ID\",\"clientSecret\":\"$INFISICAL_CI_CLIENT_SECRET\"}" \
            | python3 -c 'import sys,json; d=json.load(sys.stdin); v=d.get("accessToken"); sys.stdout.write(v if isinstance(v,str) and v else "")')
          AUTO_SYNC_TOKEN=$(curl -fsS "$BASE/api/v3/secrets/raw/AUTO_SYNC_TOKEN?workspaceId=$INFISICAL_PROJECT_ID&environment=prod&secretPath=%2Fshared%2Fdev-utils" \
            -H "Authorization: Bearer $TOK" \
            | python3 -c 'import sys,json; d=json.load(sys.stdin); v=(d.get("secret") or {}).get("secretValue"); sys.stdout.write(v if isinstance(v,str) and v else "")')
          echo "::add-mask::$AUTO_SYNC_TOKEN"
          if [ -z "$AUTO_SYNC_TOKEN" ]; then
            echo "::warning::Infisical returned empty for AUTO_SYNC_TOKEN — the chunked pusher fetch will be skipped (non-fatal)."
          fi
          echo "AUTO_SYNC_TOKEN=$AUTO_SYNC_TOKEN" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      # Health check: verify Docker daemon is accessible before attempting any
      # build steps. This fails loudly at step 1 when the runner's docker.sock
      # is inaccessible rather than silently continuing to the build step
      # where docker build fails with a cryptic error.
      - name: Verify Docker daemon access
        run: |
          set -euo pipefail
          echo "::group::Docker daemon health check"
          echo "Runner: ${HOSTNAME:-unknown}"
          docker_info="$(docker info 2>&1)" || {
            echo "::error::Docker daemon is not accessible at /var/run/docker.sock"
            echo "::error::Runner: ${HOSTNAME:-unknown}"
            printf '%s\n' "${docker_info}"
            echo "::error::Check: (1) daemon running, (2) runner user in docker group, (3) sock perms 660+"
            exit 1
          }
          printf '%s\n' "${docker_info}" | sed -n '1,5p'
          echo "Docker daemon OK"
          echo "::endgroup::"

      - name: Compute tags
        id: tags
        shell: bash
        run: |
          echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "staging_sha=staging-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Resolve build args
        id: build_args
        # Priority: workflow_dispatch input > repo secret > hardcoded default.
        # NEXT_PUBLIC_* env vars are baked into the JS bundle at build time by
        # Next.js — they cannot be changed at runtime without a full rebuild.
        # For local docker-compose deployments the defaults (localhost:8080)
        # work as-is; production deployments should set CANVAS_PLATFORM_URL
        # and CANVAS_WS_URL as repository secrets.
        #
        # Inputs are passed via env vars (not direct ${{ }} interpolation) to
        # prevent shell injection from workflow_dispatch string inputs.
        shell: bash
        env:
          INPUT_PLATFORM_URL: ${{ github.event.inputs.platform_url }}
          SECRET_PLATFORM_URL: ${{ secrets.CANVAS_PLATFORM_URL }}
          INPUT_WS_URL: ${{ github.event.inputs.ws_url }}
          SECRET_WS_URL: ${{ secrets.CANVAS_WS_URL }}
          # Exact generated-image R2 origin baked into the CSP img-src at build
          # time (config, not a secret — it is a public CSP directive value).
          # Falls back to the production-derived host. prod + staging share the
          # R2 bucket + account so a single value is correct for both.
          VAR_IMAGE_GEN_R2_HOST: ${{ vars.IMAGE_GEN_R2_HOST }}
        run: |
          PLATFORM_URL="${INPUT_PLATFORM_URL:-${SECRET_PLATFORM_URL:-http://localhost:8080}}"
          WS_URL="${INPUT_WS_URL:-${SECRET_WS_URL:-ws://localhost:8080/ws}}"
          IMAGE_GEN_R2_HOST="${VAR_IMAGE_GEN_R2_HOST:-https://molecule-workspace-data.bfa4e604e168a938e565600b27e2828c.r2.cloudflarestorage.com}"

          echo "platform_url=${PLATFORM_URL}" >> "$GITHUB_OUTPUT"
          echo "ws_url=${WS_URL}" >> "$GITHUB_OUTPUT"
          echo "image_gen_r2_host=${IMAGE_GEN_R2_HOST}" >> "$GITHUB_OUTPUT"

      # Build the canvas image and `--load` it into robot-1's daemon (single
      # platform, so load is valid). The registry publish is done separately by
      # the chunked pusher below (a monolithic `docker push` through CF 413s at
      # the ~100MB request-body cap).
      - name: Build canvas image (--load into robot-1 daemon)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: ./canvas
          file: ./canvas/Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          build-args: |
            NEXT_PUBLIC_PLATFORM_URL=${{ steps.build_args.outputs.platform_url }}
            NEXT_PUBLIC_WS_URL=${{ steps.build_args.outputs.ws_url }}
            NEXT_PUBLIC_IMAGE_GEN_R2_HOST=${{ steps.build_args.outputs.image_gen_r2_host }}
            # Bake the merge SHA into the image so /api/buildinfo reports the
            # served canvas SHA (core#2235). Mirrors how the platform image
            # surfaces GIT_SHA at /buildinfo. Full 40-char SHA (not the
            # 7-char tag) so the fleet redeploy verification can match exactly.
            BUILD_SHA=${{ github.sha }}
          # Ordered deploy (core#2226): produce the immutable per-commit tag +
          # the build-tracking staging-latest + the legacy back-compat :sha-<sha>
          # tag. NOT :latest — :latest is the prod-blessed tag, only re-pointed by
          # promote-canvas after green main CI.
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.tags.outputs.staging_sha }}
            ${{ env.IMAGE_NAME }}:staging-latest
            ${{ env.IMAGE_NAME }}:sha-${{ steps.tags.outputs.sha }}
          labels: |
            org.opencontainers.image.source=https://git.moleculesai.app/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.description=Molecule AI canvas (Next.js 15 + React Flow)

      # Publish to registry.moleculesai.app via the PARALLEL CHUNKED PUSHER,
      # THROUGH the Cloudflare tunnel (SSOT: molecule-ai/operator-config
      # bin/registry-parallel-push.py). Each blob uploads in <=90MB sequential
      # contiguous chunks (adaptive across-blob concurrency + resume), so no
      # PATCH exceeds the CF Free ~100MB cap. DOCUMENTED FALLBACK (kept, not
      # deleted, until the chunked path is prod-proven): repo var
      # PUBLISH_PUSH_MODE=localhost-bypass reverts to the pre-migration CF-BYPASS
      # (push straight to the host's local Gitea OCI endpoint localhost:3200) —
      # that path requires local-host placement, so using it also means
      # overriding runs-on to a local docker-host runner.
      - name: Publish canvas image to registry (chunked pusher through CF tunnel)
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          STAGING_SHA_TAG: ${{ steps.tags.outputs.staging_sha }}
          SHA_TAG: sha-${{ steps.tags.outputs.sha }}
          IMAGE_REPO: molecule-ai/canvas
          REG_USER: ${{ vars.MOLECULE_REGISTRY_USER || 'hongming' }}
          REG_TOKEN: ${{ secrets.MOLECULE_REGISTRY_TOKEN }}
          AUTO_SYNC_TOKEN: ${{ env.AUTO_SYNC_TOKEN }}
          PUSHER_REF: ${{ vars.OPERATOR_CONFIG_PUSHER_REF || 'main' }}
          GITHUB_SERVER_URL: ${{ env.GITHUB_SERVER_URL }}
          PUBLISH_PUSH_MODE: ${{ vars.PUBLISH_PUSH_MODE || 'chunked-tunnel' }}
          LOCALHOST_PUSH_HOST: ${{ vars.LOCALHOST_PUSH_HOST || 'localhost:3200' }}
        run: |
          set -uo pipefail
          REG_HOST="${IMAGE_NAME%%/*}"
          LOCAL_IMAGE="${IMAGE_NAME}:${STAGING_SHA_TAG}"
          TAGS="${STAGING_SHA_TAG} staging-latest ${SHA_TAG}"
          if [ -z "${REG_TOKEN:-}" ]; then
            echo "::warning::MOLECULE_REGISTRY_TOKEN not set — skipping registry push (image built + loaded as ${LOCAL_IMAGE})."
            exit 0
          fi
          echo "::add-mask::$REG_TOKEN"

          # ---- DOCUMENTED CF-BYPASS FALLBACK (localhost:3200) ------------------
          if [ "${PUBLISH_PUSH_MODE}" = "localhost-bypass" ]; then
            echo "::notice::PUBLISH_PUSH_MODE=localhost-bypass — pushing via ${LOCALHOST_PUSH_HOST} (CF-bypass; requires local-host placement)."
            if ! printf '%s' "$REG_TOKEN" | docker login "$LOCALHOST_PUSH_HOST" --username "$REG_USER" --password-stdin >/dev/null 2>&1; then
              echo "::warning::docker login ${LOCALHOST_PUSH_HOST} failed — is this job on the local Gitea host? (non-fatal)"; exit 0
            fi
            for t in $TAGS; do
              docker tag "$LOCAL_IMAGE" "${LOCALHOST_PUSH_HOST}/${IMAGE_REPO}:${t}"
              docker push "${LOCALHOST_PUSH_HOST}/${IMAGE_REPO}:${t}" >/dev/null 2>&1 \
                && echo "::notice::bypass-pushed ${IMAGE_REPO}:${t}" \
                || echo "::warning::bypass push of ${t} failed (non-fatal)"
            done
            exit 0
          fi

          # ---- PRIMARY: parallel chunked pusher THROUGH the CF tunnel ----------
          PUSHER="$RUNNER_TEMP/registry-parallel-push.py"
          url="${GITHUB_SERVER_URL}/api/v1/repos/molecule-ai/operator-config/raw/bin/registry-parallel-push.py?ref=${PUSHER_REF}"
          if ! curl -fsSL -H "Authorization: token ${AUTO_SYNC_TOKEN}" "$url" -o "$PUSHER"; then
            echo "::warning::could not fetch the chunked pusher from operator-config@${PUSHER_REF} (needs operator-config PR #364 on that ref). Non-fatal; no registry push this run."
            exit 0
          fi
          rc=0
          for t in $TAGS; do
            echo "::group::chunked push ${REG_HOST}/${IMAGE_REPO}:${t}"
            if python3 "$PUSHER" --image "$LOCAL_IMAGE" --registry "$REG_HOST" \
                 --repo "$IMAGE_REPO" --tag "$t" --user "$REG_USER"; then
              echo "::notice::chunked-pushed ${REG_HOST}/${IMAGE_REPO}:${t}"
            else
              echo "::warning::chunked push of ${t} failed"; rc=1
            fi
            echo "::endgroup::"
          done
          [ "$rc" = 0 ] || echo "::warning::one or more chunked pushes failed — investigate before relying on the registry."
          exit 0

  # bp-exempt: post-merge canvas promote side-effect; merge is gated by CI /
  # all-required and this job waits for green push CI on the SHA before acting.
  promote-canvas:
    name: Promote canvas :latest to CI-green build
    needs: build-and-push
    # Only on a real main push — workflow_dispatch / non-main never promotes.
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    # Side-effect deploy only; the image publish above is the durable artifact.
    # mc#3436: do NOT renew this mask silently — it mirrors deploy-production's
    # contract (a flaky promote must not red the ship lane), tracked in core#2226.
    continue-on-error: true
    runs-on: publish
    timeout-minutes: 60
    env:
      # Same green-main-CI gate the platform deploy-production waits on, so
      # platform + canvas advance :latest off the identical signal/SHA.
      GITEA_HOST: git.moleculesai.app
      # GITEA_TOKEN was `${{ secrets.PROD_AUTO_DEPLOY_CONTROL_TOKEN ||
      # secrets.AUTO_SYNC_TOKEN }}`. PROD_AUTO_DEPLOY_CONTROL_TOKEN remains the
      # PRIMARY; the AUTO_SYNC_TOKEN FALLBACK is now sourced from the Infisical
      # SSOT by the "Resolve GITEA_TOKEN" step below (it writes the resolved
      # GITEA_TOKEN to $GITHUB_ENV, preserving the original || precedence). A
      # job-level `env` cannot reference a value a step writes to $GITHUB_ENV,
      # so the resolution happens in a step.
      CI_STATUS_TIMEOUT_SECONDS: "3600"
      # Re-uses the platform's disable kill-switch: when prod auto-deploy is
      # paused, the canvas :latest promote pauses too (correct — an unpromoted
      # build must not become :latest while the fleet is frozen).
      PROD_AUTO_DEPLOY_DISABLED: ${{ vars.PROD_AUTO_DEPLOY_DISABLED || secrets.PROD_AUTO_DEPLOY_DISABLED || '' }}
    steps:
      # The publish runner's default HOME (/home/hongming) is not writable, so
      # docker credential saves fail and halt the promote (#2193 on the platform
      # side). Point HOME + DOCKER_CONFIG at the writable job temp dir.
      - name: Prepare writable HOME + Docker config
        run: |
          set -euo pipefail
          H="$RUNNER_TEMP/canvas-promote-home"
          mkdir -p "$H/.docker"
          echo "HOME=$H" >> "$GITHUB_ENV"
          echo "DOCKER_CONFIG=$H/.docker" >> "$GITHUB_ENV"

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Resolve GITEA_TOKEN (PROD_AUTO_DEPLOY_CONTROL_TOKEN primary, Infisical AUTO_SYNC fallback)
        # Bot-token consolidation (secrets->kms). Preserves the original
        # `${{ secrets.PROD_AUTO_DEPLOY_CONTROL_TOKEN || secrets.AUTO_SYNC_TOKEN }}`
        # precedence: PROD_AUTO_DEPLOY_CONTROL_TOKEN stays PRIMARY; only the
        # AUTO_SYNC_TOKEN FALLBACK moves to the Infisical SSOT
        # (/shared/dev-utils, environment=prod). The Infisical fetch only runs
        # (and only fail-closes) when the primary is absent — so the merged
        # `||` semantics are exact. The resolved GITEA_TOKEN is exported to
        # $GITHUB_ENV and consumed by the gate/wait steps below.
        #
        # FORK SAFETY: this job is gated to `push` on refs/heads/main
        # (see job `if:`), so no fork/PR trigger can reach it; the conditional
        # is belt-and-suspenders. Gitea also withholds secrets from forks at the
        # runner level (defense in depth).
        id: gitea_token
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
        env:
          PROD_AUTO_DEPLOY_CONTROL_TOKEN: ${{ secrets.PROD_AUTO_DEPLOY_CONTROL_TOKEN }}
          INFISICAL_CI_CLIENT_ID: ${{ secrets.INFISICAL_CI_CLIENT_ID }}
          INFISICAL_CI_CLIENT_SECRET: ${{ secrets.INFISICAL_CI_CLIENT_SECRET }}
          INFISICAL_PROJECT_ID: ${{ secrets.INFISICAL_CI_PROJECT_ID }}
        run: |
          set -uo pipefail
          if [ -n "${PROD_AUTO_DEPLOY_CONTROL_TOKEN:-}" ]; then
            echo "::add-mask::$PROD_AUTO_DEPLOY_CONTROL_TOKEN"
            echo "GITEA_TOKEN=$PROD_AUTO_DEPLOY_CONTROL_TOKEN" >> "$GITHUB_ENV"
            echo "GITEA_TOKEN resolved from PROD_AUTO_DEPLOY_CONTROL_TOKEN (primary)."
            exit 0
          fi
          # Primary absent -> fall back to the Infisical SSOT AUTO_SYNC_TOKEN.
          BASE="https://key.moleculesai.app"
          TOK=$(curl -fsS -X POST "$BASE/api/v1/auth/universal-auth/login" \
            -H 'Content-Type: application/json' \
            -d "{\"clientId\":\"$INFISICAL_CI_CLIENT_ID\",\"clientSecret\":\"$INFISICAL_CI_CLIENT_SECRET\"}" \
            | python3 -c 'import sys,json; d=json.load(sys.stdin); v=d.get("accessToken"); sys.stdout.write(v if isinstance(v,str) and v else "")')
          read_secret() {
            curl -fsS "$BASE/api/v3/secrets/raw/$1?workspaceId=$INFISICAL_PROJECT_ID&environment=prod&secretPath=$2" \
              -H "Authorization: Bearer $TOK" \
              | python3 -c 'import sys,json; d=json.load(sys.stdin); v=(d.get("secret") or {}).get("secretValue"); sys.stdout.write(v if isinstance(v,str) and v else "")'
          }
          AUTO_SYNC_TOKEN=$(read_secret AUTO_SYNC_TOKEN %2Fshared%2Fdev-utils)
          echo "::add-mask::$AUTO_SYNC_TOKEN"
          if [ -z "$AUTO_SYNC_TOKEN" ]; then
            echo "::error::PROD_AUTO_DEPLOY_CONTROL_TOKEN absent and Infisical returned empty for AUTO_SYNC_TOKEN at /shared/dev-utils"
            exit 1
          fi
          echo "GITEA_TOKEN=$AUTO_SYNC_TOKEN" >> "$GITHUB_ENV"
          echo "GITEA_TOKEN resolved from Infisical AUTO_SYNC_TOKEN fallback (len=${#AUTO_SYNC_TOKEN})."

      - name: Resolve promote gate
        id: gate
        env:
          PROD_AUTO_DEPLOY_DISABLED: ${{ env.PROD_AUTO_DEPLOY_DISABLED }}
        run: |
          set -euo pipefail
          if [ -n "${PROD_AUTO_DEPLOY_DISABLED:-}" ]; then
            case "$(printf '%s' "$PROD_AUTO_DEPLOY_DISABLED" | tr '[:upper:]' '[:lower:]')" in
              1|true|yes|on|disabled|disable)
                echo "enabled=false" >> "$GITHUB_OUTPUT"
                echo "::notice::Canvas :latest promote skipped: PROD_AUTO_DEPLOY_DISABLED=$PROD_AUTO_DEPLOY_DISABLED"
                {
                  echo "## Canvas :latest promote skipped"
                  echo ""
                  echo "Reason: \`PROD_AUTO_DEPLOY_DISABLED=$PROD_AUTO_DEPLOY_DISABLED\`. The CI-green build is published as \`:staging-${GITHUB_SHA::7}\`; \`:latest\` was left unchanged."
                } >> "$GITHUB_STEP_SUMMARY"
                exit 0 ;;
            esac
          fi
          if [ -z "${GITEA_TOKEN:-}" ]; then
            echo "::error::AUTO_SYNC_TOKEN/PROD_AUTO_DEPLOY_CONTROL_TOKEN is required so the canvas promote can wait for green CI."
            exit 1
          fi
          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Wait for green main CI on this SHA
        if: ${{ steps.gate.outputs.enabled == 'true' }}
        run: |
          set -euo pipefail
          # Same SSOT wait the platform deploy uses: blocks until the required
          # push contexts (CI / all-required (push) + Secret scan) go green on
          # THIS sha, and fails closed if any required context terminally fails.
          python3 .gitea/scripts/prod-auto-deploy.py wait-ci

      - name: Promote canvas :latest to the CI-green image
        if: ${{ steps.gate.outputs.enabled == 'true' }}
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          STAGING_SHA_TAG: ${{ needs.build-and-push.outputs.staging_sha }}
          REG_TOKEN: ${{ secrets.MOLECULE_REGISTRY_TOKEN }}
          REG_USER: ${{ vars.MOLECULE_REGISTRY_USER || 'hongming' }}
        run: |
          set -euo pipefail
          # Fail-safe: if the build job's output didn't propagate, recompute the
          # immutable per-commit tag from the SHA so we never promote a guess.
          SHA_TAG="${STAGING_SHA_TAG:-staging-${GITHUB_SHA::7}}"
          REG_HOST="${IMAGE_NAME%%/*}"
          if [ -z "${REG_TOKEN:-}" ]; then
            echo "::error::MOLECULE_REGISTRY_TOKEN required to re-point canvas :latest in the registry."
            exit 1
          fi
          echo "::add-mask::$REG_TOKEN"
          printf '%s' "$REG_TOKEN" | docker login "$REG_HOST" --username "$REG_USER" --password-stdin >/dev/null

          # Manifest-only re-tag (no pull/rebuild, no blob transfer — well under
          # the CF 100MB request-body cap, so tunnel-safe without the chunked
          # pusher): :latest becomes byte-identical to the CI-green :staging-<sha>
          # that build-and-push chunked-pushed to registry.moleculesai.app.
          docker buildx imagetools create \
            --tag "${IMAGE_NAME}:latest" \
            "${IMAGE_NAME}:${SHA_TAG}"

          {
            echo "## Canvas :latest promoted"
            echo ""
            echo "Re-pointed \`molecule-ai/canvas:latest\` → \`${SHA_TAG}\` (by digest)."
            echo ":latest now tracks the CI-green canvas build for commit \`${GITHUB_SHA::7}\`."
            echo ""
            echo "Tenants/hosts that \`docker compose pull canvas\` now get the same build the platform deploy rolled for this SHA."
          } >> "$GITHUB_STEP_SUMMARY"
