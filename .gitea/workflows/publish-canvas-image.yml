name: publish-canvas-image

# Ported from .github/workflows/publish-canvas-image.yml on 2026-05-11 per RFC
# internal#219 §1 sweep. Differences from the GitHub version:
#   - Publication is push:main only; branch-selected manual dispatch is excluded
#     from this registry-credential-bearing workflow.
#   - Omitted GitHub's `merge_group:` trigger; this repository uses its
#     serialized Gitea queue plus pull-request/push status gates.
#   - Omitted `environment:` blocks; this repository's approval and secret
#     gates do not depend on Actions environments.
#   - Workflow-level env.GITHUB_SERVER_URL pinned per
#     feedback_act_runner_github_server_url.
#   - Publication remains advisory for this pre-flip soak; clean post-main logs
#     are the evidence required before internal#1038 removes continue-on-error.
#   - Image push targeted registry.moleculesai.app (our self-hosted OCI
#     registry). GHCR was retired in the 2026-05-06 Gitea migration; ECR was
#     retired with the AWS account (2026-06-27, no-AWS directive). The build now
#     runs on ROBOT-1 and publishes via the parallel CHUNKED PUSHER through the
#     Cloudflare tunnel (a monolithic docker push 413s at the CF ~100MB cap).
#

# Builds on robot-1 and publishes through the CF tunnel whenever Canvas or one
# of this workflow's directly executed helpers changes. This pre-flip slice
# publishes candidate selectors only so its post-main log can prove the hardened
# path before internal#1038 makes the same job fail closed.
#
# Ordered registry publication (core#2226):
#
#   build-and-push:  build -> push :staging-<sha> + :staging-latest + :sha-<sha>
#                    (never moves :latest).
#
# Tag scheme produced:
#   :staging-<sha> — write-once full-commit candidate selector.
#   :staging-latest — most recent build on main (last-writer-wins, not prod).
#   :sha-<sha> — compatibility selector for the short commit SHA.
#   :latest — intentionally untouched by this workflow.
#
# This workflow proves the candidate's registry digest and OCI revision. It does
# not promote a production tag, mutate a live deployment, or roll any tenant.
#
# Mirror of publish-platform-image.yml, adapted for the Next.js canvas layer.
# See that workflow for inline notes on macOS Keychain isolation and QEMU.

on:
  push:
    branches: [main]
    paths:
      - 'canvas/**'
      - '.gitea/workflows/publish-canvas-image.yml'
      - '.gitea/scripts/infisical-read-secret.py'
      - '.gitea/scripts/private-gitea-download.py'
      - '.gitea/scripts/publish-canvas-selectors.sh'
      - '.gitea/scripts/registry-manifest-digest.sh'
      - '.gitea/scripts/registry-manifest-state.py'
permissions:
  contents: read

env:
  # CANONICAL content-addressed registry (Cloudflare-fronted, self-hosted Gitea
  # OCI). ECR was retired with the AWS account (2026-06-27, no-AWS directive);
  # canvas now publishes to registry.moleculesai.app via the chunked pusher.
  # One image variable is shared with staging consumers and the later release gate.
  IMAGE_NAME: ${{ vars.MOLECULE_CANVAS_APP_IMAGE || 'registry.moleculesai.app/molecule-ai/canvas' }}
  GITHUB_SERVER_URL: https://git.moleculesai.app
  REGISTRY_PULL_TIMEOUT_SECONDS: "180"
  CANVAS_BUILD_TIMEOUT_SECONDS: "2400"
  REGISTRY_PUSH_TIMEOUT_SECONDS: "1200"
  # Immutable reviewed executable + checksum; never fetch publisher code from
  # a mutable cross-repo branch while registry credentials are in scope.
  OPERATOR_CONFIG_PUSHER_SHA: d72dde7e077c1d4cb09b736fb847afaa67fb0485
  OPERATOR_CONFIG_PUSHER_SHA256: bbf5f83f881294d6da8720bca895c41b9bdd2c7a32a2d29ba9b0b71b29a57e7f

jobs:
  # bp-exempt: post-merge image publication side effect; CI / all-required gates source changes.
  build-and-push:
    name: Build & push canvas image
    concurrency:
      group: publish-canvas-image-build
      cancel-in-progress: false
    # robot-1's 32c dedicated build box (the `robot-1` label is exclusive to that
    # host's fleet runners) — offloads the heavy Next.js canvas image build off
    # the local box. `[docker-host, robot-1]` = AND semantics, so it lands ONLY on
    # robot-1 while satisfying lint-required-workflows-docker-host-pinned
    # (docker-host is present). The image is `--load`ed into robot-1's daemon and
    # published to registry.moleculesai.app via the parallel chunked pusher under
    # candidate selectors only; no production selector or live host is touched.
    runs-on: [docker-host, robot-1]
    timeout-minutes: 45
    # mc#4391 pre-flip soak (release blocker internal#1038): inspect clean
    # post-main logs before removing this mask.
    continue-on-error: true
    outputs:
      # Digest evidence is retained so the later fail-closed release gate can
      # consume the exact immutable candidate without rebuilding it.
      staging_sha: ${{ steps.tags.outputs.staging_sha }}
      candidate_digest: ${{ steps.registry_evidence.outputs.candidate_digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false

      # Keep Docker auth/buildx state inside the job temp dir. Publish
      # runners can inherit a HOME/DOCKER_CONFIG path that is host-owned
      # and not writable from the job container; docker login otherwise
      # fails before the image build starts.
      - name: Prepare writable Docker config
        run: |
          set -euo pipefail
          export DOCKER_CONFIG="$RUNNER_TEMP/docker-config"
          mkdir -p "$DOCKER_CONFIG/buildx/certs"
          echo "DOCKER_CONFIG=$DOCKER_CONFIG" >> "$GITHUB_ENV"

      # Run every third-party action before credentials enter GITHUB_ENV. The
      # remaining credential-bearing path consists only of reviewed shell/Python.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      # Health check: verify Docker daemon access before resolving any secret.
      - name: Verify Docker daemon access
        run: |
          set -euo pipefail
          echo "::group::Docker daemon health check"
          echo "Runner: ${HOSTNAME:-unknown}"
          docker_info="$(docker info 2>&1)" || {
            echo "::error::Docker daemon is not accessible at /var/run/docker.sock"
            echo "::error::Runner: ${HOSTNAME:-unknown}"
            printf '%s\n' "${docker_info}"
            echo "::error::Check: (1) daemon running, (2) runner user in docker group, (3) sock perms 660+"
            exit 1
          }
          printf '%s\n' "${docker_info}" | sed -n '1,5p'
          echo "Docker daemon OK"
          echo "::endgroup::"

      # Token that can read the private operator-config repo to fetch the chunked
      # pusher (below). Sourced from the Infisical SSOT via the CI machine
      # identity — matches publish-workspace-server-image.yml. This workflow is
      # protected-main push-only, so PR-authored code cannot reach the identity.
      - name: Fetch AUTO_SYNC_TOKEN from Infisical SSOT
        env:
          INFISICAL_CI_CLIENT_ID: ${{ secrets.INFISICAL_CI_CLIENT_ID }}
          INFISICAL_CI_CLIENT_SECRET: ${{ secrets.INFISICAL_CI_CLIENT_SECRET }}
          INFISICAL_PROJECT_ID: ${{ secrets.INFISICAL_CI_PROJECT_ID }}
        run: |
          set -euo pipefail
          AUTO_SYNC_TOKEN="$(python3 .gitea/scripts/infisical-read-secret.py \
            AUTO_SYNC_TOKEN /shared/dev-utils prod)"
          echo "::add-mask::$AUTO_SYNC_TOKEN"
          if [ -z "$AUTO_SYNC_TOKEN" ]; then
            echo "::error::Infisical returned empty for AUTO_SYNC_TOKEN"
            exit 1
          fi
          echo "AUTO_SYNC_TOKEN=$AUTO_SYNC_TOKEN" >> "$GITHUB_ENV"

      # Registry credential: MOLECULE_REGISTRY_TOKEN is read from the Gitea org
      # Actions secret — the SAME canonical source the tenant publisher
      # (publish-workspace-server-image.yml) uses. The former Infisical
      # /shared/dev-utils copy was retired (reads 404) and broke this workflow
      # (core#4584); per the reconcile rule the straggler consumer aligns to the
      # canonical source. The token is provided per-step below; the publish step
      # hard-fails if the secret is unset.
      - name: Reuse existing immutable Canvas candidate when present
        id: existing_candidate
        env:
          REG_USER: ${{ vars.MOLECULE_REGISTRY_USER || 'hongming' }}
          REG_TOKEN: ${{ secrets.MOLECULE_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          candidate="${IMAGE_NAME}:staging-${GITHUB_SHA}"
          set +e
          digest="$(python3 .gitea/scripts/registry-manifest-state.py "$candidate")"
          rc=$?
          set -e
          case "$rc" in
            10)
              echo "reuse=false" >> "$GITHUB_OUTPUT"
              echo "::notice::$candidate is absent; first publication will build it"
              ;;
            0)
              echo "::add-mask::$REG_TOKEN"
              printf '%s' "$REG_TOKEN" | docker login "${IMAGE_NAME%%/*}" \
                --username "$REG_USER" --password-stdin >/dev/null
              ref="${IMAGE_NAME}@${digest}"
              timeout "$REGISTRY_PULL_TIMEOUT_SECONDS" docker pull "$ref" >/dev/null
              revision="$(docker image inspect "$ref" --format '{{ index .Config.Labels "org.opencontainers.image.revision" }}' | tr -d '[:space:]')"
              [ "$revision" = "$GITHUB_SHA" ] || {
                echo "::error::write-once Canvas candidate $candidate has revision ${revision:-<empty>}, expected $GITHUB_SHA"; exit 1;
              }
              echo "reuse=true" >> "$GITHUB_OUTPUT"
              echo "digest=$digest" >> "$GITHUB_OUTPUT"
              echo "::notice::reusing immutable Canvas candidate $candidate at $digest"
              ;;
            *)
              echo "::error::could not prove immutable Canvas candidate state for $candidate"
              exit "$rc" ;;
          esac

      - name: Compute tags
        id: tags
        shell: bash
        run: |
          echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "staging_sha=staging-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Resolve build args
        id: build_args
        # The declared workflow contract is repository secret > hardcoded default.
        # NEXT_PUBLIC_* env vars are baked into the JS bundle at build time by
        # Next.js — they cannot be changed at runtime without a full rebuild.
        # For local docker-compose deployments the defaults (localhost:8080)
        # work as-is; production deployments should set CANVAS_PLATFORM_URL
        # and CANVAS_WS_URL as repository secrets.
        shell: bash
        env:
          SECRET_PLATFORM_URL: ${{ secrets.CANVAS_PLATFORM_URL }}
          SECRET_WS_URL: ${{ secrets.CANVAS_WS_URL }}
          # Exact generated-image R2 origin baked into the CSP img-src at build
          # time (config, not a secret — it is a public CSP directive value).
          # Falls back to the production-derived host. prod + staging share the
          # R2 bucket + account so a single value is correct for both.
          VAR_IMAGE_GEN_R2_HOST: ${{ vars.IMAGE_GEN_R2_HOST }}
        run: |
          PLATFORM_URL="${SECRET_PLATFORM_URL:-http://localhost:8080}"
          WS_URL="${SECRET_WS_URL:-ws://localhost:8080/ws}"
          IMAGE_GEN_R2_HOST="${VAR_IMAGE_GEN_R2_HOST:-https://molecule-workspace-data.bfa4e604e168a938e565600b27e2828c.r2.cloudflarestorage.com}"

          {
            echo "platform_url=${PLATFORM_URL}"
            echo "ws_url=${WS_URL}"
            echo "image_gen_r2_host=${IMAGE_GEN_R2_HOST}"
          } >> "$GITHUB_OUTPUT"

      # Build the canvas image and `--load` it into robot-1's daemon (single
      # platform, so load is valid). The registry publish is done separately by
      # the chunked pusher below (a monolithic `docker push` through CF 413s at
      # the ~100MB request-body cap).
      - name: Build canvas image (--load into robot-1 daemon)
        if: ${{ steps.existing_candidate.outputs.reuse != 'true' }}
        env:
          PLATFORM_URL: ${{ steps.build_args.outputs.platform_url }}
          WS_URL: ${{ steps.build_args.outputs.ws_url }}
          IMAGE_GEN_R2_HOST: ${{ steps.build_args.outputs.image_gen_r2_host }}
          STAGING_SHA_TAG: ${{ steps.tags.outputs.staging_sha }}
          SHORT_SHA: ${{ steps.tags.outputs.sha }}
        run: |
          set -euo pipefail
          command -v timeout >/dev/null 2>&1 || { echo "::error::GNU timeout is required for bounded builds"; exit 1; }
          timeout "$CANVAS_BUILD_TIMEOUT_SECONDS" docker buildx build \
            --file ./canvas/Dockerfile \
            --platform linux/amd64 \
            --load \
            --build-arg NEXT_PUBLIC_PLATFORM_URL="$PLATFORM_URL" \
            --build-arg NEXT_PUBLIC_WS_URL="$WS_URL" \
            --build-arg NEXT_PUBLIC_IMAGE_GEN_R2_HOST="$IMAGE_GEN_R2_HOST" \
            --build-arg BUILD_SHA="$GITHUB_SHA" \
            --label "org.opencontainers.image.source=https://git.moleculesai.app/${GITHUB_REPOSITORY}" \
            --label "org.opencontainers.image.revision=$GITHUB_SHA" \
            --label "org.opencontainers.image.description=Molecule AI canvas (Next.js 15 + React Flow)" \
            --tag "${IMAGE_NAME}:${STAGING_SHA_TAG}" \
            --tag "${IMAGE_NAME}:staging-latest" \
            --tag "${IMAGE_NAME}:sha-${SHORT_SHA}" \
            ./canvas
      # Publish to registry.moleculesai.app via the PARALLEL CHUNKED PUSHER,
      # THROUGH the Cloudflare tunnel (SSOT: molecule-ai/operator-config
      # bin/registry-parallel-push.py). Each blob uploads in <=90MB sequential
      # contiguous chunks (adaptive across-blob concurrency + resume), so no
      # PATCH exceeds the CF Free ~100MB cap. The canonical registry is the only
      # publication target; a green job therefore proves the artifact is
      # available through the same registry path consumers pull from.
      - name: Publish canvas image to registry (chunked pusher through CF tunnel)
        if: ${{ steps.existing_candidate.outputs.reuse != 'true' }}
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          STAGING_SHA_TAG: ${{ steps.tags.outputs.staging_sha }}
          UPLOAD_TAG: upload-canvas
          REG_USER: ${{ vars.MOLECULE_REGISTRY_USER || 'hongming' }}
          REG_TOKEN: ${{ secrets.MOLECULE_REGISTRY_TOKEN }}
          AUTO_SYNC_TOKEN: ${{ env.AUTO_SYNC_TOKEN }}
          PUSHER_REF: ${{ env.OPERATOR_CONFIG_PUSHER_SHA }}
          PUSHER_SHA256: ${{ env.OPERATOR_CONFIG_PUSHER_SHA256 }}
          GITHUB_SERVER_URL: ${{ env.GITHUB_SERVER_URL }}
        run: |
          set -euo pipefail
          REG_HOST="${IMAGE_NAME%%/*}"
          IMAGE_REPO="${IMAGE_NAME#*/}"
          if [ "$IMAGE_REPO" = "$IMAGE_NAME" ] || [ -z "$IMAGE_REPO" ]; then
            echo "::error::IMAGE_NAME must include registry host and repository"
            exit 1
          fi
          # Reject a drifted repository variable before any registry credential
          # can reach a network client. Mirrors the release-workflow image policy.
          python3 .gitea/scripts/registry-manifest-state.py --validate-base "$IMAGE_NAME"
          LOCAL_IMAGE="${IMAGE_NAME}:${STAGING_SHA_TAG}"
          if [ -z "${REG_TOKEN:-}" ]; then
            echo "::error::MOLECULE_REGISTRY_TOKEN is required for canvas publication."
            exit 1
          fi
          echo "::add-mask::$REG_TOKEN"

          if ! printf '%s' "$PUSHER_REF" | grep -Eq '^[0-9a-f]{40}$'; then
            echo "::error::operator-config pusher ref must be an immutable 40-character commit"
            exit 1
          fi
          if ! printf '%s' "$PUSHER_SHA256" | grep -Eq '^[0-9a-f]{64}$'; then
            echo "::error::operator-config pusher checksum must be a SHA-256 hex digest"
            exit 1
          fi
          PUSHER="$RUNNER_TEMP/registry-parallel-push.py"
          url="${GITHUB_SERVER_URL}/api/v1/repos/molecule-ai/operator-config/raw/bin/registry-parallel-push.py?ref=${PUSHER_REF}"
          GITEA_DOWNLOAD_TOKEN="$AUTO_SYNC_TOKEN" \
            python3 .gitea/scripts/private-gitea-download.py \
              "$url" "$PUSHER_SHA256" "$PUSHER"
          echo "::group::chunked push ${REG_HOST}/${IMAGE_REPO}:${UPLOAD_TAG}"
            timeout "$REGISTRY_PUSH_TIMEOUT_SECONDS" python3 "$PUSHER" --image "$LOCAL_IMAGE" --registry "$REG_HOST" \
              --repo "$IMAGE_REPO" --tag "$UPLOAD_TAG" --user "$REG_USER"
          echo "::endgroup::"

          printf '%s' "$REG_TOKEN" | docker login "$REG_HOST" --username "$REG_USER" --password-stdin >/dev/null
          upload_digest="$(bash .gitea/scripts/registry-manifest-digest.sh "${IMAGE_NAME}:${UPLOAD_TAG}")"
          set +e
          existing_digest="$(python3 .gitea/scripts/registry-manifest-state.py "${IMAGE_NAME}:${STAGING_SHA_TAG}")"
          existing_rc=$?
          set -e
          case "$existing_rc" in
            0)
              if [ "$existing_digest" != "$upload_digest" ]; then
                echo "::error::write-once candidate ${IMAGE_NAME}:${STAGING_SHA_TAG} already exists at $existing_digest, newly built digest is $upload_digest"
                exit 1
              fi
              ;;
            10)
              timeout "$REGISTRY_PULL_TIMEOUT_SECONDS" docker buildx imagetools create --prefer-index=false \
                --tag "${IMAGE_NAME}:${STAGING_SHA_TAG}" "${IMAGE_NAME}@${upload_digest}"
              ;;
            *)
              echo "::error::could not prove write-once Canvas candidate state"
              exit "$existing_rc" ;;
          esac
          echo "::notice::published write-once Canvas candidate digest=$upload_digest"

      - name: Repair and prove all Canvas candidate selectors
        id: registry_evidence
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          CANDIDATE_TAG: ${{ steps.tags.outputs.staging_sha }}
          SHA_TAG: sha-${{ steps.tags.outputs.sha }}
          EXPECTED_SHA: ${{ github.sha }}
          REG_USER: ${{ vars.MOLECULE_REGISTRY_USER || 'hongming' }}
          REG_TOKEN: ${{ secrets.MOLECULE_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          # A repository-variable drift must fail before docker login could send
          # the scoped token anywhere except the canonical registry.
          python3 .gitea/scripts/registry-manifest-state.py --validate-base "$IMAGE_NAME"
          [ -n "${REG_TOKEN:-}" ] || { echo "::error::registry token required for Canvas verification"; exit 1; }
          echo "::add-mask::$REG_TOKEN"
          printf '%s' "$REG_TOKEN" | docker login "${IMAGE_NAME%%/*}" --username "$REG_USER" --password-stdin >/dev/null
          bash .gitea/scripts/publish-canvas-selectors.sh

  # No promotion job is present: this pre-flip soak ends at immutable candidate
  # publication and registry verification.
