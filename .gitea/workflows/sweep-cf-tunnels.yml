name: Sweep stale Cloudflare Tunnels

# Ported from .github/workflows/sweep-cf-tunnels.yml on 2026-05-11 per RFC
# internal#219 §1 sweep. Differences from the GitHub version:
#   - Kept flat `workflow_dispatch` (no `inputs`) under repository policy;
#     dispatch callers pass parameters through the established env/var path.
#   - Omitted GitHub's `merge_group:` trigger; this repository uses its
#     serialized Gitea queue plus pull-request/push status gates.
#   - Omitted `environment:` blocks; this repository's approval and secret
#     gates do not depend on Actions environments.
#   - Workflow-level env.GITHUB_SERVER_URL pinned per
#     feedback_act_runner_github_server_url.
#   - `continue-on-error: true` on each job (RFC §1 contract).
#

# Janitor for Cloudflare Tunnels whose backing tenant no longer exists. DNS
# records are a separate resource: normal teardown owns them, while staging E2E
# has a narrowly patterned fallback in scripts/ops/prune_cf_e2e_dns.sh.
#
# Why this tunnel-specific sweep exists:
#   - DNS records live on the zone (`/zones/<id>/dns_records`).
#   - Tunnels live on the account (`/accounts/<id>/cfd_tunnel`).
#   - Different CF API surface and scope: this job requires
#     `account:cloudflare_tunnel:edit`; DNS cleanup requires zone-scoped access.
#   - Cleaner blast radius — operators can disable one without the
#     other if a regression surfaces.
#
# Safety: the script's MAX_DELETE_PCT gate (default 90% — higher than
# the DNS sweep's 50% because tenant-shaped tunnels are mostly
# orphans by design) refuses to nuke past the threshold.
#
# Secrets: CF_API_TOKEN (preferred CI-scoped name) or CLOUDFLARE_API_TOKEN
# (legacy canonical name) are accepted — the workflow falls back
# automatically. Same for CF_ACCOUNT_ID / CLOUDFLARE_ACCOUNT_ID. Confirmed
# existing per issue #425 §425 audit. CP_ADMIN_API_TOKEN and
# CP_STAGING_ADMIN_API_TOKEN are unconfirmed — if missing, the verify step
# (schedule → hard-fail, dispatch → soft-skip) surfaces it clearly.

on:
  workflow_dispatch:
# Don't let two sweeps race the same account.
concurrency:
  group: sweep-cf-tunnels
  cancel-in-progress: false

permissions:
  contents: read

env:
  GITHUB_SERVER_URL: https://git.moleculesai.app

jobs:
  sweep:
    name: Sweep CF tunnels
    runs-on: ubuntu-latest
    # 30 min cap. Was 5 min on the theory that the only thing that
    # could take >5min is a CF-API hang — but on 2026-05-02 a backlog
    # of 672 stale tunnels accumulated (large staging E2E run + delayed
    # sweep) and the serial `curl -X DELETE` loop (~0.7s/tunnel) needed
    # ~7-8min to drain. The 5-min cap killed the run mid-sweep
    # (cancelled at 424/672, see run 25248788312); a manual rerun
    # finished the remainder fine.
    #
    # The fix is two-part: parallelize the delete loop (8-way xargs in
    # the script — see scripts/ops/sweep-cf-tunnels.sh), AND raise the
    # cap so a one-off backlog doesn't trip a hangs-detector that
    # turned out to be a real-job-too-slow detector. With 8-way
    # parallelism, 600+ tunnels drains in ~60s; 30 min is generous
    # headroom for actual hangs to still surface.
    timeout-minutes: 30
    env:
      # CF_API_TOKEN / CF_ACCOUNT_ID now arrive via $GITHUB_ENV from the "Fetch
      # CF_API_TOKEN + CF_ACCOUNT_ID from Infisical SSOT" step below (wave-B
      # aliases migration). CLOUDFLARE_API_TOKEN comes from prod
      # /shared/cloudflare-tunnel-admin; CLOUDFLARE_ACCOUNT_ID comes from prod
      # /shared/cloudflare-admin (canonical per controlplane bootsecrets.go).
      # (CLOUDFLARE_API_TOKEN = the account:cloudflare_tunnel:edit-scoped token
      # this account-level sweep requires; CLOUDFLARE_ACCOUNT_ID = the account
      # that owns the tunnels). The old CF_API_TOKEN/CLOUDFLARE_API_TOKEN
      # + CF_ACCOUNT_ID/CLOUDFLARE_ACCOUNT_ID Gitea Actions secrets are left in
      # place until a green run validates this path (validate-before-delete).
      # The Verify-required-secrets gate still validates both are non-empty.
      # CP_ADMIN_API_TOKEN (prod) AND CP_STAGING_ADMIN_API_TOKEN (staging) now
      # arrive via $GITHUB_ENV from the "Fetch CP_ADMIN_API_TOKEN from Infisical
      # KMS" step below (wave-3 migration; staging arm added alongside the prod
      # one). Both come from Infisical /shared/controlplane-admin keyed
      # CP_ADMIN_API_TOKEN, just at different environments (prod vs STAGING). The
      # old CP_STAGING_ADMIN_API_TOKEN Gitea Actions secret is left in place
      # until a green run validates this path (validate-before-delete). The
      # Verify-required-secrets gate still validates both are non-empty.
      MAX_DELETE_PCT: ${{ github.event.inputs.max_delete_pct || '90' }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # KMS wave-3 (Gitea-Actions-secrets -> Infisical SSOT): source
      # CP_ADMIN_API_TOKEN from Infisical (prod /shared/controlplane-admin) via
      # the CI machine identity instead of the duplicated Gitea Actions secret,
      # mirroring this repo's boot-to-registration-e2e KMS pattern. Exported to
      # $GITHUB_ENV so the verify + sweep steps read it as a masked env var.
      #
      # TRUSTED-REF GATING: molecule-core is a PUBLIC repo; this step consumes
      # the INFISICAL_CI_* machine-identity secrets, so it must only run on a
      # TRUSTED event — the schedule cron or an operator workflow_dispatch. An
      # untrusted-fork PR cannot reach this step.
      - name: Fetch CP_ADMIN_API_TOKEN from Infisical KMS
        id: cp_admin_token
        if: >-
          github.event_name == 'schedule' ||
          github.event_name == 'workflow_dispatch'
        env:
          INFISICAL_CI_CLIENT_ID: ${{ secrets.INFISICAL_CI_CLIENT_ID }}
          INFISICAL_CI_CLIENT_SECRET: ${{ secrets.INFISICAL_CI_CLIENT_SECRET }}
          INFISICAL_PROJECT_ID: ${{ secrets.INFISICAL_CI_PROJECT_ID }}
        run: |
          set -uo pipefail
          BASE="https://key.moleculesai.app"
          TOK=$(curl -fsS -X POST "$BASE/api/v1/auth/universal-auth/login" \
            -H 'Content-Type: application/json' \
            -d "{\"clientId\":\"$INFISICAL_CI_CLIENT_ID\",\"clientSecret\":\"$INFISICAL_CI_CLIENT_SECRET\"}" \
            | python3 -c 'import sys,json; v=json.load(sys.stdin).get("accessToken"); sys.stdout.write(v if isinstance(v,str) else "")')
          if [ -z "$TOK" ]; then echo "::error::Infisical accessToken empty - failing closed"; exit 1; fi
          read_secret() {
            curl -fsS "$BASE/api/v3/secrets/raw/$1?workspaceId=$INFISICAL_PROJECT_ID&environment=prod&secretPath=$2" \
              -H "Authorization: Bearer $TOK" \
              | python3 -c 'import sys,json; v=json.load(sys.stdin).get("secret",{}).get("secretValue"); sys.stdout.write(v if isinstance(v,str) else "")'
          }
          CP_ADMIN_API_TOKEN=$(read_secret CP_ADMIN_API_TOKEN %2Fshared%2Fcontrolplane-admin)
          echo "::add-mask::$CP_ADMIN_API_TOKEN"
          # Masking-control: assert NON-EMPTY and FAIL LOUD. On a scheduled run
          # an empty token would otherwise be caught by the verify step as
          # "missing", but failing here is louder and closer to the cause.
          if [ -z "$CP_ADMIN_API_TOKEN" ]; then
            echo "::error::Infisical returned empty CP_ADMIN_API_TOKEN at prod /shared/controlplane-admin — failing closed."
            exit 1
          fi
          echo "CP_ADMIN_API_TOKEN=$CP_ADMIN_API_TOKEN" >> "$GITHUB_ENV"
          echo "CP_ADMIN_API_TOKEN loaded from Infisical (len=${#CP_ADMIN_API_TOKEN})"
          # Staging arm (wave-3 follow-up): the cross-env reconcile also needs
          # the STAGING CP admin token. Same key (CP_ADMIN_API_TOKEN) and path
          # (/shared/controlplane-admin), environment=staging — exported under
          # the CP_STAGING_ADMIN_API_TOKEN name the verify + sweep steps already
          # read, so the secrets.CP_STAGING_ADMIN_API_TOKEN Gitea Actions secret
          # can retire once a green run validates this path.
          read_secret_staging() {
            curl -fsS "$BASE/api/v3/secrets/raw/$1?workspaceId=$INFISICAL_PROJECT_ID&environment=staging&secretPath=$2" \
              -H "Authorization: Bearer $TOK" \
              | python3 -c 'import sys,json; d=json.load(sys.stdin); v=(d.get("secret") or {}).get("secretValue"); sys.stdout.write(v if isinstance(v,str) and v else "")'
          }
          CP_STAGING_ADMIN_API_TOKEN=$(read_secret_staging CP_ADMIN_API_TOKEN %2Fshared%2Fcontrolplane-admin)
          echo "::add-mask::$CP_STAGING_ADMIN_API_TOKEN"
          if [ -z "$CP_STAGING_ADMIN_API_TOKEN" ]; then
            echo "::error::Infisical returned empty CP_ADMIN_API_TOKEN at staging /shared/controlplane-admin — failing closed."
            exit 1
          fi
          echo "CP_STAGING_ADMIN_API_TOKEN=$CP_STAGING_ADMIN_API_TOKEN" >> "$GITHUB_ENV"
          echo "CP_STAGING_ADMIN_API_TOKEN loaded from Infisical (len=${#CP_STAGING_ADMIN_API_TOKEN})"

      # KMS wave-B (Gitea-Actions-secrets -> Infisical SSOT): source the
      # account-scoped Cloudflare tunnel token from prod
      # /shared/cloudflare-tunnel-admin and the owning account id from prod
      # /shared/cloudflare-admin (canonical per controlplane bootsecrets.go) via
      # the CI machine identity instead of the duplicated CF_API_TOKEN/CLOUDFLARE_API_TOKEN
      # and CF_ACCOUNT_ID/CLOUDFLARE_ACCOUNT_ID Gitea Actions secrets. This sweep
      # hits /accounts/<id>/cfd_tunnel, so it needs the account-scoped
      # CLOUDFLARE_API_TOKEN (account:cloudflare_tunnel:edit), NOT the
      # zone-scoped DNS token the orphans sweep uses. Exported to $GITHUB_ENV
      # under the same CF_API_TOKEN / CF_ACCOUNT_ID names the verify + sweep
      # steps already read, so nothing downstream changes.
      #
      # TRUSTED-REF GATING: molecule-core is a PUBLIC repo; this step consumes
      # the INFISICAL_CI_* machine-identity secrets, so it must only run on a
      # TRUSTED event — the schedule cron or an operator workflow_dispatch. An
      # untrusted-fork PR cannot reach this step.
      - name: Fetch CF_API_TOKEN + CF_ACCOUNT_ID from Infisical SSOT
        id: cf_tunnel_creds
        if: >-
          github.event_name == 'schedule' ||
          github.event_name == 'workflow_dispatch'
        env:
          INFISICAL_CI_CLIENT_ID: ${{ secrets.INFISICAL_CI_CLIENT_ID }}
          INFISICAL_CI_CLIENT_SECRET: ${{ secrets.INFISICAL_CI_CLIENT_SECRET }}
          INFISICAL_PROJECT_ID: ${{ secrets.INFISICAL_CI_PROJECT_ID }}
        run: |
          set -uo pipefail
          BASE="https://key.moleculesai.app"
          TOK=$(curl -fsS -X POST "$BASE/api/v1/auth/universal-auth/login" \
            -H 'Content-Type: application/json' \
            -d "{\"clientId\":\"$INFISICAL_CI_CLIENT_ID\",\"clientSecret\":\"$INFISICAL_CI_CLIENT_SECRET\"}" \
            | python3 -c 'import sys,json; v=json.load(sys.stdin).get("accessToken"); sys.stdout.write(v if isinstance(v,str) else "")')
          if [ -z "$TOK" ]; then echo "::error::Infisical accessToken empty - failing closed"; exit 1; fi
          read_secret() {
            curl -fsS "$BASE/api/v3/secrets/raw/$1?workspaceId=$INFISICAL_PROJECT_ID&environment=prod&secretPath=$2" \
              -H "Authorization: Bearer $TOK" \
              | python3 -c 'import sys,json; v=json.load(sys.stdin).get("secret",{}).get("secretValue"); sys.stdout.write(v if isinstance(v,str) else "")'
          }
          CF_API_TOKEN=$(read_secret CLOUDFLARE_API_TOKEN %2Fshared%2Fcloudflare-tunnel-admin)
          echo "::add-mask::$CF_API_TOKEN"
          if [ -z "$CF_API_TOKEN" ]; then
            echo "::error::Infisical returned empty CLOUDFLARE_API_TOKEN at prod /shared/cloudflare-tunnel-admin — failing closed."
            exit 1
          fi
          CF_ACCOUNT_ID=$(read_secret CLOUDFLARE_ACCOUNT_ID %2Fshared%2Fcloudflare-admin)
          echo "::add-mask::$CF_ACCOUNT_ID"
          if [ -z "$CF_ACCOUNT_ID" ]; then
            echo "::error::Infisical returned empty CLOUDFLARE_ACCOUNT_ID at prod /shared/cloudflare-admin — failing closed."
            exit 1
          fi
          {
            echo "CF_API_TOKEN=$CF_API_TOKEN"
            echo "CF_ACCOUNT_ID=$CF_ACCOUNT_ID"
          } >> "$GITHUB_ENV"
          echo "CF_API_TOKEN + CF_ACCOUNT_ID loaded from Infisical (token_len=${#CF_API_TOKEN}, account_len=${#CF_ACCOUNT_ID})"

      - name: Verify required secrets present
        id: verify
        # Schedule-vs-dispatch behaviour was hardened after the
        # silent-no-op incident: the
        # janitor reported green while doing nothing because secrets
        # were unset, masking a 152/200 zone-record leak). Same
        # principle applies here:
        #   - schedule → exit 1 on missing secrets (red CI surfaces it)
        #   - workflow_dispatch → exit 0 with warning (operator-driven,
        #     they already accepted the repo state)
        run: |
          missing=()
          for var in CF_API_TOKEN CF_ACCOUNT_ID CP_ADMIN_API_TOKEN CP_STAGING_ADMIN_API_TOKEN; do
            if [ -z "${!var:-}" ]; then
              missing+=("$var")
            fi
          done
          if [ ${#missing[@]} -gt 0 ]; then
            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              echo "::warning::skipping sweep — secrets not configured: ${missing[*]}"
              echo "::warning::set them at Settings → Secrets and Variables → Actions, then rerun."
              echo "::warning::CF_API_TOKEN must include account:cloudflare_tunnel:edit scope (separate from zone:dns:edit credentials)."
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "::error::sweep cannot run — required secrets missing: ${missing[*]}"
            echo "::error::set them at Settings → Secrets and Variables → Actions, or disable this workflow."
            echo "::error::CF_API_TOKEN must include account:cloudflare_tunnel:edit scope."
            exit 1
          fi
          echo "All required secrets present ✓"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Run sweep
        if: steps.verify.outputs.skip != 'true'
        # Schedule-vs-dispatch dry-run asymmetry:
        #   - Scheduled: input empty → "false" → --execute (the whole
        #     point of an hourly janitor).
        #   - Manual workflow_dispatch: input default true → dry-run;
        #     operator must flip it to actually delete.
        run: |
          set -euo pipefail
          if [ "${{ github.event.inputs.dry_run || 'false' }}" = "true" ]; then
            echo "Running in dry-run mode — no deletions"
            bash scripts/ops/sweep-cf-tunnels.sh
          else
            echo "Running with --execute — will delete identified orphans"
            bash scripts/ops/sweep-cf-tunnels.sh --execute
          fi
