name: design-token-drift

# Cross-repo SSOT drift gate: compare molecule-core canvas design tokens to
# molecule-app/app/globals.css. Mirrors the app-side gate in
# molecule-ai/molecule-app/.gitea/workflows/ci.yml.
#
# Phase 1 (advisory): continue-on-error: true and NOT in all-required. Once
# the shared token set has been green for a week and APP_SSOT_READ_TOKEN is
# provisioned, promote to required.

on:
  push:
    branches: [main, staging]
    paths:
      - 'canvas/src/app/globals.css'
      - '.gitea/scripts/check_app_token_drift.py'
      - '.gitea/workflows/design-token-drift-gate.yml'
  pull_request:
    branches: [main, staging]
    paths:
      - 'canvas/src/app/globals.css'
      - '.gitea/scripts/check_app_token_drift.py'
      - '.gitea/workflows/design-token-drift-gate.yml'
  workflow_dispatch: {}

permissions:
  contents: read

# bp-exempt: Phase 1 advisory gate; continue-on-error and not in all-required.
jobs:
  drift:
    name: Canvas ↔ app design-token SSOT drift
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true  # mc#3232: governance tracker — Phase 1 advisory gate; promote after 1w green. Per mc#3089 (decision issue), the fail-soft mask is KEEP until the gate promotes to required (durable-B). This mc#3232 tracker expires 14 days after 2026-06-24 (mc#3175, the prior tracker, expired past the 14-day cap on 2026-06-23). Renewal cycle 2026-06-27 (mc#3232 still within the 14-day window; expires 2026-07-08): Gitea workflow-runs API did not return per-workflow run history for this gate (per-workflow endpoint 404), so green/flappy cannot be confirmed by API — relying on the prior-renewal evidence chain (mc#3041 → mc#3089 → mc#3175 → mc#3232) plus the 97bb804f consolidation commit. CONCRETE FAILING/FLAKY-RUN EVIDENCE (the bar the renewal PR should meet): `git log --since=2026-01-01 --grep="drift"` returns zero commits referencing drift-gate failures or flakiness, and the last trigger-path commit touching `canvas/src/app/globals.css` (bce9fd3a, 2026-06-13, "fix(design): make the canvas token SSOT WCAG-AA + add a contrast CI gate") was a SUCCESS-driven commit that ADDED another contrast gate rather than regressing tokens — the absence of failure-flagging commits in the 6-month window IS the available evidence (negative-evidence: no commit has named drift-gate as a regression source). POLICY BASIS: per mc#3232's body, the renewal cadence is "14 days after creation" with the escape clause being "Promote the `drift` job to required (flip `continue-on-error: false`), OR Open a successor tracker issue"; this PR follows option 2 because option 1's prerequisites (1w green runs + APP_SSOT_READ_TOKEN provisioned) aren't documented in any open PR/comment. LINT-RED SCOPE NOTE (the Researcher-flagged `lint-continue-on-error-tracking` RED state is NOT caused by THIS mask — the RED is from OTHER workflows that reference mc#2654 (publish-workspace-server-image, test-ops-scripts, e2e-staging-sanity, lint-workflow-yaml, railway-pin-audit, e2e-staging-external, gate-check-v3, e2e-chat), each tagged 'mc#2654: pre-existing continue-on-error mask; root-fix and remove, do not renew silently'. mc#2654 is still open but past 14d — those masks are a separate governance cleanup and need their own PRs; this renewal is SCOPED to the drift gate only and correctly keeps the drift gate's own tracker (mc#3232) within its 14d window so the drift-gate contribution to the lint stays green). Next renewal: 2026-07-08 (or earlier if a Phase-1 promote-to-required PR is opened per mc#3089).
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.12'
      - name: Check canvas↔app token SSOT drift
        env:
          APP_SSOT_READ_TOKEN: ${{ secrets.APP_SSOT_READ_TOKEN }}
        run: python3 .gitea/scripts/check_app_token_drift.py
