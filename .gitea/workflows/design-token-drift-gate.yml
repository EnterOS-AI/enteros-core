name: design-token-drift

# Cross-repo SSOT drift gate: compare molecule-core canvas design tokens to
# molecule-app/app/globals.css. Mirrors the app-side gate in
# molecule-ai/molecule-app/.gitea/workflows/ci.yml.
#
# Phase 1 (advisory): continue-on-error: true and NOT in all-required. Once
# the shared token set has been green for a week and APP_SSOT_READ_TOKEN is
# provisioned, promote to required.

concurrency:
  # Auto-cancel a superseded run: a newer commit/event supersedes the old
  # one instead of leaving it queued forever (root fix for waiting-run pileup).
  # PR events group by PR number; push events group by ref.
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
on:
  push:
    branches: [main, staging]
    paths:
      - 'canvas/src/app/globals.css'
      - '.gitea/scripts/check_app_token_drift.py'
      - '.gitea/workflows/design-token-drift-gate.yml'
  pull_request:
    branches: [main, staging]
    paths:
      - 'canvas/src/app/globals.css'
      - '.gitea/scripts/check_app_token_drift.py'
      - '.gitea/workflows/design-token-drift-gate.yml'
  workflow_dispatch: {}

permissions:
  contents: read

# bp-exempt: Phase 1 advisory gate; continue-on-error and not in all-required.
jobs:
  drift:
    name: Canvas ↔ app design-token SSOT drift
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Phase-1 advisory gate (decision issue: mc#3089). Two prior renewal
    # trackers aged past the 14d cap and were superseded; this is the current
    # one. Per-workflow run history is API-blind on Gitea 1.22.6, so green
    # cannot be confirmed to unmask here — re-tracked, not unmasked.
    # (Do not put superseded tracker numbers within 2 lines of the directive:
    # lint-continue-on-error-tracking matches the FIRST tracker in that window.)
    continue-on-error: true  # mc#3616: 2026-07-09 renewal, expires 2026-07-23 — Phase 1 advisory design-token drift gate; promote to required (flip false) after 1w green + APP_SSOT_READ_TOKEN provisioned, else open a successor tracker (per mc#3089).
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.12'
      - name: Check canvas↔app token SSOT drift
        env:
          APP_SSOT_READ_TOKEN: ${{ secrets.APP_SSOT_READ_TOKEN }}
        run: python3 .gitea/scripts/check_app_token_drift.py
