# DISABLED 2026-06-27: AWS account closed; pending local-docker rework (see ABSTRACTION-FINDINGS).
name: E2E Staging External Runtime

# Ported from .github/workflows/e2e-staging-external.yml on 2026-05-11 per RFC
# internal#219 §1 sweep. Differences from the GitHub version:
#   - Dropped `workflow_dispatch.inputs` (Gitea 1.22.6 parser rejects them
#     per feedback_gitea_workflow_dispatch_inputs_unsupported).
#   - Dropped `merge_group:` (no Gitea merge queue).
#   - Dropped `environment:` blocks (Gitea has no environments).
#   - Workflow-level env.GITHUB_SERVER_URL pinned per
#     feedback_act_runner_github_server_url.
#   - `continue-on-error: true` on each job (RFC §1 contract).
#

# Regression for the four/five workspaces.status=awaiting_agent transitions
# that silently failed in production for five days before migration 046
# extended the workspace_status enum (see
# workspace-server/migrations/046_workspace_status_awaiting_agent.up.sql).
#
# Why this is its own workflow (not folded into e2e-staging-saas.yml):
#   - The full-saas harness defaults to runtime=hermes, never exercises
#     external-runtime. Adding an `external` parameter to that script
#     would force every push to staging through both lifecycles in
#     series, doubling the EC2 cold-start budget.
#   - The external lifecycle has unique timing (REMOTE_LIVENESS_STALE_AFTER
#     window, 90s default + sweep interval), which we wait through
#     deliberately. Folding it into hermes would make the long path
#     even longer.
#   - It can run in parallel with the hermes E2E since both create
#     fresh tenant orgs with distinct slug prefixes (`e2e-ext-...` vs
#     `e2e-...`).
#
# Triggers:
#   - Push to staging when any source affecting external runtime,
#     hibernation, or the migration set changes.
#   - PR review for the same set.
#   - Manual workflow_dispatch.
#
# NO schedule/cron: per the no-nightly-e2e rule, this on-demand lane has no
# timer. Its unique external-runtime assertions live in
# tests/e2e/test_staging_external_runtime.sh and are exercised per-PR/push
# (paths filter above) once the local-docker rework restores the auto-triggers.
#
# Concurrency: serialized so two staging pushes don't fight for the
# same EC2 quota window. cancel-in-progress=false so a half-rolled
# tenant always finishes its teardown.

on:
  # DISABLED 2026-06-27: push/pull_request auto-triggers commented out below (AWS account closed); manual workflow_dispatch only. See ABSTRACTION-FINDINGS.
  # The schedule/cron trigger was DELETED (no-nightly-e2e rule) — not commented.
#   push:
#     branches: [main]
#     paths:
#       - 'workspace-server/internal/handlers/workspace.go'
#       - 'workspace-server/internal/handlers/registry.go'
#       - 'workspace-server/internal/handlers/workspace_restart.go'
#       - 'workspace-server/internal/registry/healthsweep.go'
#       - 'workspace-server/internal/registry/liveness.go'
#       - 'workspace-server/migrations/**'
#       - 'workspace-server/internal/db/workspace_status_enum_drift_test.go'
#       - 'tests/e2e/test_staging_external_runtime.sh'
#       - '.gitea/workflows/e2e-staging-external.yml'
#   pull_request:
#     branches: [main]
#     paths:
#       - 'workspace-server/internal/handlers/workspace.go'
#       - 'workspace-server/internal/handlers/registry.go'
#       - 'workspace-server/internal/handlers/workspace_restart.go'
#       - 'workspace-server/internal/registry/healthsweep.go'
#       - 'workspace-server/internal/registry/liveness.go'
#       - 'workspace-server/migrations/**'
#       - 'workspace-server/internal/db/workspace_status_enum_drift_test.go'
#       - 'tests/e2e/test_staging_external_runtime.sh'
#       - '.gitea/workflows/e2e-staging-external.yml'

  # DISABLED 2026-06-27: no manual trigger remained after neutralizing auto-triggers; workflow_dispatch added so the workflow stays manually runnable.
  workflow_dispatch:
concurrency:
  group: e2e-staging-external
  cancel-in-progress: false

permissions:
  contents: read

env:
  GITHUB_SERVER_URL: https://git.moleculesai.app

jobs:
  e2e-staging-external:
    name: E2E Staging External Runtime
    runs-on: ubuntu-latest
    # Phase 3 (RFC #219 §1): surface broken workflows without blocking.
    # mc#2654: pre-existing continue-on-error mask; root-fix and remove, do not renew silently.
    #
    # PROMOTION-READINESS (toward required gate — do NOT flip continue-on-error
    # without CTO sign-off, that's the irreversible call):
    #   NOW FAIL-CLOSED:
    #     - Missing CP_STAGING_ADMIN_API_TOKEN → hard exit 2 (preflight).
    #     - Staging CP unhealthy → hard exit 1 (preflight, not a workspace bug).
    #     - Harness E2E_REQUIRE_LIVE=1 → exit 5 if a clean exit didn't prove
    #       all four awaiting_agent transitions (no silent skip).
    #     - Sweep transition (step 6) is now a bounded readiness-poll, not a
    #       fixed sleep + one-shot assert → no more sweep-cadence flake.
    #     - register / re-register retry ONLY transient edge 5xx (bounded),
    #       fail closed on 4xx → no more cold-boot-502 flake.
    #   STILL BLOCKS PROMOTION:
    #     - Single shared staging tenant + EC2 quota window: an infra-side
    #       provisioning outage (not a code bug) would turn the gate red.
    #       Needs an infra-class vs code-class signal split before required.
    #     - "CP unhealthy → exit 1" currently looks identical to a real
    #       failure on the run page; required-gate would need it demoted to
    #       a neutral/skip so staging flakiness can't block merges.
    # mc#2654: pre-existing continue-on-error mask; root-fix and remove, do not renew silently.
    continue-on-error: true
    timeout-minutes: 25

    env:
      MOLECULE_CP_URL: https://staging-api.moleculesai.app
      # 2026-05-11: secret canonicalised from MOLECULE_STAGING_ADMIN_TOKEN
      # (dead in org secret store) to CP_STAGING_ADMIN_API_TOKEN per
      # internal#322 — see this PR for the cross-workflow sweep.
      # MOLECULE_ADMIN_TOKEN now arrives via $GITHUB_ENV from the "Fetch staging
      # CP admin token from Infisical KMS" step below (wave-B staging consumers
      # migration). It is sourced from Infisical CP_ADMIN_API_TOKEN at
      # staging /shared/controlplane-admin. The old CP_STAGING_ADMIN_API_TOKEN
      # Gitea Actions secret is left in place until a green run validates this
      # path (validate-before-delete). The Verify-admin-token gate still
      # validates MOLECULE_ADMIN_TOKEN is non-empty.
      E2E_RUN_ID: "${{ github.run_id }}-${{ github.run_attempt }}"
      E2E_KEEP_ORG: ${{ github.event.inputs.keep_org && '1' || '0' }}
      E2E_STALE_WAIT_SECS: ${{ github.event.inputs.stale_wait_secs || '180' }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # KMS wave-B (Gitea-Actions-secrets -> Infisical SSOT): source the staging
      # CP admin bearer (CP_ADMIN_API_TOKEN @ staging /shared/controlplane-admin)
      # from Infisical via the CI machine identity instead of the duplicated
      # CP_STAGING_ADMIN_API_TOKEN Gitea Actions secret. Exported to $GITHUB_ENV
      # under the same MOLECULE_ADMIN_TOKEN name the preflight + teardown steps
      # already read.
      #
      # TRUSTED-REF GATING: molecule-core is a PUBLIC repo; this step consumes the
      # INFISICAL_CI_* machine-identity secrets, so it must NEVER run with an
      # untrusted-fork PR's code in the tree. It runs only on protected-branch
      # push / operator workflow_dispatch / schedule, and on same-repo (non-fork)
      # PRs. On an untrusted-fork PR it SKIPS cleanly — MOLECULE_ADMIN_TOKEN stays
      # empty and the "Verify admin token present" gate hard-fails exactly as it
      # did before this migration (fork PRs never received the Gitea secret).
      - name: Fetch staging CP admin token from Infisical KMS
        id: kms_admin
        env:
          INFISICAL_CI_CLIENT_ID: ${{ secrets.INFISICAL_CI_CLIENT_ID }}
          INFISICAL_CI_CLIENT_SECRET: ${{ secrets.INFISICAL_CI_CLIENT_SECRET }}
          INFISICAL_PROJECT_ID: ${{ secrets.INFISICAL_CI_PROJECT_ID }}
        run: |
          set -uo pipefail
          case "${{ github.event_name }}" in
            push|workflow_dispatch|schedule)
              is_trusted=true ;;
            pull_request)
              if [ "${{ github.event.pull_request.head.repo.fork }}" = "false" ]; then
                is_trusted=true
              else
                is_trusted=false
              fi ;;
            *)
              is_trusted=false ;;
          esac
          if [ "$is_trusted" != "true" ]; then
            echo "Untrusted ref (${{ github.event_name }}, fork PR) — skipping KMS fetch; the Verify-admin-token gate will surface the empty token."
            exit 0
          fi
          BASE="https://key.moleculesai.app"
          TOK=$(curl -fsS -X POST "$BASE/api/v1/auth/universal-auth/login" \
            -H 'Content-Type: application/json' \
            -d "{\"clientId\":\"$INFISICAL_CI_CLIENT_ID\",\"clientSecret\":\"$INFISICAL_CI_CLIENT_SECRET\"}" \
            | python3 -c 'import sys,json; d=json.load(sys.stdin); v=d.get("accessToken"); sys.stdout.write(v if isinstance(v,str) and v else "")')
          if [ -z "$TOK" ]; then echo "::error::Infisical accessToken empty - failing closed"; exit 1; fi
          read_secret() {
            curl -fsS "$BASE/api/v3/secrets/raw/$1?workspaceId=$INFISICAL_PROJECT_ID&environment=staging&secretPath=$2" \
              -H "Authorization: Bearer $TOK" \
              | python3 -c 'import sys,json; d=json.load(sys.stdin); v=(d.get("secret") or {}).get("secretValue"); sys.stdout.write(v if isinstance(v,str) and v else "")'
          }
          MOLECULE_ADMIN_TOKEN=$(read_secret CP_ADMIN_API_TOKEN %2Fshared%2Fcontrolplane-admin)
          echo "::add-mask::$MOLECULE_ADMIN_TOKEN"
          if [ -z "$MOLECULE_ADMIN_TOKEN" ]; then
            echo "::error::Infisical returned empty CP_ADMIN_API_TOKEN at staging /shared/controlplane-admin — failing closed."
            exit 1
          fi
          echo "MOLECULE_ADMIN_TOKEN=$MOLECULE_ADMIN_TOKEN" >> "$GITHUB_ENV"
          echo "MOLECULE_ADMIN_TOKEN loaded from Infisical staging SSOT (len=${#MOLECULE_ADMIN_TOKEN})"

      - name: Verify admin token present
        run: |
          if [ -z "$MOLECULE_ADMIN_TOKEN" ]; then
            # Schedule + push triggers must hard-fail when the token is
            # missing — silent skip would mask infra rot. Manual dispatch
            # gets the same hard-fail; an operator running this on a fork
            # without secrets configured needs to know up-front.
            echo "::error::CP_STAGING_ADMIN_API_TOKEN secret not set (Railway staging CP_ADMIN_API_TOKEN)"
            exit 2
          fi
          echo "Admin token present ✓"

      - name: CP staging health preflight
        run: |
          code=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 10 "$MOLECULE_CP_URL/health")
          if [ "$code" != "200" ]; then
            echo "::error::Staging CP unhealthy (got HTTP $code). Skipping — not a workspace bug."
            exit 1
          fi
          echo "Staging CP healthy ✓"

      - name: Run external-runtime E2E
        id: e2e
        # E2E_REQUIRE_LIVE=1: the harness fails CLOSED (exit 5) if it ever
        # reaches a clean exit without proving all four awaiting_agent
        # transitions. Mirrors CP serving-e2e SERVING_E2E_REQUIRE_LIVE — a
        # silent skip / early-return / dropped assertion can no longer
        # masquerade as green. Token-missing and CP-unhealthy already
        # hard-fail in the two preflight steps above, so reaching this step
        # means a real cycle is expected.
        env:
          E2E_REQUIRE_LIVE: "1"
        run: bash tests/e2e/test_staging_external_runtime.sh

      # Mirror the e2e-staging-saas.yml safety net: if the runner is
      # cancelled (e.g. concurrent staging push), the test script's
      # EXIT trap may not fire, so we sweep e2e-ext-* slugs scoped to
      # *this* run id.
      - name: Teardown safety net (runs on cancel/failure)
        if: always()
        env:
          # Sourced from Infisical (staging /shared/controlplane-admin) via the
          # "Fetch staging CP admin token from Infisical KMS" job step above.
          ADMIN_TOKEN: ${{ env.MOLECULE_ADMIN_TOKEN }}
        run: |
          set +e
          orgs=$(curl -sS "$MOLECULE_CP_URL/cp/admin/orgs" \
            -H "Authorization: Bearer $ADMIN_TOKEN" 2>/dev/null \
            | python3 -c "
          import json, sys, os, datetime
          run_id = os.environ.get('GITHUB_RUN_ID', '')
          d = json.load(sys.stdin)
          # Scope STRICTLY to this run id (e2e-ext-YYYYMMDD-<runid>-...)
          # so concurrent runs and unrelated dev probes are not touched.
          # Sweep today AND yesterday so a midnight-crossing run still
          # cleans up its own slug.
          today = datetime.date.today()
          yesterday = today - datetime.timedelta(days=1)
          dates = (today.strftime('%Y%m%d'), yesterday.strftime('%Y%m%d'))
          if not run_id:
              # Without a run id we cannot scope safely; bail rather
              # than risk deleting unrelated tenants.
              sys.exit(0)
          prefixes = tuple(f'e2e-ext-{d}-{run_id}-' for d in dates)
          for o in d.get('orgs', []):
              s = o.get('slug', '')
              if s.startswith(prefixes) and o.get('status') != 'purged':
                  print(s)
          " 2>/dev/null)
          if [ -n "$orgs" ]; then
            echo "Safety-net sweep: deleting leftover orgs:"
            echo "$orgs"
            # Per-slug verified DELETE — see molecule-controlplane#420.
            # `>/dev/null 2>&1` previously hid every failure; surface
            # non-2xx as workflow warnings so the run page names what
            # leaked. Sweeper catches the rest within ~45 min.
            leaks=()
            for slug in $orgs; do
              # Tempfile-routed -w + set +e/-e prevents curl-exit-code
              # pollution of the captured status (lint-curl-status-capture.yml).
              set +e
              curl -sS -o /tmp/external-cleanup.out -w "%{http_code}" \
                -X DELETE "$MOLECULE_CP_URL/cp/admin/tenants/$slug" \
                -H "Authorization: Bearer $ADMIN_TOKEN" \
                -H "Content-Type: application/json" \
                -d "{\"confirm\":\"$slug\"}" >/tmp/external-cleanup.code
              set -e
              code=$(cat /tmp/external-cleanup.code 2>/dev/null || echo "000")
              if [ "$code" = "200" ] || [ "$code" = "204" ]; then
                echo "[teardown] deleted $slug (HTTP $code)"
              else
                echo "::warning::external teardown for $slug returned HTTP $code — sweep-stale-e2e-orgs will catch it within ~45 min. Body: $(head -c 300 /tmp/external-cleanup.out 2>/dev/null)"
                leaks+=("$slug")
              fi
            done
            if [ ${#leaks[@]} -gt 0 ]; then
              echo "::warning::external teardown left ${#leaks[@]} leak(s): ${leaks[*]}"
            fi
          else
            echo "Safety-net sweep: no leftover orgs to clean."
          fi
