name: provision-request-ssot-sync

# SSOT sync gate for the provision-request wire contract (RFC core#3285 §10).
#
# Sibling of contract-ssot-sync.yml (which guards the mcp-plugin-delivery
# mirror). molecule-ai-sdk is the PUBLIC SSOT for the cross-repo
# provision-request wire shape (the core -> control-plane
# POST /cp/workspaces/provision request). Core keeps a local MIRROR at
# workspace-server/internal/provisioner/provision_request.contract.json -- the
# producer-side copy provision_request_contract_test.go pins cpProvisionRequest's
# json tags against. This gate chains the mirror to the SSOT: it fetches
# molecule-ai-sdk's canonical copy over the PUBLIC raw endpoint (no token) and
# verifies core's mirror is the SAME CONTRACT (canonical-JSON identical).
#
# WHY: provision-request was DUPLICATED byte-identical in molecule-core and
# molecule-controlplane with no shared source of truth -- the "two copies, silent
# drift" mode that dropped template_assets for weeks (RFC #2843). This gate (plus
# the matching one in CP) dedups enforcement onto the molecule-ai-sdk SSOT
# without a heavy code dependency.
#
# ENFORCEMENT GATING: standalone workflow, ADVISORY-FIRST -- NOT a job in ci.yml
# and NOT in branch protection (RFC §13/§14.2 advisory -> soak -> required;
# mirrors contract-ssot-sync.yml). The BP-required promotion is a separate
# post-soak step (needs repo-admin).
#
# SEEDING ORDER: fetches the SSOT from molecule-ai-sdk main. Until the
# molecule-ai-sdk seed (contracts/provision-request/) merges, the fetch 404s and this
# gate fails closed BY DESIGN -- merge the contracts seed first, then this
# advisory gate goes (and stays) green. Advisory, so it does not block.
#
# AUTH: NONE. molecule-ai-sdk is public; readable over the raw endpoint
# without a token. Runs on every context (incl. fork PRs); FAIL-CLOSED on a
# fetch error (non-200 / network) and on canonical drift.

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'workspace-server/internal/provisioner/provision_request.contract.json'
      - '.gitea/scripts/check-provision-request-ssot-sync.sh'
      - '.gitea/workflows/provision-request-ssot-sync.yml'
  push:
    branches: [main]
    paths:
      - 'workspace-server/internal/provisioner/provision_request.contract.json'
      - '.gitea/scripts/check-provision-request-ssot-sync.sh'
      - '.gitea/workflows/provision-request-ssot-sync.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: provision-request-ssot-sync-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # bp-required: pending #3285 -- advisory-first; standalone SSOT-sync gate,
  # not in branch protection yet (promote after a green soak; needs repo-admin).
  ssot-sync:
    name: Verify core's provision-request mirror matches the molecule-ai-sdk SSOT
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Verify mirror == molecule-ai-sdk SSOT (unauthenticated, fail-closed)
        run: bash .gitea/scripts/check-provision-request-ssot-sync.sh
