name: provision-request-ssot-sync

# Retired compatibility workflow.
#
# Core no longer vendors the provision-request JSON mirror. The producer-side
# contract test compares cpProvisionRequest directly against generated SDK
# bindings. Keep this workflow path and context present during the cleanup so
# protected-path deletion guards see an explicit retirement instead of a silent
# CI surface removal.

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'workspace-server/internal/provisioner/provision_request_contract_test.go'
      - '.gitea/scripts/check-provision-request-ssot-sync.sh'
      - '.gitea/workflows/provision-request-ssot-sync.yml'
  push:
    branches: [main]
    paths:
      - 'workspace-server/internal/provisioner/provision_request_contract_test.go'
      - '.gitea/scripts/check-provision-request-ssot-sync.sh'
      - '.gitea/workflows/provision-request-ssot-sync.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: provision-request-ssot-sync-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # bp-exempt: retired compatibility context; provision-request mirror moved to SDK generated bindings.
  ssot-sync:
    name: Verify core's provision-request mirror matches the molecule-ai-sdk SSOT
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Retired
        run: echo "provision-request mirror sync is retired; core tests compare against SDK molcontracts."
