name: manifest-entry-existence-check

# PR-time defense against bad manifest.json entries (#2185).
#
# A manifest entry whose `repo` does not exist on Gitea only surfaces
# as a failure in publish-workspace-server-image.yml *after* merge,
# which fires the main-red watchdog. This workflow checks every
# (plugin + workspace_template + org_template) entry at PR-review
# time so broken entries are caught before they reach main.
#
# Design notes
# ------------
# - Uses the same AUTO_SYNC_TOKEN secret that publish-workspace-server-image.yml
#   uses for cloning manifest deps. Some entries are platform-private, so an
#   anonymous API check would 404 on valid entries; auth is required.
# - Only checks repo existence, not ref resolvability (#2185 scope).
# - Mirrors clone-manifest.sh retry behavior (3 attempts, backoff).
# - Triggers only when manifest.json changes to keep CI load minimal.
#
# Related: #2183 (incident), #2184 (fix), #2185 (this gate).

concurrency:
  # Auto-cancel a superseded run: a newer commit/event supersedes the old
  # one instead of leaving it queued forever (root fix for waiting-run pileup).
  # PR events group by PR number; push events group by ref.
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
on:
  pull_request:
    branches: [main, staging]
    paths:
      - 'manifest.json'

permissions:
  contents: read

jobs:
  # bp-required: pending #2185 — new PR-time gate; branch-protection update tracked in the same issue.
  check-entries:
    name: Verify manifest entries exist on Gitea
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out PR head
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Fetch AUTO_SYNC_TOKEN from Infisical SSOT
        # Secret-source consolidation (Infisical SSOT). AUTO_SYNC_TOKEN is used
        # here as a cross-repo read token for the manifest-entry existence check
        # and is pulled from the Infisical
        # SSOT at /shared/dev-utils::AUTO_SYNC_TOKEN (environment=prod) instead
        # of the duplicated `secrets.AUTO_SYNC_TOKEN` Gitea secret. Exported to
        # $GITHUB_ENV and consumed as env.* below. The old Gitea secret stays
        # in place until a green run proves this fetch (validate-before-delete).
        #
        # FORK SAFETY: this workflow fires on pull_request, so the fetch is
        # gated to same-repo PRs only — a fork PR must NEVER be able to harvest
        # the merge-actor token. On a fork PR this step is skipped and env.*
        # stays empty (the existence check runs unauthenticated, which is the
        # pre-existing fork behaviour). Gitea also withholds secrets from forks
        # at the runner level (defense in depth).
        id: auto_sync_token
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
        env:
          INFISICAL_CI_CLIENT_ID: ${{ secrets.INFISICAL_CI_CLIENT_ID }}
          INFISICAL_CI_CLIENT_SECRET: ${{ secrets.INFISICAL_CI_CLIENT_SECRET }}
          INFISICAL_PROJECT_ID: ${{ secrets.INFISICAL_CI_PROJECT_ID }}
        run: |
          set -uo pipefail
          BASE="https://key.moleculesai.app"
          TOK=$(curl -fsS -X POST "$BASE/api/v1/auth/universal-auth/login" \
            -H 'Content-Type: application/json' \
            -d "{\"clientId\":\"$INFISICAL_CI_CLIENT_ID\",\"clientSecret\":\"$INFISICAL_CI_CLIENT_SECRET\"}" \
            | python3 -c 'import sys,json; d=json.load(sys.stdin); v=d.get("accessToken"); sys.stdout.write(v if isinstance(v,str) and v else "")')
          read_secret() {
            curl -fsS "$BASE/api/v3/secrets/raw/$1?workspaceId=$INFISICAL_PROJECT_ID&environment=prod&secretPath=$2" \
              -H "Authorization: Bearer $TOK" \
              | python3 -c 'import sys,json; d=json.load(sys.stdin); v=(d.get("secret") or {}).get("secretValue"); sys.stdout.write(v if isinstance(v,str) and v else "")'
          }
          AUTO_SYNC_TOKEN=$(read_secret AUTO_SYNC_TOKEN %2Fshared%2Fdev-utils)
          echo "::add-mask::$AUTO_SYNC_TOKEN"
          if [ -z "$AUTO_SYNC_TOKEN" ]; then
            echo "::error::Infisical returned empty for AUTO_SYNC_TOKEN at /shared/dev-utils"
            exit 1
          fi
          echo "AUTO_SYNC_TOKEN=$AUTO_SYNC_TOKEN" >> "$GITHUB_ENV"
          echo "AUTO_SYNC_TOKEN loaded from Infisical (len=${#AUTO_SYNC_TOKEN})"

      - name: Verify each manifest entry resolves on Gitea
        env:
          GITEA_HOST: git.moleculesai.app
          GITEA_TOKEN: ${{ env.AUTO_SYNC_TOKEN }}
        run: |
          set -euo pipefail
          bash scripts/manifest-entry-existence-check.sh

      - name: Regression test manifest-entry-existence-check script
        run: |
          set -euo pipefail
          bash scripts/test-manifest-entry-existence-check.sh
