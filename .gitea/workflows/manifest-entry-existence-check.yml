name: manifest-entry-existence-check

# PR-time defense against bad manifest.json entries (#2185).
#
# A manifest entry whose `repo` does not exist on Gitea only surfaces
# as a failure in publish-workspace-server-image.yml *after* merge,
# which fires the main-red watchdog. This workflow checks every
# (plugin + workspace_template + org_template) entry at PR-review
# time so broken entries are caught before they reach main.
#
# Design notes
# ------------
# - Uses the same AUTO_SYNC_TOKEN secret that publish-workspace-server-image.yml
#   uses for cloning manifest deps. Some entries are platform-private, so an
#   anonymous API check would 404 on valid entries; auth is required.
# - Only checks repo existence, not ref resolvability (#2185 scope).
# - Mirrors clone-manifest.sh retry behavior (3 attempts, backoff).
# - Triggers only when manifest.json changes to keep CI load minimal.
#
# Related: #2183 (incident), #2184 (fix), #2185 (this gate).

on:
  pull_request:
    branches: [main, staging]
    paths:
      - 'manifest.json'

permissions:
  contents: read

jobs:
  # bp-required: pending #2185 — new PR-time gate; branch-protection update tracked in the same issue.
  check-entries:
    name: Verify manifest entries exist on Gitea
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out PR head
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Verify each manifest entry resolves on Gitea
        env:
          GITEA_HOST: git.moleculesai.app
          GITEA_TOKEN: ${{ secrets.AUTO_SYNC_TOKEN }}
        run: |
          set -euo pipefail

          # Strip JSON5 // comments to match clone-manifest.sh parsing.
          sed '/^[[:space:]]*\/\//d' manifest.json > /tmp/manifest.json

          # Build a flat list of entries: name<TAB>repo.
          jq -r '
            (.plugins + .workspace_templates + .org_templates)
            | .[]
            | [.name, .repo]
            | @tsv
          ' /tmp/manifest.json > /tmp/entries.tsv

          total=$(wc -l < /tmp/entries.tsv | tr -d ' ')
          missing=()

          while IFS=$'\t' read -r name repo; do
            last_http_code=""
            for attempt in 1 2 3; do
              http_code=$(curl -s -o /dev/null -w "%{http_code}" \
                -H "Authorization: token ${GITEA_TOKEN}" \
                "https://${GITEA_HOST}/api/v1/repos/${repo}")
              last_http_code="$http_code"
              if [ "$http_code" = "200" ]; then
                echo "  OK: $name -> $repo"
                break
              elif [ "$http_code" = "404" ]; then
                echo "::error::manifest entry '$name' points at $repo which does not exist on Gitea (404)"
                missing+=("$name:$repo (404)")
                break
              else
                echo "  attempt $attempt: '$name' -> $repo returned HTTP $http_code, retrying"
                sleep $((attempt * 2))
              fi
            done
            # After exhausting retries, any non-200 status that wasn't already
            # recorded as 404 is a validation failure (500, 403, auth/network
            # gateway errors, etc.). Fail closed rather than silently passing.
            if [ "$last_http_code" != "200" ] && [ "$last_http_code" != "404" ]; then
              echo "::error::manifest entry '$name' -> $repo could not be validated after 3 attempts (last HTTP $last_http_code)"
              missing+=("$name:$repo (last HTTP $last_http_code)")
            fi
          done < /tmp/entries.tsv

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::${#missing[@]} of ${total} manifest entries are broken:"
            printf '  - %s\n' "${missing[@]}"
            exit 1
          fi

          echo "::notice::All ${total} manifest entries resolve to existing Gitea repos."
